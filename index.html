const FMT = n => {
  if (n>=1e12) return (n/1e12).toFixed(2)+"T";
  if (n>=1e9)  return (n/1e9).toFixed(2)+"B";
  if (n>=1e6)  return (n/1e6).toFixed(2)+"M";
  if (n>=1e3)  return (n/1e3).toFixed(2)+"K";
  return Math.floor(n).toString();
};
const FMTT = s => {
  if (!isFinite(s)||s<0) return "inf";
  if (s<60)   return Math.ceil(s)+"s";
  if (s<3600) return Math.ceil(s/60)+"m";
  return (s/3600).toFixed(1)+"h";
};
const polar = (cx,cy,r,deg) => { const a=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; };
const timeToAfford = (res,prod,cost) => {
  const w = Object.entries(cost).map(([k,v]) => { const n=v-(res[k]||0); if(n<=0) return 0; const r=prod[k]||0; return r<=0?Infinity:n/r; });
  const mx = Math.max(...w); return isFinite(mx)?mx:null;
};
const canAffordWith = (res,costs) => Object.entries(costs).every(([k,v])=>(res[k]||0)>=v);

function Chip({ok, text}) {
  return <span style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:ok?"#0d2a0d":"#2a0d0d",color:ok?"#6fcf97":"#eb5757"}}>{text}</span>;
}

function Badge({count, color="#eb5757"}) {
  if (!count) return null;
  return <span style={{position:"absolute",top:-5,right:-5,background:color,color:"#fff",borderRadius:8,fontSize:8,padding:"0 3px",lineHeight:"14px",minWidth:14,textAlign:"center"}}>{count>9?"9+":count}</span>;
}

function BuildingCard({b, buildings, res, prod, canAfford, buildingCost, buyBuilding, sellBuilding}) {
  const cost   = buildingCost(b);
  const afford = canAfford(cost);
  const owned  = buildings[b.id] || 0;
  const wait   = !afford ? timeToAfford(res, prod, cost) : null;
  const layerIcon = b.layer===3?"🌌 ":b.layer===2?"🛸 ":"";
  return (
    <div style={{background:"#080d1a",border:"1px solid "+(afford?"#1e4a7f":"#0d1a2e"),borderRadius:6,padding:"6px 7px",opacity:afford||owned?1:0.5,display:"flex",flexDirection:"column",gap:3}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#c8d8f0",lineHeight:1.3,flex:1}}>{layerIcon}{b.name}</span>
        <span style={{fontSize:11,color:"#a0c4ff",fontWeight:700,marginLeft:4}}>x{owned}</span>
      </div>
      <div style={{fontSize:9,color:"#4a6a8a"}}>{b.desc.slice(0,55)+(b.desc.length>55?"...":"")}</div>
      <div style={{fontSize:9,color:"#4a7a9a"}}>{Object.entries(b.prod).map(([k,v])=>"+"+( v*Math.max(owned,1)).toFixed(1)+RES[k].icon+"/s").join(" ")}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
        {Object.entries(cost).map(([k,v]) => <Chip key={k} ok={(res[k]||0)>=v} text={RES[k].icon+FMT(v)}/>)}
      </div>
      {wait!==null && isFinite(wait) && <div style={{fontSize:8,color:"#8a6a2a"}}>{"~"+FMTT(wait)}</div>}
      <div style={{display:"flex",gap:3,marginTop:1}}>
        <button onClick={()=>buyBuilding(b)} style={{flex:1,padding:"4px 0",borderRadius:4,border:"1px solid "+(afford?"#1e4a8f":"#0d1a2e"),background:afford?"#0d2a4a":"#080d1a",color:afford?"#4a9eff":"#1a3a5a",cursor:afford?"pointer":"not-allowed",fontSize:11,fontWeight:700}}>Buy</button>

// ── KnowledgeTree ──────────────────────────────────────────────────────────
function KnowledgeTree({knowledge, res, prod, buyKnowledge, layer}) {
  const [hov,setHov]   = useState(null);
  const [zoom,setZoom] = useState(1);
  const [pan,setPan]   = useState({x:0,y:0});
  const [drag,setDrag] = useState(false);
  const dragRef = useRef(null);
  const CX=290,CY=290,W=580,H=580;
  const RR=[0,80,155,235,310];

  const nodePos = useMemo(() => {
    const p={};
    KNOWLEDGE.forEach(k => {
      if (k.ring===0) { p[k.id]={x:CX,y:CY}; }
      else { const r=(k.ring===2&&k.crossBridge)?RR[2]-10:RR[k.ring]; p[k.id]=polar(CX,CY,r,k.angle); }
    });
    return p;
  }, []);

  const edgeList = useMemo(() => {
    const e=[];
    KNOWLEDGE.forEach(k => { k.requires.forEach(r => { e.push([r,k.id,k.branch]); }); });
    return e;
  }, []);

  const checkBlocked     = id => { const k=KNOWLEDGE.find(x=>x.id===id); if(!k||!k.exclusive||!k.exclusive.length) return false; return k.exclusive.some(ex=>knowledge.includes(ex)); };
  const checkLayerLocked = id => ["kf1","kf2","kf3"].includes(id) && layer<2;

  const onWheel     = e => { e.preventDefault(); setZoom(z=>Math.min(4,Math.max(0.4,z*(e.deltaY>0?0.85:1.18)))); };
  const onMouseDown = e => { if(e.button!==0) return; setDrag(true); dragRef.current={x:e.clientX-pan.x,y:e.clientY-pan.y}; };
  const onMouseMove = e => { if(!drag||!dragRef.current) return; setPan({x:e.clientX-dragRef.current.x,y:e.clientY-dragRef.current.y}); };
  const onMouseUp   = () => setDrag(false);

  const onTouchStart = e => { if(e.touches.length!==1) return; setDrag(true); dragRef.current={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y}; };
  const onTouchMove  = e => { if(!drag||!dragRef.current||e.touches.length!==1) return; e.preventDefault(); setPan({x:e.touches[0].clientX-dragRef.current.x,y:e.touches[0].clientY-dragRef.current.y}); };

  const branchLabels = [{a:0,l:"Energy",c:"#e6a817"},{a:72,l:"Minerals",c:"#7c9e6f"},{a:144,l:"Research",c:"#6f9ec9"},{a:216,l:"Population",c:"#b07ec9"},{a:288,l:"Fuel",c:"#e06060"}];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:10,color:"#3a5a7a"}}>Pinch/scroll to zoom, drag to pan. <span style={{color:"#eb5757"}}>Ring-3 nodes are exclusive.</span></span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setZoom(z=>Math.min(4,z*1.25))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>+</button>
          <button onClick={()=>setZoom(z=>Math.max(0.4,z*0.8))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>-</button>
          <button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:11}}>Reset</button>
        </div>
      </div>
      <div style={{overflow:"hidden",borderRadius:8,border:"1px solid #1e3a5f",height:460,cursor:drag?"grabbing":"grab",background:"#080d1a",touchAction:"none"}}
        onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onMouseUp}>
        <svg width={W} height={H} style={{display:"block",transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")",transformOrigin:"center center",transition:drag?"none":"transform 0.05s"}}>
          <defs>
            <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="glow1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect width={W} height={H} fill="#080d1a"/>
          {RR.slice(1).map((r,i)=><circle key={i} cx={CX} cy={CY} r={r} fill="none" stroke="#1a2a3a" strokeWidth="0.5" strokeDasharray="2 8"/>)}
          {[0,72,144,216,288].map(a=>{const pt=polar(CX,CY,RR[4]+15,a);return<line key={a} x1={CX} y1={CY} x2={pt.x} y2={pt.y} stroke="#1a2535" strokeWidth="0.5"/>;})}
          {branchLabels.map(({a,l,c})=>{const pt=polar(CX,CY,RR[4]+24,a);return<text key={a} x={pt.x} y={pt.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={c} fontWeight="700" opacity={l==="Fuel"&&layer<2?0.3:0.7}>{l}</text>;})}
          {edgeList.map(([a,b,branch],i)=>{
            const p1=nodePos[a],p2=nodePos[b]; if(!p1||!p2) return null;
            const both=knowledge.includes(a)&&knowledge.includes(b),bc=BRANCH_COLOR[branch]||"#4a9eff";
            return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={both?bc:"#1e2e3e"} strokeWidth={both?2:1} strokeOpacity={both?0.7:0.35} strokeDasharray={both?"none":"3 5"}/>;
          })}
          {KNOWLEDGE.map(k=>{
            const p=nodePos[k.id]; if(!p) return null;
            const owned=knowledge.includes(k.id), prereq=k.requires.every(r=>knowledge.includes(r));
            const blocked=checkBlocked(k.id)&&!owned, ll=checkLayerLocked(k.id);
            const afford=canAffordWith(res,k.cost), isH=hov===k.id;
            const bc=BRANCH_COLOR[k.branch]||"#4a9eff";
            const isCross=k.crossBridge||k.branch.startsWith("cross_");
            const nr=k.ring===0?22:isCross?16:k.ring===3?18:15;
            const opacity=(blocked||ll)?0.12:owned?1:prereq?0.95:0.25;
            const canBuy=prereq&&!owned&&!blocked&&!ll&&afford;
            const ttW=(!owned&&prereq&&!blocked&&!ll)?timeToAfford(res,prod,k.cost):null;
            const tw=184, th=ttW!==null?108:(prereq&&!owned)?90:72;
            const tx=Math.min(Math.max(p.x-tw/2,2),W-tw-2);
            const rawTy=p.y+nr+10, tty=rawTy+th>H-4?p.y-nr-th-8:rawTy;
            const nStroke=owned?bc:(prereq&&!blocked&&!ll)?bc:"#1e2e3e";
            const nFill=owned?"#0d2a1a":(prereq&&afford)?"#0d1525":"#080d1a";
            const nFilter=(owned||isH)?"url(#glow1)":undefined;
            const iconChar=ll?"🔒":blocked?"X":owned?"V":k.ring===0?"★":isCross?"◈":"·";
            const iconFill=(blocked||ll)?"#3a3a3a":owned?bc:prereq?"#8ab4d4":"#2a4a6a";
            const labelFill=(blocked||ll)?"#2a2a2a":owned?bc:prereq?"#6a8aaa":"#2a3a4a";
            return (
              <g key={k.id} opacity={opacity} style={{cursor:canBuy?"pointer":"default"}}
                onClick={()=>{if(canBuy) buyKnowledge(k);}}
                onMouseEnter={()=>setHov(k.id)} onMouseLeave={()=>setHov(null)}>
                {(owned||isH)&&<circle cx={p.x} cy={p.y} r={nr+9} fill={bc} fillOpacity="0.1" filter="url(#glow2)"/>}
                {isCross?(
                  <g transform={"rotate(45,"+p.x+","+p.y+")"}>
                    <rect x={p.x-nr*0.75} y={p.y-nr*0.75} width={nr*1.5} height={nr*1.5} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter} rx="2"/>
                  </g>
                ):(
                  <circle cx={p.x} cy={p.y} r={nr} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter}/>
                )}
                <text x={p.x} y={p.y+1} textAnchor="middle" dominantBaseline="middle" fontSize={k.ring===0?"13":"10"} fill={iconFill}>{iconChar}</text>
                <text x={p.x} y={p.y+nr+9} textAnchor="middle" fontSize="7" fill={labelFill} fontWeight={owned?"700":"400"}>{k.name.length>18?k.name.slice(0,17)+"...":k.name}</text>
                {isH&&(
                  <g>
                    <rect x={tx} y={tty} width={tw} height={th} rx={5} fill="#080e1c" stroke={(blocked||ll)?"#5a1a1a":bc} strokeWidth="1" opacity="0.98"/>
                    <text x={tx+8} y={tty+13} fontSize="9" fontWeight="700" fill={(blocked||ll)?"#eb5757":bc}>{k.name}</text>
                    <text x={tx+8} y={tty+24} fontSize="7.5" fill="#4a6a8a" fontStyle="italic">{k.desc.length>34?k.desc.slice(0,33)+"...":k.desc}</text>
                    <text x={tx+8} y={tty+37} fontSize="8" fill={(blocked||ll)?"#888":"#c8d8f0"}>{k.effect}</text>
                    {ll&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Requires Orbital layer</text>}
                    {!ll&&blocked&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Blocked by another choice</text>}
                    {!ll&&!blocked&&owned&&<text x={tx+8} y={tty+52} fontSize="8" fill="#6fcf97">Unlocked</text>}
                    {!ll&&!blocked&&!owned&&prereq&&(
                      <g>
                        <text x={tx+8} y={tty+52} fontSize="7.5" fill="#5a7a9a">Cost:</text>
                        {Object.entries(k.cost).map(([rk,v],ci)=><text key={rk} x={tx+32+ci*44} y={tty+52} fontSize="7.5" fill={(res[rk]||0)>=v?"#6fcf97":"#eb5757"}>{RES[rk].icon+FMT(v)}</text>)}
                        {ttW!==null&&<text x={tx+8} y={tty+66} fontSize="7.5" fill={ttW===0?"#6fcf97":"#e6a817"}>{ttW===0?"Ready!":"~"+FMTT(ttW)+" to afford"}</text>}
                        <text x={tx+8} y={tty+80} fontSize="7.5" fill={afford?"#6fcf97":"#eb5757"}>{afford?"Click to unlock":"Cannot afford yet"}</text>
                      </g>
                    )}
                    {!ll&&!blocked&&!owned&&!prereq&&(
                      <text x={tx+8} y={tty+52} fontSize="7.5" fill="#3a5a7a">
                        {"Needs: "+k.requires.slice(0,3).map(rid=>{const kk=KNOWLEDGE.find(x=>x.id===rid);return kk?kk.name.slice(0,11):"?";}).join(", ")}
                      </text>
                    )}
                    {k.exclusive&&k.exclusive.length>0&&!owned&&!blocked&&!ll&&(
                      <text x={tx+8} y={tty+th-6} fontSize="7" fill="#c07040" fontStyle="italic">
                        {"Blocks: "+k.exclusive.map(ex=>{const kk=KNOWLEDGE.find(x=>x.id===ex);return kk?kk.name.slice(0,10):"?";}).join(", ")}
                      </text>
                    )}
                  </g>
                )}
              </g>
            );
          })}
          <text x={W-4} y={H-4} textAnchor="end" fontSize="8" fill="#3a5a7a">{knowledge.length+"/"+KNOWLEDGE.length+" unlocked"}</text>
        </svg>
      </div>
    </div>
  );
}

      }
    }
    const sv = setInterval(()=>localStorage.setItem("sbr_save",Date.now().toString()),5000);
    localStorage.setItem("sbr_save",Date.now().toString());
    return ()=>clearInterval(sv);
  },[]);

  useEffect(()=>{if(won||paused)return;const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[won,paused]);
  useEffect(()=>{if(!won&&(buildings.colonyship||0)>=1)setWon(true);},[buildings.colonyship,won]);
  useEffect(()=>{if(layer===1&&(buildings.terraformer||0)>=1)setLayer(2);if(layer===2&&(buildings.stationdock||0)>=1)setLayer(3);},[buildings,layer]);

  const fmtTime = s => {
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
    return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
  };

  const getClickPower = useCallback(type => {
    let b=1;
    if(upgrades.includes("u1")&&type==="energy")b*=2; if(upgrades.includes("u2")&&type==="minerals")b*=2;
    if(upgrades.includes("u3")&&type==="research")b*=2; if(upgrades.includes("u4")&&type==="population")b*=2;
    if(upgrades.includes("u5")&&(type==="energy"||type==="minerals"))b*=1.5;
    if(upgrades.includes("u6")&&(type==="research"||type==="population"))b*=1.5;
    if(upgrades.includes("u7"))b*=2;
    if(knowledge.includes("ke2")&&type==="energy")b*=2.5; if(knowledge.includes("km2")&&type==="minerals")b*=2.5;
    if(knowledge.includes("kr2")&&type==="research")b*=2.5; if(knowledge.includes("kp2")&&type==="population")b*=2.5;
    if(knowledge.includes("kf2")&&type==="fuel")b*=2.5;
    if(knowledge.includes("cx_em")&&(type==="energy"||type==="minerals"))b*=2;
    if(knowledge.includes("cx_rp")&&(type==="research"||type==="population"))b*=2;

  const getProd = useCallback(()=>{

      if(upgrades.includes("u3")&&bld.id==="lab")m*=2; if(upgrades.includes("u4")&&bld.id==="habitat")m*=2;
      if(upgrades.includes("u5")&&["solar","drill","refinery"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u6")&&["lab","habitat","medbay"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u7"))m*=2;
      if(upgrades.includes("u8")&&bld.prod.fuel)m*=2; if(upgrades.includes("u9")&&bld.id==="orbitallab")m*=2;
      if(upgrades.includes("u10")&&bld.layer===2)m*=1.5; if(upgrades.includes("u11")&&bld.id==="oreprocessor")m*=3;
      if(upgrades.includes("u12")&&bld.id==="cryobay")m*=2; if(upgrades.includes("u13")&&bld.id==="warplab")m*=3;
      if(upgrades.includes("u14")&&bld.id==="probefactory")m*=3; if(upgrades.includes("u15")&&bld.prod.fuel)m*=2;
      if(knowledge.includes("k0"))m*=1.15;
      if(knowledge.includes("ke1")&&bld.id==="solar")m*=1.4; if(knowledge.includes("ke2")&&bld.prod.energy)m*=1.2;
      if(knowledge.includes("ke3")&&bld.prod.energy)m*=4;
      if(knowledge.includes("km1")&&bld.id==="drill")m*=1.4;
      if(knowledge.includes("km2")&&["drill","refinery","terraformer"].includes(bld.id))m*=1.2;
      if(knowledge.includes("km3")&&bld.prod.minerals)m*=4;
      if(knowledge.includes("kr1")&&bld.id==="lab")m*=1.4;
      if(knowledge.includes("kr2")&&["lab","medbay","orbitallab"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kr3"))m*=2.5;
      if(knowledge.includes("kp1")&&bld.id==="habitat")m*=1.4;
      if(knowledge.includes("kp2")&&["habitat","medbay","cryobay"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kp3")&&bld.prod.population)m*=4; if(knowledge.includes("kp3"))m*=1.2;
      if(knowledge.includes("kf1")&&bld.id==="launchpad")m*=1.5;
      if(knowledge.includes("kf2")&&bld.prod.fuel)m*=2; if(knowledge.includes("kf3")&&bld.prod.fuel)m*=3;
      if(knowledge.includes("cx_em")&&bld.id==="refinery")m*=3;
      if(knowledge.includes("cx_mr")&&["drill","lab","medbay","orbitallab"].includes(bld.id))m*=2;
      if(knowledge.includes("cx_rp")&&bld.id==="medbay")m*=3;
      if(knowledge.includes("cx_pf")&&bld.prod.fuel)m*=1.5; if(knowledge.includes("cx_fe")&&bld.id==="solarcollector")m*=2;
      if(knowledge.includes("cx_em2")&&(bld.prod.energy||bld.prod.minerals))m*=3;
      if(knowledge.includes("cx_mr2")&&(bld.prod.minerals||bld.prod.research))m*=3;
      if(knowledge.includes("cx_rp2"))m*=3;
      if(knowledge.includes("cx_pf2")&&(bld.prod.fuel||bld.prod.population))m*=3;
      if(knowledge.includes("cx_fe2")&&(bld.prod.fuel||bld.prod.energy))m*=4;
      Object.entries(bld.prod).forEach(([k,v])=>{p[k]+=v*cnt*m;});
    });
    if(knowledge.includes("cx_pf")){const fp=p.population||0;p.fuel+=fp*0.2;p.energy+=fp*0.1;}
    return p;
  },[buildings,upgrades,knowledge,prestigeBonus]);

  useEffect(()=>{

  },[getProd,paused]);

  useEffect(()=>{

      setTicker({icon:ev.icon,text:ev.text,isStory:false});

      setUnseenComms(n=>n+1);
      nextTickRef.current=Date.now()+(3+Math.random()*3)*60*1000;

    return()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(paused) return;
    const iv=setInterval(()=>{
      if(Date.now()<nextTickRef.current) return;

      let ev;
      if(pending.length>0){
        ev=pending[0];
        setStoryLog(prev=>[{...ev,time:elapsed},...prev]);
        setCommsLog(prev=>[{...ev,time:elapsed,kind:"story"},...prev]);
      } else {
        ev=AMBIENT_EVENTS[Math.floor(Math.random()*AMBIENT_EVENTS.length)];
        setCommsLog(prev=>[{...ev,time:elapsed,kind:"ambient"},...prev]);
      }
      setTicker({icon:ev.icon,text:ev.text||ev.title,isStory:!!ev.title,title:ev.title});
      setUnseenComms(n=>n+1);
      nextTickRef.current=Date.now()+(3+Math.random()*3)*60*1000;
    },5000);
    return()=>clearInterval(iv);
  },[paused,buildings,knowledge,layer,storyLog,elapsed]);

  useEffect(()=>{
    STORY_EVENTS.forEach(ev=>{
      if(!storyLog.find(s=>s.id===ev.id)&&ev.trigger(buildings,knowledge,layer)){
        setStoryLog(prev=>[{...ev,time:elapsed},...prev]);
      }
    });
  },[buildings,knowledge,layer,elapsed,storyLog]);

  useEffect(()=>{

        setMilestones(prev=>[...prev,m.id]);
      }
    });

  useEffect(()=>{

        setNewAch(a.name);
        setTimeout(()=>setNewAch(null),3000);
      }

  const prod      = getProd();
  const canAfford = costs => canAffordWith(res,costs);

  const buildingCost = b => {
    const cnt=buildings[b.id]||0, m=Math.pow(1.08,cnt);
    const disc=upgrades.includes("u15")&&b.id==="colonyship"?0.7:1;
    if(b.cost){const c={};Object.entries(b.cost).forEach(([k,v])=>{c[k]=Math.floor(v*m*disc);});return c;}
    return{[b.res]:Math.floor(b.base*m)};
  };
  const buyBuilding = b => {
    const cost=buildingCost(b); if(!canAfford(cost)) return;
    setRes(r=>{const n={...r};Object.entries(cost).forEach(([k,v])=>{n[k]-=v;});return n;});
    setBuildings(p=>({...p,[b.id]:(p[b.id]||0)+1}));
  };
  const sellBuilding = b => {
    const owned=buildings[b.id]||0; if(!owned) return;

    const refund=Object.fromEntries(Object.entries(cost).map(([k,v])=>[k,Math.floor(v*0.5)]));
    setRes(r=>{const n={...r};Object.entries(refund).forEach(([k,v])=>{n[k]+=v;});return n;});
    setBuildings(p=>({...p,[b.id]:owned-1}));
    setTotalSells(s=>s+1);
  };
  const buyUpgrade = u => {
    if(upgrades.includes(u.id)||!canAfford(u.cost)) return;
    if(!Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v)) return;
    setRes(r=>{const n={...r};Object.entries(u.cost).forEach(([k,v])=>{n[k]-=v;});return n;});
    setUpgrades(p=>[...p,u.id]);
  };
  const buyKnowledge = k => {
    const blocked=k.exclusive&&k.exclusive.some(ex=>knowledge.includes(ex));
    if(knowledge.includes(k.id)||!canAfford(k.cost)||blocked) return;
    if(!k.requires.every(r=>knowledge.includes(r))) return;
    setRes(r=>{const n={...r};Object.entries(k.cost).forEach(([key,v])=>{n[key]-=v;});return n;});
    setKnowledge(p=>[...p,k.id]);
  };
  const doPrestige = () => {

    setRes(r=>({...r,[type]:r[type]+power}));

  const applyOffline = (secs,dream) => {

    setRes(r=>{const n={...r};Object.keys(gained).forEach(k=>{n[k]+=gained[k];});return n;});
    setTotalRes(r=>{const n={...r};Object.keys(gained).forEach(k=>{n[k]+=gained[k];});return n;});
    setOfflineModal(null);
  };

  const latestM = milestones.length>0?MILESTONES_DEF.find(m=>m.id===milestones[milestones.length-1]):null;
  const accent  = latestM?latestM.color:"#1e3a5f";
  const resCols = layer>=2?["energy","minerals","research","population","fuel"]:["energy","minerals","research","population"];
  const clickBtns = [
    {type:"energy",    icon:"⚡",label:"Energy",  unlocked:true},
    {type:"minerals",  icon:"⛏", label:"Mine",    unlocked:(buildings.solar||0)>=10},
    {type:"research",  icon:"🔬",label:"Research",unlocked:(buildings.drill||0)>=10},
    {type:"population",icon:"👥",label:"Habitat", unlocked:(buildings.lab||0)>=10},
    {type:"fuel",      icon:"⛽",label:"Fuel",     unlocked:layer>=2},
  ].filter(c=>c.unlocked);

  const visBuildings  = Object.values(BUILDINGS).filter(b=>b.layer<=layer);
  const singleBlds    = visBuildings.filter(b=>!b.multi);
  const multiBlds     = visBuildings.filter(b=>b.multi);
  const visUpgrades   = UPGRADES.filter(u=>u.layer<=layer);

  // badge counts
  const upgradeBadge  = visUpgrades.filter(u=>!upgrades.includes(u.id)&&Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v)&&canAfford(u.cost)).length;
  const knowledgeBadge= KNOWLEDGE.filter(k=>!knowledge.includes(k.id)&&k.requires.every(r=>knowledge.includes(r))&&canAffordWith(res,k.cost)&&!(k.exclusive&&k.exclusive.some(ex=>knowledge.includes(ex)))).length;
  const achieveBadge  = ACHIEVEMENTS.filter(a=>!achievements.includes(a.id)&&a.check(totalRes,buildings,upgrades,prestige,totalClicks,knowledge,totalSells,elapsed,layer)).length;

  const TABS = ["build","upgrade","knowledge","achievements","launch","support"];

  const bCardProps = {buildings,res,prod,canAfford,buildingCost,buyBuilding,sellBuilding};

  return (
    <div style={{fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:"#080d1a",color:"#c8d8f0",padding:"10px 8px",maxWidth:720,margin:"0 auto"}}>

      {paused&&(

        </div>
      )}

      {launchModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000dd",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div style={{background:"#0a1525",border:"1px solid #e06060",borderRadius:14,padding:"24px",maxWidth:420,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:10}}>🚀</div>

            <div style={{background:"#080d1a",borderRadius:8,padding:"10px 14px",marginBottom:16,border:"1px solid #1e3a5f"}}>

            </div>
          </div>

      {offlineModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>

          const hint=l===2?"Build Terraformer":l===3?"Build Station Dock":"";
          return(
            <div key={l} style={{flex:1,background:done?"#0a1a0a":active?lt2.bg:"#080d1a",border:"1px solid "+(done?"#2a4a2a":active?lt2.color:"#1a2a3a"),borderRadius:6,padding:"5px 6px",textAlign:"center",transition:"all 0.3s"}}>
              <div style={{fontSize:10,fontWeight:active?700:400,color:done?"#6fcf97":active?lt2.color:"#3a5a7a"}}>{label}</div>
              {!done&&!active&&<div style={{fontSize:8,color:"#2a4a6a"}}>{hint}</div>}
              {done&&<div style={{fontSize:8,color:"#4a8a4a"}}>Complete</div>}
              {active&&<div style={{fontSize:8,color:lt2.color,fontWeight:600}}>Active</div>}
            </div>
          );
        })}
      </div>

      {won&&(
        <div style={{background:"#0d2a1a",border:"1px solid #27ae60",borderRadius:8,padding:"10px 14px",marginBottom:8,textAlign:"center",color:"#6fcf97",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
          {"Colony Ship ready! "+fmtTime(elapsed)+" elapsed."}
          <button onClick={()=>setLaunchModal(true)} style={{padding:"8px 18px",background:"#8b0000",border:"none",borderRadius:6,color:"#ff9999",cursor:"pointer",fontSize:13,fontWeight:700}}>Launch!</button>
        </div>
      )}

      {/* Resources */}
      <div className={layer>=2?"res-grid-5":"res-grid-4"} style={{marginBottom:8}}>
        {resCols.map(k=>{const r=RES[k];return(
          <div key={k} style={{background:"#0d1a2e",border:"1px solid "+accent,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:16}}>{r.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:r.color}}>{FMT(res[k]||0)}</div>
            <div style={{fontSize:9,color:"#5a7a9a"}}>{"+"+(prod[k]>=0.01?prod[k].toFixed(2):0)+"/s"}</div>
          </div>
        );})}
      </div>

      {/* Click buttons — hold to generate */}
      <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
        {clickBtns.map(c=>(
          <div key={c.type} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div
              className="no-select click-btn"
              onMouseDown={()=>startHold(c.type)}
              onMouseUp={stopHold}
              onMouseLeave={stopHold}
              onTouchStart={e=>{e.preventDefault();startHold(c.type);}}
              onTouchEnd={stopHold}
              style={{width:64,height:64,borderRadius:"50%",background:clickAnim===c.type?"#e6a817":"#0d1a2e",border:"2px solid "+RES[c.type].color,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,transition:"background 0.1s",boxShadow:"0 0 12px "+RES[c.type].color+"44"}}>
              {c.icon}
            </div>
            <span style={{fontSize:9,color:"#5a7a9a"}}>{c.label}</span>
            <span style={{fontSize:9,color:RES[c.type].color}}>{"+"+FMT(getClickPower(c.type))}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:9,color:"#3a5a7a",textAlign:"center",marginBottom:8,minHeight:11}}>
        {layer===1&&(buildings.solar||0)<10&&("Mine: "+(buildings.solar||0)+"/10 Solar Arrays")}
        {layer===1&&(buildings.solar||0)>=10&&(buildings.drill||0)<10&&("Research: "+(buildings.drill||0)+"/10 Drill Rigs")}
        {layer===1&&(buildings.drill||0)>=10&&(buildings.lab||0)<10&&("Habitat: "+(buildings.lab||0)+"/10 Research Labs")}
        {layer>=2&&"Hold any button to generate continuously"}
      </div>

      {/* Ticker */}
      {ticker&&(
        <div style={{background:"#090f1e",border:"1px solid #1e3a5f",borderRadius:8,padding:"8px 10px",marginBottom:8,display:"flex",alignItems:"flex-start",gap:8,position:"relative"}}>
          <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{ticker.icon||"📻"}</span>
          <div style={{flex:1,minWidth:0}}>
            {ticker.isStory&&ticker.title&&<div style={{fontSize:10,fontWeight:700,color:"#6f9ec9",marginBottom:2}}>{ticker.title}</div>}
            <div style={{fontSize:10,color:"#8a9aaa",lineHeight:1.5}}>{ticker.text}</div>
          </div>
          <button onClick={()=>{setLogModal(true);setUnseenComms(0);}} style={{flexShrink:0,padding:"4px 10px",background:"#0d1a2e",border:"1px solid #1e3a5f",borderRadius:4,color:"#6f9ec9",fontSize:11,cursor:"pointer",fontWeight:600,position:"relative"}}>
            Log
            {unseenComms>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#eb5757",color:"#fff",borderRadius:8,fontSize:8,padding:"0 3px",lineHeight:"14px"}}>{unseenComms}</span>}
          </button>
          <button onClick={()=>setTicker(null)} style={{position:"absolute",top:4,right:4,background:"none",border:"none",color:"#3a5a7a",cursor:"pointer",fontSize:12,padding:"2px 4px"}}>X</button>
        </div>
      )}

      {/* Tab bar */}
      <div style={{display:"flex",gap:1,padding:"6px 4px 0",background:"linear-gradient(180deg,#1a0800 0%,#3d1500 40%,#6b2500 70%,#8b3a00 100%)",borderRadius:"10px 10px 0 0",border:"1px solid #7a3010",borderBottom:"none"}}>
        {TABS.map(t=>{
          const badge = t==="upgrade"?upgradeBadge:t==="knowledge"?knowledgeBadge:t==="achievements"?achieveBadge:0;
          return(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"6px 1px",border:"none",borderRadius:"5px 5px 0 0",background:tab===t?"#0d1a2e":"transparent",color:tab===t?"#a0c4ff":"#c1763a",cursor:"pointer",fontSize:9,fontWeight:tab===t?700:400,whiteSpace:"nowrap",position:"relative"}}>
              {t==="achievements"?<span className="tab-label-ach-short"></span>:t==="knowledge"?<span className="tab-label-know-short"></span>:t==="support"?"Support":t==="launch"?"Launch":t.charAt(0).toUpperCase()+t.slice(1)}
              {badge>0&&<Badge count={badge}/>}
            </button>
          );
        })}
      </div>

      {/* Panel */}
      <div style={{background:lt.bg,border:"1px solid "+lt.border,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 8px",minHeight:300,boxShadow:"inset 0 4px 16px #00000080"}}>

        {tab==="build"&&(
          <div>
            {/* Single-resource columns */}
            <div className={layer>=2?"res-grid-5":"res-grid-4"} style={{marginBottom:10}}>
              {resCols.map(rk=>{
                const ri=RES[rk];
                const blds=singleBlds.filter(b=>b.res===rk);
                if(blds.length===0) return null;
                return(
                  <div key={rk} style={{background:COL_BG[rk],border:"1px solid "+COL_BORDER[rk],borderRadius:8,padding:"6px 5px",display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:ri.color,paddingBottom:3,borderBottom:"1px solid "+COL_BORDER[rk]}}>{ri.icon+" "+ri.label}</div>
                    {blds.map(b=><BuildingCard key={b.id} b={b} {...bCardProps}/>)}
                  </div>
                );
              })}
            </div>
            {/* Combined resource buildings */}
            {multiBlds.length>0&&(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#a0c4ff",marginBottom:6,paddingBottom:4,borderBottom:"1px solid #1e3a5f",display:"flex",alignItems:"center",gap:6}}>
                  <span>⚙️</span> Combined Resource Buildings
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
                  {multiBlds.map(b=><BuildingCard key={b.id} b={b} {...bCardProps}/>)}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="upgrade"&&(
          <div className={layer>=2?"res-grid-5":"res-grid-4"}>
            {resCols.map(rk=>{
              const ri=RES[rk];
              const col=visUpgrades.filter(u=>Object.keys(u.cost).includes(rk)||Object.keys(u.req).includes(rk));
              if(col.length===0) return null;
              return(
                <div key={rk} style={{background:COL_BG[rk],border:"1px solid "+COL_BORDER[rk],borderRadius:8,padding:"6px 5px",display:"flex",flexDirection:"column",gap:5}}>
                  <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:ri.color,paddingBottom:3,borderBottom:"1px solid "+COL_BORDER[rk]}}>{ri.icon+" "+ri.label}</div>
                  {col.map(u=>{
                    const owned=upgrades.includes(u.id),afford=canAfford(u.cost);
                    const req=Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v);
                    const wait=(!owned&&req&&!afford)?timeToAfford(res,prod,u.cost):null;
                    return(
                      <div key={u.id} onClick={()=>buyUpgrade(u)} style={{background:"#080d1a",border:"1px solid "+(owned?"#1a4a1a":afford&&req?"#1e4a7f":"#0d1a2e"),borderRadius:6,padding:"6px 7px",opacity:owned||req?1:0.45,cursor:!owned&&req?"pointer":"default",display:"flex",flexDirection:"column",gap:3}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:11,fontWeight:700,color:owned?"#6fcf97":"#c8d8f0",flex:1}}>{u.layer===3?"🌌 ":u.layer===2?"🛸 ":""}{u.name}</span>
                          {owned&&<span style={{color:"#6fcf97",fontSize:12}}>V</span>}
                        </div>
                        <div style={{fontSize:9,color:"#4a7a9a"}}>{u.effect}</div>
                        {!req&&<div style={{fontSize:9,color:"#3a5a7a"}}>{"Need: "+Object.entries(u.req).map(([k,v])=>FMT(v)+RES[k].icon).join(" + ")}</div>}
                        {req&&!owned&&<div style={{display:"flex",flexWrap:"wrap",gap:2}}>{Object.entries(u.cost).map(([k,v])=><Chip key={k} ok={(res[k]||0)>=v} text={RES[k].icon+FMT(v)}/>)}</div>}
                        {wait!==null&&isFinite(wait)&&<div style={{fontSize:8,color:"#8a6a2a"}}>{"~"+FMTT(wait)}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab==="knowledge"&&<KnowledgeTree knowledge={knowledge} res={res} prod={prod} buyKnowledge={buyKnowledge} layer={layer}/>}

        {tab==="achievements"&&(
          <div className="ach-grid">
            {ACHIEVEMENTS.map(a=>{
              const done=achievements.includes(a.id),isMilestone=!!MILESTONE_ACH[a.id];
              return(
                <div key={a.id} style={{background:"#0a1525",border:"1px solid "+(done?isMilestone?"#6a4a1a":"#2a4a1a":"#152030"),borderRadius:8,padding:"8px 10px",opacity:done?1:0.45}}>
                  <div style={{fontSize:15,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
                    <span>{done?"🏆":"🔒"}</span>
                    {isMilestone&&<span style={{fontSize:10,color:"#e6a817"}}>Milestone</span>}
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:done?isMilestone?"#f0c060":"#f2c94c":"#c8d8f0"}}>{a.name}</div>
                  <div style={{fontSize:9,color:"#5a7a9a"}}>{a.desc}</div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="launch"&&(
          <div style={{textAlign:"center",padding:"10px 0"}}>
            <div style={{fontSize:40,marginBottom:8}}>🚀</div>
            <div style={{fontSize:16,fontWeight:700,color:"#a0c4ff",marginBottom:4}}>Colony Ship Program</div>
            <div style={{fontSize:12,color:"#5a7a9a",marginBottom:12,maxWidth:380,margin:"0 auto 12px",lineHeight:1.6}}>Build the Colony Ship in Layer 3. Cross-branch knowledge survives. 1.5x bonus stacks each run.</div>
            {milestones.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginBottom:12}}>
                {milestones.map(mid=>{const m=MILESTONES_DEF.find(x=>x.id===mid);return m?<div key={mid} style={{background:"#0a1220",border:"1px solid "+m.color,borderRadius:6,padding:"4px 10px",fontSize:11,color:m.color}}>{m.badge+" "+m.name}</div>:null;})}
              </div>
            )}
            <div style={{background:"#080d1a",borderRadius:8,padding:"10px 14px",marginBottom:12,border:"1px solid #1e3a5f",maxWidth:340,margin:"0 auto 12px",textAlign:"left"}}>
              <div style={{fontSize:11,color:"#5a7a9a"}}>{"Planet: "+currentPlanet}</div>
              <div style={{fontSize:11,color:"#5a7a9a"}}>{"Layer: "+layer+" of 3"}</div>
              <div style={{fontSize:11,color:"#5a7a9a"}}>{"Time: "+fmtTime(elapsed)}</div>
              <div style={{fontSize:11,color:"#5a7a9a"}}>{"Bonus: "+prestigeBonus.toFixed(1)+"x"}</div>
              <div style={{fontSize:11,color:"#e6a817"}}>{"Legacy Points: "+legacyPoints}</div>
            </div>
            <div style={{fontSize:11,color:"#5a7a9a",marginBottom:4}}>Next destination:</div>
            <div style={{fontSize:14,color:"#a0c4ff",fontWeight:700,marginBottom:12}}>{PLANETS[prestige%PLANETS.length]}</div>
            {won
              ?<button onClick={()=>setLaunchModal(true)} style={{padding:"14px 36px",borderRadius:8,border:"none",background:"#8b0000",color:"#ff9999",cursor:"pointer",fontSize:15,fontWeight:700}}>Launch Colony Ship</button>
              :<div style={{fontSize:12,color:"#4a6a8a"}}>Build the Colony Ship to complete this run.</div>
            }
          </div>
        )}

        {tab==="support"&&<SupportTab/>}
      </div>

      {newAch&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#1a3a5a",border:"1px solid #4a9eff",color:"#a0c4ff",padding:"8px 18px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:999,pointerEvents:"none",boxShadow:"0 4px 20px #000"}}>
          {"Achievement: "+newAch}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
