<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Space Base Race</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080d1a;color:#c8d8f0;font-family:system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
#root{max-width:720px;margin:0 auto;padding:10px 8px;}
textarea,input{font-family:system-ui,sans-serif;}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.no-select{user-select:none;-webkit-user-select:none;}

/* responsive grid helpers */
.res-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.res-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}

@media(max-width:500px){
  .res-grid-4{grid-template-columns:repeat(2,1fr);}
  .res-grid-5{grid-template-columns:repeat(2,1fr);}
  .ach-grid{grid-template-columns:1fr;}
  .header-row{flex-direction:column;align-items:flex-start !important;gap:6px !important;}
  .layer-bar{flex-direction:column;gap:3px !important;}
  .click-btn{width:72px !important;height:72px !important;font-size:26px !important;}
  .tab-label-know{display:none;}
  .tab-label-ach{display:none;}
  .tab-label-know-short::after{content:"Know";}
  .tab-label-ach-short::after{content:"Ach";}
}
@media(min-width:501px){
  .tab-label-know-short::after{content:"Knowledge";}
  .tab-label-ach-short::after{content:"Achievements";}
}

/* Click button effects */
.click-btn-wrap{position:relative;display:inline-flex;}
.click-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px solid currentColor;pointer-events:none;transform:translate(-50%,-50%) scale(0.8);opacity:0.85;animation:ringExpand 0.55s ease-out forwards;}
@keyframes ringExpand{
  0%  {transform:translate(-50%,-50%) scale(0.6);opacity:0.9;}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0;}
}
.click-pulse{animation:btnPulse 0.18s ease-out;}
@keyframes btnPulse{
  0%  {transform:scale(1);}
  40% {transform:scale(1.12);}
  100%{transform:scale(1);}
}

/* Particle burst */
.click-particles{position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;}
.click-particles span{position:absolute;width:6px;height:6px;border-radius:50%;background:currentColor;top:-3px;left:-3px;box-shadow:0 0 6px currentColor;opacity:0;animation:particleFly 0.6s ease-out forwards;}
.click-particles span:nth-child(1){--tx: 38px;--ty:   0px;}
.click-particles span:nth-child(2){--tx: 27px;--ty: -27px;}
.click-particles span:nth-child(3){--tx:  0px;--ty: -38px;}
.click-particles span:nth-child(4){--tx:-27px;--ty: -27px;}
.click-particles span:nth-child(5){--tx:-38px;--ty:   0px;}
.click-particles span:nth-child(6){--tx:-27px;--ty:  27px;}
.click-particles span:nth-child(7){--tx:  0px;--ty:  38px;}
.click-particles span:nth-child(8){--tx: 27px;--ty:  27px;}
@keyframes particleFly{
  0%  {transform:translate(0,0) scale(0.6);opacity:1;}
  60% {opacity:1;}
  100%{transform:translate(var(--tx), var(--ty)) scale(0.2);opacity:0;}
}

/* Layer transition cinematic */
.layer-transition{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#000;animation:layerFade 3.2s ease-in-out forwards;pointer-events:none;}
@keyframes layerFade{
  0%   {opacity:0;}
  10%  {opacity:1;}
  85%  {opacity:1;}
  100% {opacity:0;}
}
.layer-transition .lt-icon{font-size:120px;animation:ltIcon 3.2s ease-out forwards;}
.layer-transition .lt-name{font-size:28px;font-weight:700;letter-spacing:6px;margin-top:18px;opacity:0;animation:ltName 3.2s ease-out forwards;}
.layer-transition .lt-sub{font-size:13px;letter-spacing:3px;color:#5a7a9a;margin-top:8px;opacity:0;animation:ltSub 3.2s ease-out forwards;}
@keyframes ltIcon{
  0%   {transform:scale(0.3) rotate(-30deg);opacity:0;}
  20%  {transform:scale(1.2) rotate(0deg);opacity:1;}
  35%  {transform:scale(1) rotate(0deg);opacity:1;}
  90%  {transform:scale(1) rotate(0deg);opacity:1;}
  100% {transform:scale(1.4) rotate(0deg);opacity:0;}
}
@keyframes ltName{
  0%,25% {opacity:0;letter-spacing:20px;}
  45%    {opacity:1;letter-spacing:6px;}
  90%    {opacity:1;letter-spacing:6px;}
  100%   {opacity:0;letter-spacing:6px;}
}
@keyframes ltSub{
  0%,40% {opacity:0;}
  60%    {opacity:1;}
  90%    {opacity:1;}
  100%   {opacity:0;}
}
.layer-stars{position:absolute;inset:0;background:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#fff,transparent),radial-gradient(1.5px 1.5px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 25%,#fff,transparent),radial-gradient(2px 2px at 15% 65%,#fff,transparent),radial-gradient(1px 1px at 55% 15%,#fff,transparent),radial-gradient(1.5px 1.5px at 90% 90%,#fff,transparent);opacity:0.6;}

/* High Contrast Mode — .hc on body; !important overrides React inline styles */
body.hc{background:#000!important;color:#fff!important;}
body.hc div,body.hc section{background:#0a0a0a!important;border-color:#fff!important;box-shadow:none!important;}
body.hc *{color:#fff!important;text-shadow:none!important;}
body.hc button{background:#111!important;color:#fff!important;border:1px solid #fff!important;box-shadow:none!important;}
body.hc button:disabled,body.hc button[disabled]{opacity:0.35!important;border-color:#888!important;color:#888!important;}
body.hc input[type="range"]{accent-color:#fff!important;}
body.hc input,body.hc textarea{background:#111!important;color:#fff!important;border-color:#fff!important;}
body.hc .xp-popup{background:#000!important;border:1px solid #fff!important;border-left:3px solid #ffcc00!important;color:#ffcc00!important;}
body.hc .xp-popup .xp-reason{color:#ccc!important;}
/* SVG knowledge tree — invert fills since they use presentation attributes not CSS */
body.hc svg{filter:invert(1) hue-rotate(180deg);}

/* Building idle animations — only play when the building is producing (owned > 0) */
@keyframes bldSpin   { 0%{transform:rotate(0deg)}   100%{transform:rotate(360deg)} }
@keyframes bldBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes bldPulse  { 0%,100%{transform:scale(1);opacity:0.85} 50%{transform:scale(1.2);opacity:1} }
@keyframes bldSway   { 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }
@keyframes bldFloat  { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(2px)} }
.bld-icon{display:inline-block;font-size:15px;line-height:1;}

/* XP popups */
.xp-popup-stack{position:fixed;top:64px;right:8px;z-index:1500;display:flex;flex-direction:column;gap:3px;align-items:flex-end;pointer-events:none;}
.xp-popup{background:#0a1a2acc;border:1px solid #4a6a8a;border-left:2px solid #e6a817;border-radius:4px;padding:3px 7px;color:#c8901a;font-weight:600;font-size:10px;white-space:nowrap;opacity:0;transform:translateX(40px);animation:xpFly 1.2s ease-out forwards;}
.xp-popup .xp-reason{color:#7a9abf;font-weight:400;font-size:9px;margin-left:5px;}
@keyframes xpFly{
  0%   {opacity:0; transform:translateX(40px);}
  15%  {opacity:0.7; transform:translateX(0);}
  70%  {opacity:0.7; transform:translateX(0);}
  100% {opacity:0; transform:translateX(-10px);}
}
</style>
</head>
<body>
<div id="root"><div style="color:#6f9ec9;padding:40px;text-align:center;font-size:14px;">Loading Space Base Race...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useCallback, useRef, useMemo } = React;

const FMT = n => {
  if (n>=1e12) return (n/1e12).toFixed(2)+"T";
  if (n>=1e9)  return (n/1e9).toFixed(2)+"B";
  if (n>=1e6)  return (n/1e6).toFixed(2)+"M";
  if (n>=1e3)  return (n/1e3).toFixed(2)+"K";
  return Math.floor(n).toString();
};
const FMTT = s => {
  if (!isFinite(s)||s<0) return "inf";
  if (s<60)   return Math.ceil(s)+"s";
  if (s<3600) return Math.ceil(s/60)+"m";
  return (s/3600).toFixed(1)+"h";
};
const polar = (cx,cy,r,deg) => { const a=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; };
const timeToAfford = (res,prod,cost) => {
  const w = Object.entries(cost).map(([k,v]) => { const n=v-(res[k]||0); if(n<=0) return 0; const r=prod[k]||0; return r<=0?Infinity:n/r; });
  const mx = Math.max(...w); return isFinite(mx)?mx:null;
};
const canAffordWith = (res,costs) => Object.entries(costs).every(([k,v])=>(res[k]||0)>=v);
const initRes      = () => ({energy:0,minerals:0,research:0,population:0,fuel:0});
const initBuildings = () => ({});
const isSingleRes  = b => !b.cost && Object.keys(b.prod).length===1;
const isMultiRes   = b => b.cost || Object.keys(b.prod).length>1;

// ── Audio Engine ───────────────────────────────────────────────────────────
const AudioEngine = (() => {
  let ctx = null, masterGain = null, sfxGain = null, musicGain = null;
  let musicNodes = [], musicStarted = false;
  const settings = {master:0.6, sfx:0.7, music:0.35, muted:false};
  try {
    const saved = localStorage.getItem("sbr_audio");
    if (saved) Object.assign(settings, JSON.parse(saved));
  } catch(e){}
  const save = () => { try{localStorage.setItem("sbr_audio",JSON.stringify(settings));}catch(e){} };

  const ensure = () => {
    if (ctx) return ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = settings.muted?0:settings.master;
      sfxGain    = ctx.createGain(); sfxGain.gain.value = settings.sfx;
      musicGain  = ctx.createGain(); musicGain.gain.value = settings.music;
      sfxGain.connect(masterGain); musicGain.connect(masterGain); masterGain.connect(ctx.destination);
    } catch(e){ ctx = null; }
    return ctx;
  };
  const resume = () => { const c=ensure(); if(c&&c.state==="suspended") c.resume(); };

  const tone = (freq, dur, type="sine", vol=0.3, attack=0.005, decay=null) => {
    const c = ensure(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type; osc.frequency.value = freq;
    const t = c.currentTime, dEnd = decay||dur;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dEnd);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t); osc.stop(t+dEnd+0.05);
  };
  const noise = (dur, vol=0.2, filterFreq=2000) => {
    const c = ensure(); if (!c) return;
    const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(data.length*0.3));
    const src = c.createBufferSource(); src.buffer = buf;
    const filter = c.createBiquadFilter(); filter.type="lowpass"; filter.frequency.value=filterFreq;
    const g = c.createGain(); g.gain.value = vol;
    src.connect(filter); filter.connect(g); g.connect(sfxGain);
    src.start();
  };
  const sweep = (f1, f2, dur, type="sine", vol=0.3) => {
    const c = ensure(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type; osc.frequency.setValueAtTime(f1, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, c.currentTime+dur);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
    osc.connect(g); g.connect(sfxGain);
    osc.start(); osc.stop(c.currentTime+dur+0.05);
  };

  // SFX library — different freq per resource for variety
  const RES_FREQS = {energy:660, minerals:330, research:520, population:440, fuel:280};
  const sfx = {
    click: (resType="energy") => {
      const f = RES_FREQS[resType] || 440;
      tone(f, 0.06, "triangle", 0.18, 0.002, 0.08);
      tone(f*2, 0.04, "sine", 0.08, 0.002, 0.05);
    },
    buy:    () => { tone(523, 0.08, "triangle", 0.22); setTimeout(()=>tone(784, 0.12, "triangle", 0.18), 50); },
    sell:   () => { tone(440, 0.1, "sawtooth", 0.15); setTimeout(()=>tone(330, 0.12, "sawtooth", 0.12), 60); },
    achieve:() => { [523, 659, 784, 1047].forEach((f,i)=>setTimeout(()=>tone(f, 0.18, "triangle", 0.2),i*80)); },
    layerUp:() => { [261, 329, 392, 523, 659, 784].forEach((f,i)=>setTimeout(()=>tone(f, 0.3, "triangle", 0.25),i*100)); noise(0.5, 0.08, 800); },
    launch: () => {
      sweep(80, 30, 2.5, "sawtooth", 0.35); noise(2.5, 0.18, 500);
      setTimeout(()=>{ [523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>tone(f, 0.5, "triangle", 0.22),i*150)); }, 1500);
    },
    offline:() => { tone(587, 0.15, "sine", 0.2); setTimeout(()=>tone(880, 0.2, "sine", 0.18), 100); setTimeout(()=>tone(1175, 0.25, "sine", 0.16), 220); },
    knowledge:() => { tone(880, 0.1, "sine", 0.18); setTimeout(()=>tone(1175, 0.12, "sine", 0.16), 60); setTimeout(()=>tone(1568, 0.15, "sine", 0.14), 130); },
    error:  () => { tone(220, 0.08, "square", 0.12); setTimeout(()=>tone(180, 0.1, "square", 0.1), 50); },
    pause:  () => { sweep(880, 220, 0.3, "sine", 0.18); },
    resume: () => { sweep(220, 880, 0.3, "sine", 0.18); },
  };

  const play = (name, ...args) => {
    if (settings.muted) return;
    const c = ensure(); if (!c) return;
    if (c.state==="suspended") c.resume();
    if (sfx[name]) sfx[name](...args);
  };

  // Ambient music — slow evolving pad with layer-aware tonality
  const startMusic = () => {
    const c = ensure(); if (!c || musicStarted) return;
    musicStarted = true;
    // Three detuned oscillators for a rich pad
    const freqs = [110, 165, 220]; // A2, E3, A3
    freqs.forEach((f, i) => {
      const osc = c.createOscillator(), g = c.createGain(), lfo = c.createOscillator(), lfoG = c.createGain();
      osc.type = "sine"; osc.frequency.value = f;
      g.gain.value = 0.06;
      lfo.frequency.value = 0.05 + i*0.03; lfoG.gain.value = 0.03;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      const filter = c.createBiquadFilter(); filter.type="lowpass"; filter.frequency.value = 800; filter.Q.value=1.5;
      osc.connect(filter); filter.connect(g); g.connect(musicGain);
      osc.start(); lfo.start();
      musicNodes.push(osc, lfo);
    });
    // Slow shimmer
    const shimmer = c.createOscillator(), sg = c.createGain(), sLfo = c.createOscillator(), sLfoG = c.createGain();
    shimmer.type = "triangle"; shimmer.frequency.value = 880;
    sg.gain.value = 0.012;
    sLfo.frequency.value = 0.08; sLfoG.gain.value = 0.008;
    sLfo.connect(sLfoG); sLfoG.connect(sg.gain);
    shimmer.connect(sg); sg.connect(musicGain);
    shimmer.start(); sLfo.start();
    musicNodes.push(shimmer, sLfo);
  };
  const stopMusic = () => {
    musicNodes.forEach(n=>{ try{n.stop();}catch(e){} });
    musicNodes = []; musicStarted = false;
  };

  const setMaster = v => { settings.master=v; if(masterGain&&!settings.muted) masterGain.gain.value=v; save(); };
  const setSfx    = v => { settings.sfx=v; if(sfxGain) sfxGain.gain.value=v; save(); };
  const setMusic  = v => { settings.music=v; if(musicGain) musicGain.gain.value=v; save(); };
  const setMuted  = m => { settings.muted=m; if(masterGain) masterGain.gain.value=m?0:settings.master; save(); };
  const getSettings = () => ({...settings});

  return {play, resume, startMusic, stopMusic, setMaster, setSfx, setMusic, setMuted, getSettings};
})();

// ── XP Store ───────────────────────────────────────────────────────────────
const XPStore = (() => {
  const KEY = "sbr_xp_v1";
  const defaults = {
    xp: 0,
    totalEarned: 0,             // lifetime XP earned, never decreases
    ownedRanks: [],             // rank ids
    equippedRank: null,         // rank id or null
    firstTime: {                // one-time flags, never reset
      buildings: {},            // id -> true
      upgrades: {},             // id -> true
      layers: {},               // 2|3 -> true
      storyEvents: {},          // id -> true
      planets: {},              // planet name -> true
    },
    bestRunSecs: null,          // fastest colony ship launch
    dailyStreak: 0,
    lastDailyDate: null,        // YYYY-MM-DD
    achievementUnlocks: {       // mirror of in-game achievements for first-time XP
      naked: false,
    },
    totalLaunches: 0,           // every Colony Ship launch
    everLaunchedWithRank: false,// has the player ever launched with any rank equipped
    runningNakedDone: false,    // has the player launched without a rank, after first launching with one
  };
  let state = {...defaults};
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // shallow merge with defaults so new fields appear safely
      state = {...defaults, ...parsed,
        firstTime: {...defaults.firstTime, ...(parsed.firstTime||{})},
        achievementUnlocks: {...defaults.achievementUnlocks, ...(parsed.achievementUnlocks||{})},
      };
    }
  } catch(e){}
  const save = () => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} };
  const get = () => ({...state, firstTime:{...state.firstTime}, ownedRanks:[...state.ownedRanks]});
  const award = (n, _reason) => { if (!n||n<=0) return 0; state.xp += n; state.totalEarned += n; save(); return n; };
  const spend = n => { if (state.xp < n) return false; state.xp -= n; save(); return true; };
  const ownRank = id => { if (!state.ownedRanks.includes(id)) { state.ownedRanks.push(id); save(); } };
  const equipRank = id => { state.equippedRank = id; save(); };
  const markFirst = (group, id) => {
    if (!state.firstTime[group]) state.firstTime[group] = {};
    if (state.firstTime[group][id]) return false;
    state.firstTime[group][id] = true; save(); return true;
  };
  const setBest = secs => { if (state.bestRunSecs === null || secs < state.bestRunSecs) { const prev = state.bestRunSecs; state.bestRunSecs = secs; save(); return prev; } return null; };
  const checkDaily = () => {
    const today = new Date().toISOString().slice(0,10);
    if (state.lastDailyDate === today) return {awarded:0, streak:state.dailyStreak};
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (state.lastDailyDate === yesterday) state.dailyStreak += 1;
    else state.dailyStreak = 1;
    state.lastDailyDate = today;
    save();
    return {awarded:state.dailyStreak*10, streak:state.dailyStreak};
  };
  const markAchievement = id => { if (state.achievementUnlocks[id]) return false; state.achievementUnlocks[id]=true; save(); return true; };
  const recordLaunch = (rankIdAtLaunch) => {
    state.totalLaunches += 1;
    let nakedJustHappened = false;
    if (rankIdAtLaunch) {
      state.everLaunchedWithRank = true;
    } else if (state.everLaunchedWithRank && !state.runningNakedDone) {
      state.runningNakedDone = true;
      nakedJustHappened = true;
    }
    save();
    return {totalLaunches: state.totalLaunches, nakedJustHappened};
  };
  const reset = () => { state = JSON.parse(JSON.stringify(defaults)); save(); };
  return {get, award, spend, ownRank, equipRank, markFirst, setBest, checkDaily, markAchievement, recordLaunch, reset};
})();

// ── Ranks (v0.6: Common + Uncommon only) ────────────────────────────────────
const RANK_TIERS = {
  common:   {label:"Common",   color:"#9aa8b8", border:"#3a4a5a"},
  uncommon: {label:"Uncommon", color:"#6fcf97", border:"#2a5a3a"},
  rare:     {label:"Rare",     color:"#6f9ec9", border:"#2a4a6a"}, // reserved for v0.7
  legendary:{label:"Legendary",color:"#e6a817", border:"#5a4a1a"},
  mythic:   {label:"Mythic",   color:"#b07ec9", border:"#4a2a5a"},
};

// effects schema:
//   prodMult: {all?:n, energy?:n, ...}  (multiplicative, 1.10 = +10%)
//   clickMult: n                        (multiplicative)
//   buildingCostMult: n                 (multiplicative on full cost)
//   sellRefundPct: 0..1                 (overrides default 0.5)
//   startResources: {res:n, ...}        (added at start of each new run)
//   special: string                     (handled in code by id where needed)
const RANKS = [
  // ── Common ──
  {id:"foreman",     tier:"common", icon:"🛠",  name:"Foreman",        cost:250,   effect:{prodMult:{all:1.10}}, desc:"+10% all production"},
  {id:"quartermaster",tier:"common",icon:"📦", name:"Quartermaster",  cost:400,   effect:{clickMult:1.25},      desc:"+25% click power"},
  {id:"power_eng",   tier:"common", icon:"⚡", name:"Power Engineer", cost:800,   effect:{prodMult:{energy:1.15}}, desc:"+15% energy production"},
  {id:"driller",     tier:"common", icon:"⛏", name:"Driller",        cost:800,   effect:{prodMult:{minerals:1.15}}, desc:"+15% minerals production"},

// HoldButton — click for one action, hold for repeating (every 120ms after a 280ms initial delay).
// Suppresses synthetic mouse events triggered by touch on mobile to prevent double-fire.
function HoldButton({onAction, disabled, style, children}) {
  const ref = React.useRef({startTimer:null, repeatTimer:null, touchUntil:0});
  const start = () => {
    if (disabled) return;
    onAction(); // fire immediately on press
    ref.current.startTimer = setTimeout(()=>{
      ref.current.repeatTimer = setInterval(onAction, 120);
    }, 350);
  };
  const stop = () => {
    if (ref.current.startTimer)  { clearTimeout(ref.current.startTimer);   ref.current.startTimer = null; }
    if (ref.current.repeatTimer) { clearInterval(ref.current.repeatTimer); ref.current.repeatTimer = null; }
  };
  const onMouseDown = () => {
    // Mobile browsers emit synthetic mousedown ~300ms after a tap. Skip it.
    if (Date.now() < ref.current.touchUntil) return;
    start();
  };
  const onMouseUp = () => {
    if (Date.now() < ref.current.touchUntil) return;
    stop();
  };
  const onTouchStart = e => {
    e.preventDefault();
    ref.current.touchUntil = Date.now() + 600;
    start();
  };
  const onTouchEnd = e => {
    e.preventDefault();
    ref.current.touchUntil = Date.now() + 600;
    stop();
  };
  React.useEffect(()=>stop, []); // cleanup on unmount
  return (
    <button
      onMouseDown={onMouseDown} onMouseUp={onMouseUp} onMouseLeave={stop}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd}
      disabled={disabled}
      style={style}>
      {children}
    </button>
  );
}

function BuildingCard({b, buildings, res, prod, canAfford, buildingCost, buyBuilding, sellBuilding, knowledge}) {
  const cost   = buildingCost(b);
  const afford = canAfford(cost);
  const owned  = buildings[b.id] || 0;
  const buildOk = !b.requires || Object.entries(b.requires).every(([id,n])=>(buildings[id]||0)>=n);
  const knowOk  = !b.knowReq || (b.knowReq==="tier3" && ["ke3","km3","kr3","kp3","kf3"].some(id=>(knowledge||[]).includes(id)));
  const reqsOk = buildOk && knowOk;
  const wait   = !afford && reqsOk ? timeToAfford(res, prod, cost) : null;
  const layerIcon = b.layer===3?"🌌 ":b.layer===2?"🛸 ":"";
  const canBuy = afford && reqsOk;
  return (
    <div style={{background:"#080d1a",border:"1px solid "+(canBuy?"#1e4a7f":"#0d1a2e"),borderRadius:6,padding:"6px 7px",opacity:canBuy||owned?1:0.5,display:"flex",flexDirection:"column",gap:3}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#c8d8f0",lineHeight:1.3,flex:1}}>
          {owned > 0 && BUILDING_ICONS[b.id] && (
            <span className="bld-icon" style={{marginRight:4,animation:`${BUILDING_ICONS[b.id].anim} ${BUILDING_ICONS[b.id].dur}s ease-in-out infinite`}}>
              {BUILDING_ICONS[b.id].icon}
            </span>
          )}
          {layerIcon}{b.name}
        </span>
        <span style={{fontSize:11,color:"#a0c4ff",fontWeight:700,marginLeft:4}}>x{owned}</span>
      </div>
      <div style={{fontSize:9,color:"#4a6a8a"}}>{b.desc.slice(0,55)+(b.desc.length>55?"...":"")}</div>
      <div style={{fontSize:9,color:"#4a7a9a"}}>{Object.entries(b.prod).map(([k,v])=>"+"+( v*Math.max(owned,1)).toFixed(1)+RES[k].icon+"/s").join(" ")}</div>
      {b.requires && !buildOk && (
        <div style={{fontSize:9,color:"#8a6a2a",lineHeight:1.4}}>
          🔒 {Object.entries(b.requires).map(([id,n])=>{
            const have=buildings[id]||0, name=BUILDINGS[id]?.name||id;
            return (have>=n?"✓":"")+" "+n+"× "+name+(have<n?" ("+have+"/"+n+")":"");
          }).join(" • ")}
        </div>
      )}
      {b.knowReq==="tier3" && !knowOk && (
        <div style={{fontSize:9,color:"#8a6a2a",lineHeight:1.4}}>
          🧠 Requires any tier-3 knowledge node
        </div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
        {Object.entries(cost).map(([k,v]) => <Chip key={k} ok={(res[k]||0)>=v} text={RES[k].icon+FMT(v)}/>)}
      </div>
      {wait!==null && isFinite(wait) && <div style={{fontSize:8,color:"#8a6a2a"}}>{"~"+FMTT(wait)}</div>}
      <div style={{display:"flex",gap:3,marginTop:1}}>
        <HoldButton onAction={()=>buyBuilding(b)} disabled={!canBuy} style={{flex:1,padding:"4px 0",borderRadius:4,border:"1px solid "+(canBuy?"#1e4a8f":"#0d1a2e"),background:canBuy?"#0d2a4a":"#080d1a",color:canBuy?"#4a9eff":"#1a3a5a",cursor:canBuy?"pointer":"not-allowed",fontSize:11,fontWeight:700}}>Buy</HoldButton>
        <HoldButton onAction={()=>sellBuilding(b)} disabled={!owned} style={{flex:1,padding:"4px 0",borderRadius:4,border:"1px solid "+(owned?"#5a1515":"#0d1a2e"),background:owned?"#2a0d0d":"#080d1a",color:owned?"#eb5757":"#1a3a5a",cursor:owned?"pointer":"not-allowed",fontSize:11,fontWeight:700}}>Sell</HoldButton>
      </div>
    </div>
  );
}
