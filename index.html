// ── KnowledgeTree ──────────────────────────────────────────────────────────
function KnowledgeTree({knowledge, res, prod, buyKnowledge, layer}) {
  const [hov,setHov]   = useState(null);
  const [zoom,setZoom] = useState(1);
  const [pan,setPan]   = useState({x:0,y:0});
  const [drag,setDrag] = useState(false);
  const dragRef = useRef(null);
  const CX=290,CY=290,W=580,H=580;
  const RR=[0,80,155,235,310];

  const nodePos = useMemo(() => {
    const p={};
    KNOWLEDGE.forEach(k => {
      if (k.ring===0) { p[k.id]={x:CX,y:CY}; }
      else { const r=(k.ring===2&&k.crossBridge)?RR[2]-10:RR[k.ring]; p[k.id]=polar(CX,CY,r,k.angle); }
    });
    return p;
  }, []);

  const edgeList = useMemo(() => {
    const e=[];
    KNOWLEDGE.forEach(k => { k.requires.forEach(r => { e.push([r,k.id,k.branch]); }); });
    return e;
  }, []);

  const checkBlocked     = id => { const k=KNOWLEDGE.find(x=>x.id===id); if(!k||!k.exclusive||!k.exclusive.length) return false; return k.exclusive.some(ex=>knowledge.includes(ex)); };
  const checkLayerLocked = id => ["kf1","kf2","kf3"].includes(id) && layer<2;

  const onWheel     = e => { e.preventDefault(); setZoom(z=>Math.min(4,Math.max(0.4,z*(e.deltaY>0?0.85:1.18)))); };
  const onMouseDown = e => { if(e.button!==0) return; setDrag(true); dragRef.current={x:e.clientX-pan.x,y:e.clientY-pan.y}; };
  const onMouseMove = e => { if(!drag||!dragRef.current) return; setPan({x:e.clientX-dragRef.current.x,y:e.clientY-dragRef.current.y}); };
  const onMouseUp   = () => setDrag(false);

  const onTouchStart = e => { if(e.touches.length!==1) return; setDrag(true); dragRef.current={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y}; };
  const onTouchMove  = e => { if(!drag||!dragRef.current||e.touches.length!==1) return; e.preventDefault(); setPan({x:e.touches[0].clientX-dragRef.current.x,y:e.touches[0].clientY-dragRef.current.y}); };

  const branchLabels = [{a:0,l:"Energy",c:"#e6a817"},{a:72,l:"Minerals",c:"#7c9e6f"},{a:144,l:"Research",c:"#6f9ec9"},{a:216,l:"Population",c:"#b07ec9"},{a:288,l:"Fuel",c:"#e06060"}];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:10,color:"#3a5a7a"}}>Pinch/scroll to zoom, drag to pan. <span style={{color:"#eb5757"}}>Ring-3 nodes are exclusive.</span></span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setZoom(z=>Math.min(4,z*1.25))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>+</button>
          <button onClick={()=>setZoom(z=>Math.max(0.4,z*0.8))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>-</button>
          <button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:11}}>Reset</button>
        </div>
      </div>
      <div style={{overflow:"hidden",borderRadius:8,border:"1px solid #1e3a5f",height:460,cursor:drag?"grabbing":"grab",background:"#080d1a",touchAction:"none"}}
        onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onMouseUp}>
        <svg width={W} height={H} style={{display:"block",transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")",transformOrigin:"center center",transition:drag?"none":"transform 0.05s"}}>
          <defs>
            <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="glow1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect width={W} height={H} fill="#080d1a"/>
          {RR.slice(1).map((r,i)=><circle key={i} cx={CX} cy={CY} r={r} fill="none" stroke="#1a2a3a" strokeWidth="0.5" strokeDasharray="2 8"/>)}
          {[0,72,144,216,288].map(a=>{const pt=polar(CX,CY,RR[4]+15,a);return<line key={a} x1={CX} y1={CY} x2={pt.x} y2={pt.y} stroke="#1a2535" strokeWidth="0.5"/>;})}
          {branchLabels.map(({a,l,c})=>{const pt=polar(CX,CY,RR[4]+24,a);return<text key={a} x={pt.x} y={pt.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={c} fontWeight="700" opacity={l==="Fuel"&&layer<2?0.3:0.7}>{l}</text>;})}
          {edgeList.map(([a,b,branch],i)=>{
            const p1=nodePos[a],p2=nodePos[b]; if(!p1||!p2) return null;
            const both=knowledge.includes(a)&&knowledge.includes(b),bc=BRANCH_COLOR[branch]||"#4a9eff";
            return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={both?bc:"#1e2e3e"} strokeWidth={both?2:1} strokeOpacity={both?0.7:0.35} strokeDasharray={both?"none":"3 5"}/>;
          })}
          {KNOWLEDGE.map(k=>{
            const p=nodePos[k.id]; if(!p) return null;
            const owned=knowledge.includes(k.id), prereq=k.requires.every(r=>knowledge.includes(r));
            const blocked=checkBlocked(k.id)&&!owned, ll=checkLayerLocked(k.id);
            const afford=canAffordWith(res,k.cost), isH=hov===k.id;
            const bc=BRANCH_COLOR[k.branch]||"#4a9eff";
            const isCross=k.crossBridge||k.branch.startsWith("cross_");
            const nr=k.ring===0?22:isCross?16:k.ring===3?18:15;
            const opacity=(blocked||ll)?0.12:owned?1:prereq?0.95:0.25;
            const canBuy=prereq&&!owned&&!blocked&&!ll&&afford;
            const ttW=(!owned&&prereq&&!blocked&&!ll)?timeToAfford(res,prod,k.cost):null;
            const tw=184, th=ttW!==null?108:(prereq&&!owned)?90:72;
            const tx=Math.min(Math.max(p.x-tw/2,2),W-tw-2);
            const rawTy=p.y+nr+10, tty=rawTy+th>H-4?p.y-nr-th-8:rawTy;
            const nStroke=owned?bc:(prereq&&!blocked&&!ll)?bc:"#1e2e3e";
            const nFill=owned?"#0d2a1a":(prereq&&afford)?"#0d1525":"#080d1a";
            const nFilter=(owned||isH)?"url(#glow1)":undefined;
            const iconChar=ll?"🔒":blocked?"X":owned?"V":k.ring===0?"★":isCross?"◈":"·";
            const iconFill=(blocked||ll)?"#3a3a3a":owned?bc:prereq?"#8ab4d4":"#2a4a6a";
            const labelFill=(blocked||ll)?"#2a2a2a":owned?bc:prereq?"#6a8aaa":"#2a3a4a";
            return (
              <g key={k.id} opacity={opacity} style={{cursor:canBuy?"pointer":"default"}}
                onClick={()=>{if(canBuy) buyKnowledge(k);}}
                onMouseEnter={()=>setHov(k.id)} onMouseLeave={()=>setHov(null)}>
                {(owned||isH)&&<circle cx={p.x} cy={p.y} r={nr+9} fill={bc} fillOpacity="0.1" filter="url(#glow2)"/>}
                {isCross?(
                  <g transform={"rotate(45,"+p.x+","+p.y+")"}>
                    <rect x={p.x-nr*0.75} y={p.y-nr*0.75} width={nr*1.5} height={nr*1.5} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter} rx="2"/>
                  </g>
                ):(
                  <circle cx={p.x} cy={p.y} r={nr} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter}/>
                )}
                <text x={p.x} y={p.y+1} textAnchor="middle" dominantBaseline="middle" fontSize={k.ring===0?"13":"10"} fill={iconFill}>{iconChar}</text>
                <text x={p.x} y={p.y+nr+9} textAnchor="middle" fontSize="7" fill={labelFill} fontWeight={owned?"700":"400"}>{k.name.length>18?k.name.slice(0,17)+"...":k.name}</text>
                {isH&&(
                  <g>
                    <rect x={tx} y={tty} width={tw} height={th} rx={5} fill="#080e1c" stroke={(blocked||ll)?"#5a1a1a":bc} strokeWidth="1" opacity="0.98"/>
                    <text x={tx+8} y={tty+13} fontSize="9" fontWeight="700" fill={(blocked||ll)?"#eb5757":bc}>{k.name}</text>
                    <text x={tx+8} y={tty+24} fontSize="7.5" fill="#4a6a8a" fontStyle="italic">{k.desc.length>34?k.desc.slice(0,33)+"...":k.desc}</text>
                    <text x={tx+8} y={tty+37} fontSize="8" fill={(blocked||ll)?"#888":"#c8d8f0"}>{k.effect}</text>
                    {ll&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Requires Orbital layer</text>}
                    {!ll&&blocked&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Blocked by another choice</text>}
                    {!ll&&!blocked&&owned&&<text x={tx+8} y={tty+52} fontSize="8" fill="#6fcf97">Unlocked</text>}
                    {!ll&&!blocked&&!owned&&prereq&&(
                      <g>
                        <text x={tx+8} y={tty+52} fontSize="7.5" fill="#5a7a9a">Cost:</text>
                        {Object.entries(k.cost).map(([rk,v],ci)=><text key={rk} x={tx+32+ci*44} y={tty+52} fontSize="7.5" fill={(res[rk]||0)>=v?"#6fcf97":"#eb5757"}>{RES[rk].icon+FMT(v)}</text>)}
                        {ttW!==null&&<text x={tx+8} y={tty+66} fontSize="7.5" fill={ttW===0?"#6fcf97":"#e6a817"}>{ttW===0?"Ready!":"~"+FMTT(ttW)+" to afford"}</text>}
                        <text x={tx+8} y={tty+80} fontSize="7.5" fill={afford?"#6fcf97":"#eb5757"}>{afford?"Click to unlock":"Cannot afford yet"}</text>
                      </g>
                    )}
                    {!ll&&!blocked&&!owned&&!prereq&&(
                      <text x={tx+8} y={tty+52} fontSize="7.5" fill="#3a5a7a">
                        {"Needs: "+k.requires.slice(0,3).map(rid=>{const kk=KNOWLEDGE.find(x=>x.id===rid);return kk?kk.name.slice(0,11):"?";}).join(", ")}
                      </text>
                    )}
                    {k.exclusive&&k.exclusive.length>0&&!owned&&!blocked&&!ll&&(
                      <text x={tx+8} y={tty+th-6} fontSize="7" fill="#c07040" fontStyle="italic">
                        {"Blocks: "+k.exclusive.map(ex=>{const kk=KNOWLEDGE.find(x=>x.id===ex);return kk?kk.name.slice(0,10):"?";}).join(", ")}
                      </text>
                    )}
                  </g>
                )}
              </g>
            );
          })}
          <text x={W-4} y={H-4} textAnchor="end" fontSize="8" fill="#3a5a7a">{knowledge.length+"/"+KNOWLEDGE.length+" unlocked"}</text>
        </svg>
      </div>
    </div>
  );
}

// ── RanksContent ───────────────────────────────────────────────────────────
// Reusable rank list — used in both the header modal and the Ranks tab
function RanksContent({xpData, setXpData, activeRank, prestige}) {
  const unlockCtx = {
    totalLaunches: xpData.totalLaunches || 0,
    runningNakedDone: !!xpData.runningNakedDone,
    uniquePlanets: Object.keys(xpData.firstTime?.planets || {}).length,
  };
  const visibleCount = RANKS.filter(r=>!r.secret || xpData.ownedRanks.includes(r.id) || (r.unlockCheck && r.unlockCheck(unlockCtx))).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:0,minHeight:0,flex:1}}>
      <div style={{paddingBottom:8,borderBottom:"1px solid #1e3a5f",marginBottom:10}}>
        <div style={{fontSize:11,color:"#5a7a9a"}}>{"Lifetime: "+FMT(xpData.totalEarned)+"  •  Available: "+FMT(xpData.xp)+"  •  Owned: "+xpData.ownedRanks.length+"/"+visibleCount}</div>
      </div>

      {/* Active rank + Unequip button */}
      <div style={{background:"#080d1a",border:"1px solid "+(activeRank?RANK_TIERS[activeRank.tier].color:"#1e3a5f"),borderRadius:8,padding:"8px 10px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:22}}>{activeRank?activeRank.icon:"○"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:activeRank?RANK_TIERS[activeRank.tier].color:"#5a7a9a"}}>{activeRank?activeRank.name:"No Rank"}</div>
          <div style={{fontSize:10,color:"#8a9aaa",lineHeight:1.4}}>{activeRank?activeRank.desc:"You're running naked. Earn XP, then equip a Rank for an edge."}</div>
        </div>
        {activeRank&&(
          <button onClick={()=>{XPStore.equipRank(null); setXpData(XPStore.get());}} style={{padding:"5px 10px",background:"#2a0d0d",border:"1px solid #5a1515",borderRadius:5,color:"#eb5757",fontSize:10,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>Unequip</button>
        )}
      </div>

      {/* Rank list grouped by tier */}
      <div style={{overflowY:"auto",flex:1,paddingRight:2,minHeight:0}}>
        {Object.entries(RANK_TIERS).map(([tierKey, tierInfo])=>{
          const tierRanks = RANKS.filter(r => r.tier === tierKey).filter(r=>{
            if (!r.secret) return true;
            if (xpData.ownedRanks.includes(r.id)) return true;
            return r.unlockCheck ? r.unlockCheck(unlockCtx) : false;
          });
          if (tierRanks.length === 0) return null;
          return (
            <div key={tierKey} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:tierInfo.color,marginBottom:5,letterSpacing:1,textTransform:"uppercase"}}>{tierInfo.label}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr",gap:5}}>
                {tierRanks.map(rank=>{
                  const owned    = xpData.ownedRanks.includes(rank.id);
                  const equipped = xpData.equippedRank === rank.id;
                  const canBuy   = !owned && xpData.xp >= rank.cost;
                  return (
                    <div key={rank.id} style={{background:equipped?"#0d2a4a":"#080d1a",border:"1px solid "+(equipped?tierInfo.color:owned?tierInfo.border:canBuy?tierInfo.color+"99":"#0d1a2e"),borderRadius:6,padding:"6px 8px",opacity:owned||canBuy?1:0.55,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:20,flexShrink:0}}>{rank.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:owned?tierInfo.color:"#c8d8f0",display:"flex",alignItems:"center",gap:6}}>
                          {rank.secret&&<span style={{fontSize:9,color:"#e6a817"}} title="Secret">★</span>}
                          {rank.name}
                          {equipped&&<span style={{fontSize:9,padding:"1px 5px",background:tierInfo.color+"33",border:"1px solid "+tierInfo.color,borderRadius:3,color:tierInfo.color}}>EQUIPPED</span>}
                        </div>
                        <div style={{fontSize:10,color:"#8a9aaa",lineHeight:1.4}}>{rank.desc}</div>
                      </div>
                      <div style={{flexShrink:0}}>
                        {owned ? (
                          equipped
                            ? <span style={{fontSize:10,color:"#5a7a9a",padding:"6px 10px"}}>active</span>
                            : <button onClick={()=>{XPStore.equipRank(rank.id); setXpData(XPStore.get()); AudioEngine.play('buy');}} style={{padding:"6px 10px",background:"#0d2a4a",border:"1px solid "+tierInfo.color,borderRadius:5,color:tierInfo.color,fontSize:10,cursor:"pointer",fontWeight:700}}>Equip</button>
                        ) : (
                          <button disabled={!canBuy} onClick={()=>{
                            if (!XPStore.spend(rank.cost)) return;
                            XPStore.ownRank(rank.id);
                            XPStore.equipRank(rank.id);
                            setXpData(XPStore.get());
                            AudioEngine.play('achieve');
                          }} style={{padding:"6px 10px",background:canBuy?"#0d2a0d":"#0d1a2e",border:"1px solid "+(canBuy?"#2a5a3a":"#1e3a5f"),borderRadius:5,color:canBuy?"#6fcf97":"#3a5a7a",fontSize:10,cursor:canBuy?"pointer":"not-allowed",fontWeight:700,whiteSpace:"nowrap"}}>{"★ "+FMT(rank.cost)}</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {prestige >= 1 && (
          <div style={{fontSize:10,color:"#5a7a9a",textAlign:"center",marginTop:8,fontStyle:"italic"}}>
            XP gain decay: {Math.round(Math.max(0.30, Math.pow(0.92, prestige))*100)}% (decreases with each launch)
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [res,           setRes]           = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    if (eqRank?.effect?.startResources) return {...initRes(), ...eqRank.effect.startResources};
    return initRes();
  });
  const [totalRes,      setTotalRes]      = useState(initRes());
  const [buildings,     setBuildings]     = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    if (eqRank?.effect?.special === "pioneer") return {solar:5, drill:5, lab:5, habitat:5};
    if (eqRank?.effect?.special === "architect_prime") return {solar:1, drill:1, lab:1, habitat:1, refinery:1, medbay:1, greenhouse:1, terraformer:1};
    return initBuildings();
  });
  const [upgrades,      setUpgrades]      = useState([]);
  const [knowledge,     setKnowledge]     = useState([]);
  const [layer,         setLayer]         = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    return eqRank?.effect?.special === "architect_prime" ? 2 : 1;
  });
  const [prestige,      setPrestige]      = useState(0);
  const [prestigeBonus, setPrestigeBonus] = useState(1);
  const [legacyPoints,  setLegacyPoints]  = useState(0);
  const [currentPlanet, setCurrentPlanet] = useState("Earth II");
  const [achievements,  setAchievements]  = useState([]);
  const [milestones,    setMilestones]    = useState([]);
  const [storyLog,      setStoryLog]      = useState([]);
  const [commsLog,      setCommsLog]      = useState([]);
  const [unseenComms,   setUnseenComms]   = useState(0);
  const [tab,           setTab]           = useState("build");
  const [clickAnim,     setClickAnim]     = useState(false);
  const [newAch,        setNewAch]        = useState(null);
  const [elapsed,       setElapsed]       = useState(0);
  const [won,           setWon]           = useState(false);
  const [totalClicks,   setTotalClicks]   = useState(0);
  const [totalSells,    setTotalSells]    = useState(0);
  const [offlineModal,  setOfflineModal]  = useState(null);
  const [paused,        setPaused]        = useState(false);
  const [ticker,        setTicker]        = useState(null);
  const [launchModal,   setLaunchModal]   = useState(false);
  const [logModal,      setLogModal]      = useState(false);
  const [audioModal,    setAudioModal]    = useState(false);
  const [saveModal,     setSaveModal]     = useState(false);
  const [hcMode,        setHcMode]        = useState(() => localStorage.getItem("sbr_hc") === "1");
  const [supportModal,  setSupportModal]  = useState(false);
  const [importText,    setImportText]    = useState("");
  const [saveStatus,    setSaveStatus]    = useState("");
  const [audioSettings, setAudioSettings] = useState(()=>AudioEngine.getSettings());
  const [clickRings,    setClickRings]    = useState({});
  const [layerTransition, setLayerTransition] = useState(null);

  // XP state
  const [xpData,        setXpData]        = useState(()=>XPStore.get());
  const [xpStoreOpen,   setXpStoreOpen]   = useState(false);
  const [xpPopups,      setXpPopups]      = useState([]); // floating "+N XP" notifications
  const [tabsVisitedThisSession, setTabsVisitedThisSession] = useState({});
  const [milestonesHitThisRun,   setMilestonesHitThisRun]   = useState({}); // `${res}_${tier}` -> true
  const [branchesCompletedThisRun, setBranchesCompletedThisRun] = useState({}); // branchName -> true
  const xpClickCounter = useRef(0); // for The Intern's 25th-click skip
  const popupIdRef     = useRef(0);
  const pendingXpRef   = useRef({amount: 0, reason: null, count: 0, timer: null});
  const ringIdRef = useRef(0);
  const prevLayerRef = useRef(layer);
  const holdRef   = useRef(null);
  const nextTickRef = useRef(0);
  // buildingsRef mirrors `buildings` synchronously so hold-burst handlers can read fresh counts
  // without waiting for re-render. Updated in a useEffect below.
  const buildingsRef = useRef(buildings);
  // resRef mirrors `res` synchronously for the same reason — React 18 batches setRes updaters
  // asynchronously, so didBuy flags set inside them aren't visible on the same tick.
  const resRef = useRef({});
  // Dave's Cousin: id of currently broken building (or null)
  const [davesPause,    setDavesPause]    = useState(null); // {id, until}
  const [runSummary,    setRunSummary]    = useState(null); // shown on prestige launch

  // Keep buildingsRef and resRef in sync with state
  useEffect(() => { buildingsRef.current = buildings; }, [buildings]);
  useEffect(() => { resRef.current = res; }, [res]);

  // Helper to award XP and spawn a floating popup.
  // Rapid gains within 300ms are batched into a single popup to reduce visual noise.
  const awardXP = useCallback((amount, reason) => {
    if (!amount || amount <= 0) return;
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    let multiplier = 1;
    if (eqRank?.effect?.special === "stellar_council") multiplier *= 2;
    if (eqRank?.effect?.special === "atomic_scholar" && reason === "Knowledge unlocked") multiplier *= 2;
    const decay = Math.max(0.30, Math.pow(0.92, prestige));
    const final = Math.max(1, Math.round(amount * multiplier * decay));
    XPStore.award(final, reason);
    setXpData(XPStore.get());
    const p = pendingXpRef.current;
    p.amount += final;
    p.count += 1;
    if (p.count === 1) p.reason = reason; else p.reason = null;
    if (p.timer) clearTimeout(p.timer);
    p.timer = setTimeout(() => {
      const total = p.amount;
      const label = p.reason;
      p.amount = 0; p.count = 0; p.reason = null; p.timer = null;
      const id = ++popupIdRef.current;
      setXpPopups(prev => [...prev, {id, amount: total, reason: label}]);
      setTimeout(() => setXpPopups(prev => prev.filter(x => x.id !== id)), 1200);
    }, 300);
  }, [prestige]);

  // Daily streak check on first mount
  useEffect(() => {
    const r = XPStore.checkDaily();
    if (r.awarded > 0) {
      // delay so the user sees it after the UI settles
      setTimeout(() => awardXP(r.awarded, "Daily streak: day "+r.streak), 1200);
      setXpData(XPStore.get());
    }
  // eslint-disable-next-line
  }, []);

  // Active rank lookup
  const activeRank = xpData.equippedRank ? RANKS_BY_ID[xpData.equippedRank] : null;
  const rankEffect = activeRank?.effect || {};

  useEffect(() => {
    const saved = localStorage.getItem("sbr_save");
    if (saved) {
      const diff = Math.floor((Date.now()-parseInt(saved))/1000);
      if (diff>30) {
        // Investor rank bumps offline cap to 16h
        const xpState = XPStore.get();
        const eqRank  = xpState.equippedRank ? RANKS_BY_ID[xpState.equippedRank] : null;
        const isInvestor = eqRank && eqRank.effect.special === "investor";
        const capSecs = isInvestor ? 57600 : 28800;
        const capped = Math.min(diff, capSecs);
        const dream  = DREAM_EVENTS[Math.floor(Math.random()*DREAM_EVENTS.length)];
        setOfflineModal({secs:capped, dream, actual:diff, investor:!!isInvestor});
      }
    }
    const sv = setInterval(()=>localStorage.setItem("sbr_save",Date.now().toString()),5000);
    localStorage.setItem("sbr_save",Date.now().toString());
    return ()=>clearInterval(sv);
  },[]);

  useEffect(()=>{if(won||paused)return;const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[won,paused]);
  // Phases must be built in order; each is one-time. Once all 5 are built AND resource
  // milestone is met, the player can press the Launch button on the Launch tab.
  const PHASE_IDS = ["cs_phase1","cs_phase2","cs_phase3","cs_phase4","cs_phase5"];
  const phasesBuilt = PHASE_IDS.filter(id => (buildings[id]||0) >= 1).length;
  const allPhasesDone = phasesBuilt === 5;
  // Launch milestone: 10M of every resource currently on hand
  const LAUNCH_THRESHOLD = 10000000;
  const launchResReady = ["energy","minerals","research","fuel","population"].every(k => (res[k]||0) >= LAUNCH_THRESHOLD);
  const canLaunch = allPhasesDone && launchResReady;
  useEffect(()=>{if(layer===1&&(buildings.terraformer||0)>=1)setLayer(2);if(layer===2&&(buildings.stationdock||0)>=1)setLayer(3);},[buildings,layer]);

  // Layer transition cinematic
  useEffect(()=>{
    if (layer !== prevLayerRef.current && layer > prevLayerRef.current) {
      const lt = LAYER_THEME[layer];
      AudioEngine.play("layerUp");
      setLayerTransition({icon:lt.icon, name:lt.name, color:lt.color});
      setTimeout(()=>setLayerTransition(null), 3200);
      // XP: 25 every transition, +100 first time L2, +200 first time L3
      awardXP(25, "Reached "+lt.name);
      if (XPStore.markFirst("layers", String(layer))) {
        awardXP(layer === 3 ? 200 : 100, "First time at "+lt.name+"!");
      }
    }
    prevLayerRef.current = layer;
  },[layer,awardXP]);

  // Sync high contrast class on body and persist preference
  useEffect(() => {
    document.body.classList.toggle("hc", hcMode);
    try { localStorage.setItem("sbr_hc", hcMode ? "1" : "0"); } catch(e) {}
  }, [hcMode]);

  // Start ambient music after first interaction
  const ensureMusicStarted = useCallback(() => {
    AudioEngine.resume();
    if (!audioSettings.muted && audioSettings.music > 0) AudioEngine.startMusic();
  }, [audioSettings]);

  const fmtTime = s => {
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
    return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
  };

  const getClickPower = useCallback(type => {
    let b=1;
    if(upgrades.includes("u1")&&type==="energy")b*=2; if(upgrades.includes("u2")&&type==="minerals")b*=2;
    if(upgrades.includes("u3")&&type==="research")b*=2; if(upgrades.includes("u4")&&type==="population")b*=2;
    if(upgrades.includes("u5")&&(type==="energy"||type==="minerals"))b*=1.5;
    if(upgrades.includes("u6")&&(type==="research"||type==="population"))b*=1.5;
    if(upgrades.includes("u7"))b*=2;
    if(knowledge.includes("ke2")&&type==="energy")b*=2.5; if(knowledge.includes("km2")&&type==="minerals")b*=2.5;
    if(knowledge.includes("kr2")&&type==="research")b*=2.5; if(knowledge.includes("kp2")&&type==="population")b*=2.5;
    if(knowledge.includes("kf2")&&type==="fuel")b*=2.5;
    if(knowledge.includes("cx_em")&&(type==="energy"||type==="minerals"))b*=2;
    if(knowledge.includes("cx_rp")&&(type==="research"||type==="population"))b*=2;
    if(knowledge.includes("cx_pf2"))b*=4;
    if(upgrades.includes("ub1a"))b*=0.5; if(upgrades.includes("ub1b"))b*=4;
    // Click Mastery upgrades
    if(upgrades.includes("uc1"))b*=2;
    if(upgrades.includes("uc2"))b*=5;
    if(upgrades.includes("uc3"))b*=10;
    if(upgrades.includes("uc4"))b*=20;
    // Rank effects
    if (rankEffect.clickMult) b *= rankEffect.clickMult;
    if (rankEffect.special === "coffee") {
      if (elapsed < 60) b *= 2; // +100% click for first 60s
      // After: no bonus, so b unaffected
    }
    if (rankEffect.special === "heavyweight") return 0; // no clicks at all
    return Math.floor(b*prestigeBonus);
  },[upgrades,knowledge,prestigeBonus,rankEffect,elapsed]);

  const getProd = useCallback(()=>{
    const p=initRes();
    Object.values(BUILDINGS).forEach(bld=>{
      const cnt=buildings[bld.id]||0; if(!cnt) return;
      // Dave's Cousin: skip the paused building briefly
      if (davesPause && davesPause.id === bld.id) return;
      let m=prestigeBonus;
      if(upgrades.includes("u1")&&bld.id==="solar")m*=2; if(upgrades.includes("u2")&&bld.id==="drill")m*=2;
      if(upgrades.includes("u3")&&bld.id==="lab")m*=2; if(upgrades.includes("u4")&&bld.id==="habitat")m*=2;
      if(upgrades.includes("u5")&&["solar","drill","refinery"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u6")&&["lab","habitat","medbay"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u7"))m*=2;
      if(upgrades.includes("u8")&&bld.prod.fuel)m*=2; if(upgrades.includes("u9")&&bld.id==="orbitallab")m*=2;
      if(upgrades.includes("ub1a"))m*=2; if(upgrades.includes("ub1b"))m*=0.7;
      if(upgrades.includes("ub2a")&&bld.prod.fuel)m*=4;
      if(upgrades.includes("ub2a")&&bld.layer===2&&!bld.prod.fuel)m*=0.6;
      if(upgrades.includes("ub2b")&&bld.layer===2)m*=2.5;
      if(upgrades.includes("u10")&&bld.layer===2)m*=1.5; if(upgrades.includes("u11")&&bld.id==="oreprocessor")m*=3;
      if(upgrades.includes("u12")&&bld.id==="cryobay")m*=2; if(upgrades.includes("u13")&&bld.id==="warplab")m*=3;
      if(upgrades.includes("u14")&&bld.id==="probefactory")m*=3; if(upgrades.includes("u15")&&bld.prod.fuel)m*=2;
      if(knowledge.includes("k0"))m*=1.15;
      if(knowledge.includes("ke1")&&bld.id==="solar")m*=1.4; if(knowledge.includes("ke2")&&bld.prod.energy)m*=1.2;
      if(knowledge.includes("ke3")&&bld.prod.energy)m*=4;
      if(knowledge.includes("km1")&&bld.id==="drill")m*=1.4;
      if(knowledge.includes("km2")&&["drill","refinery","terraformer"].includes(bld.id))m*=1.2;
      if(knowledge.includes("km3")&&bld.prod.minerals)m*=4;
      if(knowledge.includes("kr1")&&bld.id==="lab")m*=1.4;
      if(knowledge.includes("kr2")&&["lab","medbay","orbitallab"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kr3"))m*=2.5;
      if(knowledge.includes("kp1")&&bld.id==="habitat")m*=1.4;
      if(knowledge.includes("kp2")&&["habitat","medbay","cryobay"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kp3")&&bld.prod.population)m*=4; if(knowledge.includes("kp3"))m*=1.2;
      if(knowledge.includes("kf1")&&bld.id==="launchpad")m*=1.5;
      if(knowledge.includes("kf2")&&bld.prod.fuel)m*=2; if(knowledge.includes("kf3")&&bld.prod.fuel)m*=3;
      if(knowledge.includes("cx_em")&&bld.id==="refinery")m*=3;
      if(knowledge.includes("cx_mr")&&["drill","lab","medbay","orbitallab"].includes(bld.id))m*=2;
      if(knowledge.includes("cx_rp")&&bld.id==="medbay")m*=3;
      if(knowledge.includes("cx_pf")&&bld.prod.fuel)m*=1.5; if(knowledge.includes("cx_fe")&&bld.id==="solarcollector")m*=2;
      if(knowledge.includes("cx_em2")&&(bld.prod.energy||bld.prod.minerals))m*=3;
      if(knowledge.includes("cx_mr2")&&(bld.prod.minerals||bld.prod.research))m*=3;
      if(knowledge.includes("cx_rp2"))m*=3;
      if(knowledge.includes("cx_pf2")&&(bld.prod.fuel||bld.prod.population))m*=3;
      if(knowledge.includes("cx_fe2")&&(bld.prod.fuel||bld.prod.energy))m*=4;
      // Dyson Heir: energy buildings produce 3x more
      if (rankEffect.special === "dyson_heir" && bld.prod.energy) m *= 3;
      Object.entries(bld.prod).forEach(([k,v])=>{p[k]+=v*cnt*m;});
    });
    if(knowledge.includes("cx_pf")){const fp=p.population||0;p.fuel+=fp*0.2;p.energy+=fp*0.1;}
    // Rank effects on production
    if (rankEffect.prodMult) {
      Object.entries(rankEffect.prodMult).forEach(([k,mult])=>{
        if (k==="all") Object.keys(p).forEach(rk=>{p[rk]*=mult;});
        else if (p[k] !== undefined) p[k] *= mult;
      });
    }
    if (rankEffect.special === "optimist") {
      const factor = elapsed < 600 ? 1.30 : 1.05;
      Object.keys(p).forEach(k=>{p[k]*=factor;});
    }
    // Hivemind — population also produces every other resource at 25% rate
    if (rankEffect.special === "hivemind") {
      const popRate = p.population || 0;
      ["energy","minerals","research","fuel"].forEach(k=>{p[k] += popRate*0.25;});
    }
    // The Lonely Astronaut — population locked at 0
    if (rankEffect.special === "lonely_astronaut") p.population = 0;
    // The Hoarder — +1% per 100 minerals held, capped at +50%
    if (rankEffect.special === "hoarder") {
      const bonus = Math.min(0.50, Math.floor((res.minerals||0)/100) * 0.01);
      Object.keys(p).forEach(k=>{p[k] *= (1+bonus);});
    }
    // Echo of the First Colony — +10% per unique planet visited (max +100%)
    if (rankEffect.special === "echo") {
      const xpState = XPStore.get();
      const planetsCount = Object.keys(xpState.firstTime.planets || {}).length;
      const echoBonus = Math.min(1.0, planetsCount * 0.10);
      Object.keys(p).forEach(k=>{p[k] *= (1+echoBonus);});
    }
    return p;
  },[buildings,upgrades,knowledge,prestigeBonus,rankEffect,elapsed,davesPause]);

  useEffect(()=>{
    if(paused) return;
    const t=setInterval(()=>{
      const p=getProd();
      setRes(r=>{const n={...r};Object.keys(p).forEach(k=>{n[k]+=p[k]/10;});return n;});
      setTotalRes(r=>{const n={...r};Object.keys(p).forEach(k=>{n[k]+=p[k]/10;});return n;});
    },100);
    return ()=>clearInterval(t);
  },[getProd,paused]);

  useEffect(()=>{
    const t=setTimeout(()=>{
      const ev=AMBIENT_EVENTS[0];
      setTicker({icon:ev.icon,text:ev.text,isStory:false});
      setCommsLog(prev=>[{...ev,time:0,kind:"ambient"},...prev]);
      setUnseenComms(n=>n+1);
      nextTickRef.current=Date.now()+(3+Math.random()*3)*60*1000;
    },8000);
    return()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(paused) return;
    const iv=setInterval(()=>{
      if(Date.now()<nextTickRef.current) return;
      const pending=STORY_EVENTS.filter(ev=>!storyLog.find(s=>s.id===ev.id)&&ev.trigger(buildings,knowledge,layer));
      let ev;
      if(pending.length>0){
        ev=pending[0];
        setStoryLog(prev=>[{...ev,time:elapsed},...prev]);
        setCommsLog(prev=>[{...ev,time:elapsed,kind:"story"},...prev]);
        // First time ever seeing this story event → XP
        if (XPStore.markFirst("storyEvents", ev.id)) awardXP(10, "Story event");
      } else {
        ev=AMBIENT_EVENTS[Math.floor(Math.random()*AMBIENT_EVENTS.length)];
        setCommsLog(prev=>[{...ev,time:elapsed,kind:"ambient"},...prev]);
      }
      setTicker({icon:ev.icon,text:ev.text||ev.title,isStory:!!ev.title,title:ev.title});
      setUnseenComms(n=>n+1);
      nextTickRef.current=Date.now()+(3+Math.random()*3)*60*1000;
    },5000);
    return()=>clearInterval(iv);
  },[paused,buildings,knowledge,layer,storyLog,elapsed,awardXP]);

  // Dave's Cousin — every 60s, pause a random owned building for 1s
  useEffect(()=>{
    if (rankEffect.special !== "daves_cousin" || paused) return;
    const t = setInterval(()=>{
      const ownedIds = Object.keys(buildings).filter(id => (buildings[id]||0) > 0);
      if (ownedIds.length === 0) return;
      const pick = ownedIds[Math.floor(Math.random()*ownedIds.length)];
      setDavesPause({id:pick, until:Date.now()+1000});
      setTimeout(()=>setDavesPause(null), 1100);
    }, 60000);
    return ()=>clearInterval(t);
  },[rankEffect.special, paused, buildings]);

  // Glass Cannon — every 5 min, halve a random owned building's count
  useEffect(()=>{
    if (rankEffect.special !== "glasscannon" || paused) return;
    const t = setInterval(()=>{
      const ownedIds = Object.keys(buildings).filter(id => (buildings[id]||0) > 1);
      if (ownedIds.length === 0) return;
      const pick = ownedIds[Math.floor(Math.random()*ownedIds.length)];
      const cnt = buildings[pick];
      const newCnt = Math.max(1, Math.floor(cnt/2));
      const lost = cnt - newCnt;
      setBuildings(prev => ({...prev, [pick]:newCnt}));
      const bldName = BUILDINGS[pick]?.name || pick;
      setTicker({icon:"💥", text:lost+"× "+bldName+" lost to catastrophic failure!", isStory:false});
      setUnseenComms(n=>n+1);
      AudioEngine.play("error");
    }, 300000); // 5 min
    return ()=>clearInterval(t);
  },[rankEffect.special, paused, buildings]);

  // Resource milestone XP — fires once per (resource × tier) per run
  const MILESTONE_TIERS = [
    {threshold:1000,    xp:10,  label:"1K"},
    {threshold:10000,   xp:25,  label:"10K"},
    {threshold:100000,  xp:50,  label:"100K"},
    {threshold:1000000, xp:100, label:"1M"},
    {threshold:1000000000, xp:250, label:"1B"},
    {threshold:1000000000000, xp:500, label:"1T"},
  ];
  useEffect(()=>{
    Object.entries(totalRes).forEach(([rk, val])=>{
      MILESTONE_TIERS.forEach(t=>{
        const key = rk+"_"+t.label;
        if (!milestonesHitThisRun[key] && val >= t.threshold) {
          setMilestonesHitThisRun(prev=>({...prev, [key]:true}));
          awardXP(t.xp, t.label+" "+RES[rk].label);
        }
      });
    });
  // eslint-disable-next-line
  },[totalRes]);

  // Knowledge branch completion XP — fires once per branch per run
  useEffect(()=>{
    const branchMap = {};
    KNOWLEDGE.forEach(k=>{
      if (!branchMap[k.branch]) branchMap[k.branch] = [];
      branchMap[k.branch].push(k.id);
    });
    Object.entries(branchMap).forEach(([branch, ids])=>{
      if (branchesCompletedThisRun[branch]) return;
      const allOwned = ids.every(id => knowledge.includes(id));
      if (allOwned) {
        setBranchesCompletedThisRun(prev=>({...prev, [branch]:true}));
        awardXP(50, branch+" branch complete!");
      }
    });
  // eslint-disable-next-line
  },[knowledge]);

  // Time-alive XP: 1 XP per minute of unpaused play
  useEffect(()=>{
    if (paused || won) return;
    const t = setInterval(()=>{
      awardXP(1, "Time played");
    }, 60000);
    return ()=>clearInterval(t);
  },[paused, won, awardXP]);

  // Tab visit XP — first visit per session
  useEffect(()=>{
    if (!tabsVisitedThisSession[tab]) {
      setTabsVisitedThisSession(prev=>({...prev, [tab]:true}));
      // small but skip "build" since it's the default
      if (tab !== "build") awardXP(2, "Visited "+tab);
    }
  // eslint-disable-next-line
  },[tab]);

  useEffect(()=>{
    MILESTONES_DEF.forEach(m=>{
      if(!milestones.includes(m.id)&&m.check(buildings,layer,knowledge)){
        setMilestones(prev=>[...prev,m.id]);
      }
    });
  },[buildings,layer,knowledge,milestones]);

  useEffect(()=>{
    ACHIEVEMENTS.forEach(a=>{
      if(!achievements.includes(a.id)&&a.check(totalRes,buildings,upgrades,prestige,totalClicks,knowledge,totalSells,elapsed,layer)){
        setAchievements(prev=>[...prev,a.id]);
        setNewAch(a.name);
        AudioEngine.play('achieve');
        awardXP(25, "Achievement!");
        setTimeout(()=>setNewAch(null),3000);
      }
    });
  },[totalRes,buildings,upgrades,prestige,totalClicks,knowledge,totalSells,elapsed,layer,achievements,awardXP]);

  const prod      = getProd();
  const canAfford = costs => canAffordWith(res,costs);

  const buildingCost = b => {
    const cnt=buildings[b.id]||0;
    const scaleBase = rankEffect.special === "industrialist" ? 1.13 : 1.08;
    const m=Math.pow(scaleBase, cnt);
    const disc=upgrades.includes("u15")&&b.id==="colonyship"?0.7:1;
    const layerSkipDisc = (rankEffect.special === "layer_skip" && (b.id==="terraformer"||b.id==="stationdock"||(b.phase===true))) ? 0.5 : 1;
    const phaseMult = b.phase ? (upgrades.includes("ub3a") ? 0.6 : upgrades.includes("ub3b") ? 1.4 : 1) : 1;
    const rankMult = (rankEffect.buildingCostMult || 1) * layerSkipDisc;
    if(b.cost){const c={};Object.entries(b.cost).forEach(([k,v])=>{c[k]=Math.floor(v*m*disc*phaseMult*rankMult);});return c;}
    return{[b.res]:Math.floor(b.base*m*phaseMult*rankMult)};
  };
  const L3_UPGRADES = ["u13","u14","u15"]; // 3 main Layer-3 upgrades; phase 1 requires 2 of these
  const reqsMet = b => {
    const buildOk = !b.requires || Object.entries(b.requires).every(([id,n])=>(buildings[id]||0)>=n);
    const knowOk  = !b.knowReq || (b.knowReq==="tier3" && TIER3_KNOW.some(id=>knowledge.includes(id)));
    const upgOk   = !b.upgradeReq || L3_UPGRADES.filter(id=>upgrades.includes(id)).length >= b.upgradeReq;
    // Phases: must be built in order, only one of each
    let phaseOk = true;
    if (b.phase) {
      if ((buildings[b.id]||0) >= 1) phaseOk = false; // already built (one-time)
      if (b.phaseNum && b.phaseNum > 1) {
        const prevId = "cs_phase"+(b.phaseNum-1);
        if ((buildings[prevId]||0) < 1) phaseOk = false;
      }
    }
    return buildOk && knowOk && upgOk && phaseOk;
  };
  const buyBuilding = b => {
    // Hold-repeat invokes this on a setInterval so closures go stale.
    // Use buildingsRef for fresh building counts and resRef for fresh resource values —
    // both mirrors are kept in sync via useEffect. Check affordability synchronously
    // before calling any setters so we never deduct resources without adding the building.
    if (!reqsMet(b)) { AudioEngine.play('error'); return; }
    const cnt = buildingsRef.current[b.id] || 0;
    const scaleBase = rankEffect.special === "industrialist" ? 1.13 : 1.08;
    const m = Math.pow(scaleBase, cnt);
    const disc = upgrades.includes("u15") && b.id === "colonyship" ? 0.7 : 1;
    const layerSkipDisc = (rankEffect.special === "layer_skip" && (b.id === "terraformer" || b.id === "stationdock" || b.phase===true)) ? 0.5 : 1;
    const phaseMult = b.phase ? (upgrades.includes("ub3a") ? 0.6 : upgrades.includes("ub3b") ? 1.4 : 1) : 1;
    const rankMult = (rankEffect.buildingCostMult || 1) * layerSkipDisc;
    const freshCost = b.cost
      ? Object.fromEntries(Object.entries(b.cost).map(([k,v]) => [k, Math.floor(v*m*disc*phaseMult*rankMult)]))
      : { [b.res]: Math.floor(b.base * m * phaseMult * rankMult) };
    const affordable = Object.entries(freshCost).every(([k,v]) => (resRef.current[k]||0) >= v);
    if (!affordable) return;
    // Deduct resources and update the mirror so the next hold tick sees fresh values
    setRes(prevR => {
      const n = {...prevR};
      Object.entries(freshCost).forEach(([k,v]) => { n[k] -= v; });
      resRef.current = n;
      return n;
    });
    // Increment building count and keep ref in sync
    setBuildings(prevB => {
      const nb = {...prevB, [b.id]: (prevB[b.id]||0) + 1};
      buildingsRef.current = nb;
      return nb;
    });
    AudioEngine.play('buy');
    awardXP(1, "Building");
    if (XPStore.markFirst("buildings", b.id)) awardXP(25, "First "+b.name+"!");
  };
  const sellBuilding = b => {
    let didSell = false;
    let refund = null;
    setBuildings(prevB => {
      const owned = prevB[b.id] || 0;
      if (!owned) return prevB;
      didSell = true;
      const idx = owned - 1;
      const scaleBase = rankEffect.special === "industrialist" ? 1.13 : 1.08;
      const m = Math.pow(scaleBase, idx);
      const disc = upgrades.includes("u15") && b.id === "colonyship" ? 0.7 : 1;
      const layerSkipDisc = (rankEffect.special === "layer_skip" && (b.id === "terraformer" || b.id === "stationdock" || b.phase===true)) ? 0.5 : 1;
      const rankMult = (rankEffect.buildingCostMult || 1) * layerSkipDisc;
      const freshCost = b.cost
        ? Object.fromEntries(Object.entries(b.cost).map(([k,v]) => [k, Math.floor(v*m*disc*rankMult)]))
        : { [b.res]: Math.floor(b.base * m * rankMult) };
      const refundPct = rankEffect.sellRefundPct ?? 0.5;
      refund = Object.fromEntries(Object.entries(freshCost).map(([k,v]) => [k, Math.floor(v*refundPct)]));
      const nb = {...prevB, [b.id]: owned - 1};
      buildingsRef.current = nb; // keep ref fresh
      return nb;
    });
    if (didSell && refund) {
      setRes(prevR => {
        const n = {...prevR};
        Object.entries(refund).forEach(([k,v]) => { n[k] += v; });
        return n;
      });
      setTotalSells(s => s + 1);
      if (rankEffect.special === "beans") awardXP(5, "Beans bonus");
    }
  };
  const buyUpgrade = u => {
    if(upgrades.includes(u.id)||!canAfford(u.cost)) return;
    if(!Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v)) return;
    if(u.knowReq==="tier3" && !TIER3_KNOW.some(id=>knowledge.includes(id))) return;
    if(u.exclusive && u.exclusive.some(ex=>upgrades.includes(ex))) return;
    setRes(r=>{const n={...r};Object.entries(u.cost).forEach(([k,v])=>{n[k]-=v;});return n;});
    setUpgrades(p=>[...p,u.id]);
    AudioEngine.play('achieve'); // upgrade chime reuses achieve tone
    // XP: 5 per upgrade, +50 first time
    awardXP(5, "Upgrade");
    if (XPStore.markFirst("upgrades", u.id)) awardXP(50, "First-ever "+u.name);
  };
  const buyKnowledge = k => {
    const blocked=k.exclusive&&k.exclusive.some(ex=>knowledge.includes(ex));
    const knowMult = rankEffect.knowledgeCostMult || 1;
    const adjCost = Object.fromEntries(Object.entries(k.cost).map(([key,v])=>[key,Math.floor(v*knowMult)]));
    if(knowledge.includes(k.id)||!canAfford(adjCost)||blocked) return;
    if(!k.requires.every(r=>knowledge.includes(r))) return;
    setRes(r=>{const n={...r};Object.entries(adjCost).forEach(([key,v])=>{n[key]-=v;});return n;});
    setKnowledge(p=>[...p,k.id]);
    AudioEngine.play('knowledge');
    // XP: 50 per knowledge node (Atomic Scholar 2x not in v0.6 set, so n/a)
    awardXP(50, "Knowledge unlocked");
  };
  // Compute starting buildings/layer based on rank
  const computeStartBuildings = useCallback(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    if (!eqRank) return {buildings:initBuildings(), layer:1};
    if (eqRank.effect.special === "pioneer") {
      return {buildings:{solar:5, drill:5, lab:5, habitat:5}, layer:1};
    }
    if (eqRank.effect.special === "architect_prime") {
      return {
        buildings:{solar:1, drill:1, lab:1, habitat:1, refinery:1, medbay:1, greenhouse:1, terraformer:1},
        layer:2
      };
    }
    return {buildings:initBuildings(), layer:1};
  },[]);

  const doPrestige = () => {
    const lpMult = upgrades.includes("ub3a") ? 0.5 : upgrades.includes("ub3b") ? 3 : 1;
    const prestigeMult = upgrades.includes("ub3b") ? 2 : 1.5;
    const lp=Math.floor((Math.floor(elapsed/60)+knowledge.length*2+layer*10)*lpMult);
    // XP: 500 base, +100 if faster than personal best, mark planet visited
    awardXP(500, "Colony Ship launched!");
    const wasFaster = XPStore.setBest(elapsed);
    if (wasFaster !== null && wasFaster > 0) awardXP(100, "New personal best!");
    if (XPStore.markFirst("planets", currentPlanet)) awardXP(50, "First time at "+currentPlanet);
    // Running Naked check — launch with no rank, after having previously launched with one
    // Note: the secret "Naked Engineer" rank counts as no-rank for this achievement
    const isNakedForAchievement = !activeRank || activeRank.effect.special === "naked_engineer";
    const launchInfo = XPStore.recordLaunch(isNakedForAchievement ? null : activeRank.id);
    if (launchInfo.nakedJustHappened) {
      awardXP(200, "Running Naked!");
      if (!achievements.includes("a24")) {
        setAchievements(prev=>[...prev,"a24"]);
        setNewAch("Running Naked");
        AudioEngine.play('achieve');
        setTimeout(()=>setNewAch(null),3000);
      }
    }
    setXpData(XPStore.get());
    // Capture run summary before resetting
    setRunSummary({
      time: elapsed,
      planet: currentPlanet,
      nextPlanet: PLANETS[(prestige+1)%PLANETS.length],
      knowledgeCount: knowledge.length,
      totalBuildings: Object.values(buildings).reduce((a,v)=>a+v,0),
      upgradesCount: upgrades.length,
      lp,
      totalClicks,
      newBest: wasFaster !== null && wasFaster > 0,
    });
    setPrestige(p=>p+1); setPrestigeBonus(b=>b*prestigeMult); setLegacyPoints(prev=>prev+lp);
    setCurrentPlanet(PLANETS[prestige%PLANETS.length]);
    // Apply rank starting resources, if any
    const startRes = rankEffect.startResources ? {...initRes(), ...rankEffect.startResources} : initRes();
    const {buildings:startBuilds, layer:startLayer} = computeStartBuildings();
    setRes(startRes); setTotalRes(initRes()); setBuildings(startBuilds); setUpgrades([]);
    setKnowledge(prev=>prev.filter(id=>KNOWLEDGE.find(k=>k.id===id&&(k.crossBridge||k.branch.startsWith("cross_")))));
    setLayer(startLayer); setWon(false); setElapsed(0); setLaunchModal(false);
    setMilestonesHitThisRun({}); setBranchesCompletedThisRun({});
    prevLayerRef.current = startLayer;
  };

  // hold-to-click
  const touchUntilRef = useRef(0);
  const startHold = type => {
    if (holdRef.current) clearInterval(holdRef.current); // safety: clear any leaked interval
    ensureMusicStarted();
    handleClick(type);
    holdRef.current = setInterval(()=>handleClick(type), 100);
  };
  const stopHold = () => { if(holdRef.current){clearInterval(holdRef.current);holdRef.current=null;} };
  const onClickMouseDown = type => { if (Date.now() < touchUntilRef.current) return; startHold(type); };
  const onClickMouseUp   = ()   => { if (Date.now() < touchUntilRef.current) return; stopHold(); };
  const onClickTouchStart = (e, type) => { e.preventDefault(); touchUntilRef.current = Date.now()+600; startHold(type); };
  const onClickTouchEnd   = e => { e.preventDefault(); touchUntilRef.current = Date.now()+600; stopHold(); };

  const handleClick = type => {
    xpClickCounter.current++;
    // The Intern: every 25th click does nothing
    if (rankEffect.special === "intern" && xpClickCounter.current % 25 === 0) {
      AudioEngine.play('error');
      setClickRings(prev=>({...prev,[type]:Date.now()}));
      // No resource gain, no XP, no totalClicks bump
      return;
    }
    let power=getClickPower(type);
    // Lucky Breaker — 5% chance of 10× click
    let isCrit = false;
    if (rankEffect.special === "lucky" && Math.random() < 0.05) {
      power *= 10;
      isCrit = true;
    }
    setRes(r=>{
      const n = {...r, [type]: r[type] + power};
      // Static Cling — also generate 25% of click power as every OTHER resource
      if (rankEffect.special === "static_cling" && power > 0) {
        const splash = power * 0.25;
        Object.keys(n).forEach(k => { if (k !== type) n[k] += splash; });
      }
      return n;
    });
    setTotalRes(r=>{
      const n = {...r, [type]: r[type] + power};
      if (rankEffect.special === "static_cling" && power > 0) {
        const splash = power * 0.25;
        Object.keys(n).forEach(k => { if (k !== type) n[k] += splash; });
      }
      return n;
    });
    setClickAnim(type); setTotalClicks(c=>c+1);
    setClickRings(prev=>({...prev,[type]:Date.now()}));
    AudioEngine.play(isCrit ? 'achieve' : 'click', type);
    awardXP(1, isCrit ? "Lucky click! 🍀" : "Click");
    setTimeout(()=>setClickAnim(false),120);
  };
  const applyOffline = (secs,dream) => {
    const p=getProd(); const gained=initRes();
    const investorBonus = rankEffect.special === "investor" ? 1.20 : 1.0;
    Object.keys(p).forEach(k=>{
      let g = p[k]*secs*investorBonus;
      if(!dream.bonus.res||dream.bonus.res===k) g *= dream.bonus.val;
      gained[k]=g;
    });
    setRes(r=>{const n={...r};Object.keys(gained).forEach(k=>{n[k]+=gained[k];});return n;});
    setTotalRes(r=>{const n={...r};Object.keys(gained).forEach(k=>{n[k]+=gained[k];});return n;});
    setOfflineModal(null);
    AudioEngine.play('offline');
  };

  // Audio control handlers
  const updateMaster = v => { AudioEngine.setMaster(v); setAudioSettings(s=>({...s,master:v})); };
  const updateSfx    = v => { AudioEngine.setSfx(v);    setAudioSettings(s=>({...s,sfx:v})); };
  const updateMusic  = v => {
    AudioEngine.setMusic(v);
    setAudioSettings(s=>({...s,music:v}));
    if (v > 0 && !audioSettings.muted) AudioEngine.startMusic();
    if (v === 0) AudioEngine.stopMusic();
  };
  const toggleMute = () => {
    const m = !audioSettings.muted;
    AudioEngine.setMuted(m);
    setAudioSettings(s=>({...s,muted:m}));
    if (m) AudioEngine.stopMusic();
    else if (audioSettings.music > 0) AudioEngine.startMusic();
  };
  const togglePause = () => {
    setPaused(p=>{
      const np = !p;
      AudioEngine.play(np?"pause":"resume");
      return np;
    });
  };

  // Save / Load helpers
  const SAVE_VERSION = 1;
  const gatherSave = () => ({
    v: SAVE_VERSION,
    ts: Date.now(),
    run: {res, totalRes, buildings, upgrades, knowledge, layer, prestige, prestigeBonus, legacyPoints, achievements, milestones, storyLog, commsLog, unseenComms, elapsed, totalClicks, totalSells, currentPlanet},
    meta: XPStore.get(),
  });
  const encodeSave = obj => {
    try { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
    catch (e) { return ""; }
  };
  const decodeSave = b64 => {
    try { return JSON.parse(decodeURIComponent(escape(atob(b64.trim())))); }
    catch (e) { return null; }
  };
  const exportSave = () => encodeSave(gatherSave());
  const downloadSave = () => {
    const blob = new Blob([exportSave()], {type:"text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const date = new Date().toISOString().slice(0,10);
    a.download = "sbr-save-"+date+".txt";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSaveStatus("Saved file downloaded.");
    setTimeout(()=>setSaveStatus(""), 2500);
  };
  const copySave = async () => {
    try {
      await navigator.clipboard.writeText(exportSave());
      setSaveStatus("Copied to clipboard.");
    } catch(e) {
      setSaveStatus("Copy failed — select the text above instead.");
    }
    setTimeout(()=>setSaveStatus(""), 2500);
  };
  const importSave = () => {
    const data = decodeSave(importText);
    if (!data || !data.run || !data.meta) {
      setSaveStatus("Invalid save data.");
      setTimeout(()=>setSaveStatus(""), 2500);
      return;
    }
    if (!confirm("This will overwrite your current save. Continue?")) return;
    const r = data.run;
    setRes(r.res||initRes()); setTotalRes(r.totalRes||initRes());
    setBuildings(r.buildings||{}); setUpgrades(r.upgrades||[]);
    setKnowledge(r.knowledge||[]); setLayer(r.layer||1);
    setPrestige(r.prestige||0); setPrestigeBonus(r.prestigeBonus||1);
    setLegacyPoints(r.legacyPoints||0);
    setAchievements(r.achievements||[]); setMilestones(r.milestones||[]);
    setStoryLog(r.storyLog||[]); setCommsLog(r.commsLog||[]);
    setUnseenComms(r.unseenComms||0); setElapsed(r.elapsed||0);
    setTotalClicks(r.totalClicks||0); setTotalSells(r.totalSells||0);
    if (r.currentPlanet) setCurrentPlanet(r.currentPlanet);
    // Restore meta state (XP)
    try {
      localStorage.setItem("sbr_xp_v1", JSON.stringify(data.meta));
      setXpData(XPStore.get());
    } catch(e) {}
    setSaveStatus("Save loaded successfully.");
    setImportText("");
    setTimeout(()=>{setSaveStatus(""); setSaveModal(false);}, 1500);
  };

  const lt      = LAYER_THEME[layer];
  const latestM = milestones.length>0?MILESTONES_DEF.find(m=>m.id===milestones[milestones.length-1]):null;
  const accent  = latestM?latestM.color:"#1e3a5f";
  const resCols = layer>=2?["energy","minerals","research","population","fuel"]:["energy","minerals","research","population"];
  const clickBtns = [
    {type:"energy",    icon:"⚡",label:"Energy",  unlocked:true},
    {type:"minerals",  icon:"⛏", label:"Mine",    unlocked:(buildings.solar||0)>=10},
    {type:"research",  icon:"🔬",label:"Research",unlocked:(buildings.drill||0)>=10},
    {type:"population",icon:"👥",label:"Habitat", unlocked:(buildings.lab||0)>=10},
    {type:"fuel",      icon:"⛽",label:"Fuel",     unlocked:layer>=2},
  ].filter(c=>c.unlocked);

  const visBuildings  = Object.values(BUILDINGS).filter(b=>b.layer<=layer && !b.phase);
  const singleBlds    = visBuildings.filter(b=>!b.multi);
  const multiBlds     = visBuildings.filter(b=>b.multi);
  const tier3Owned    = TIER3_KNOW.some(id => knowledge.includes(id));
  const visUpgrades   = UPGRADES.filter(u=>u.layer<=layer && (u.knowReq!=="tier3" || tier3Owned));

  // badge counts
  const upgradeBadge  = visUpgrades.filter(u=>!upgrades.includes(u.id)&&!(u.exclusive&&u.exclusive.some(ex=>upgrades.includes(ex)))&&Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v)&&canAfford(u.cost)).length;
  const knowledgeBadge= KNOWLEDGE.filter(k=>!knowledge.includes(k.id)&&k.requires.every(r=>knowledge.includes(r))&&canAffordWith(res,k.cost)&&!(k.exclusive&&k.exclusive.some(ex=>knowledge.includes(ex)))).length;
  const achieveBadge  = ACHIEVEMENTS.filter(a=>!achievements.includes(a.id)&&a.check(totalRes,buildings,upgrades,prestige,totalClicks,knowledge,totalSells,elapsed,layer)).length;
  // Ranks badge: new ranks (visible/unlocked, not owned) that the player can afford right now
  const ranksBadge = (()=>{
    const unlockCtx = {
      totalLaunches: xpData.totalLaunches || 0,
      runningNakedDone: !!xpData.runningNakedDone,
      uniquePlanets: Object.keys(xpData.firstTime?.planets || {}).length,
    };
    return RANKS.filter(r=>{
      if (xpData.ownedRanks.includes(r.id)) return false;
      if (r.secret && !(r.unlockCheck && r.unlockCheck(unlockCtx))) return false;
      return xpData.xp >= r.cost;
    }).length;
  })();

  const TABS_ROW1 = ["build","upgrade","knowledge","achievements"];
  const TABS_ROW2 = ["ranks","stats","launch"];

  const bCardProps = {buildings,res,prod,canAfford,buildingCost,buyBuilding,sellBuilding,knowledge};

  return (
    <div style={{fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:"#080d1a",color:"#c8d8f0",padding:"10px 8px",maxWidth:720,margin:"0 auto"}}>

      {/* Layer transition cinematic */}
      {layerTransition&&(
        <div className="layer-transition" style={{color:layerTransition.color}}>
          <div className="layer-stars"/>
          <div className="lt-icon">{layerTransition.icon}</div>
          <div className="lt-name" style={{color:layerTransition.color}}>{layerTransition.name.toUpperCase()}</div>
          <div className="lt-sub">SYSTEMS ONLINE</div>
        </div>
      )}

      {/* Audio settings modal */}
      {audioModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000}} onClick={()=>setAudioModal(false)}>
          <div style={{background:"#0a1525",border:"1px solid #1e3a5f",borderRadius:12,padding:"20px 24px",maxWidth:360,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:14,fontWeight:700,color:"#a0c4ff"}}>Audio Settings</span>
              <button onClick={()=>setAudioModal(false)} style={{background:"none",border:"none",color:"#5a7a9a",cursor:"pointer",fontSize:20,padding:"4px 8px"}}>X</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <button onClick={toggleMute} style={{padding:"8px 14px",background:audioSettings.muted?"#5a1515":"#0d2a4a",border:"1px solid "+(audioSettings.muted?"#eb5757":"#4a9eff"),borderRadius:6,color:audioSettings.muted?"#ff9999":"#4a9eff",fontSize:13,cursor:"pointer",fontWeight:700,minWidth:80}}>{audioSettings.muted?"🔇 Muted":"🔊 On"}</button>
              <span style={{fontSize:11,color:"#5a7a9a",flex:1}}>{audioSettings.muted?"Click to unmute":"All sound enabled"}</span>
            </div>
            {[
              {label:"Master", val:audioSettings.master, set:updateMaster, icon:"🎚"},
              {label:"Music",  val:audioSettings.music,  set:updateMusic,  icon:"🎵"},
              {label:"SFX",    val:audioSettings.sfx,    set:updateSfx,    icon:"🔔"},
            ].map(s=>(
              <div key={s.label} style={{marginBottom:12,opacity:audioSettings.muted?0.4:1}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#a0c4ff",marginBottom:4}}>
                  <span>{s.icon+" "+s.label}</span>
                  <span style={{color:"#5a7a9a"}}>{Math.round(s.val*100)+"%"}</span>
                </div>
                <input type="range" min="0" max="1" step="0.01" value={s.val} disabled={audioSettings.muted} onChange={e=>s.set(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#4a9eff"}}/>
              </div>
