        const tabBadgeCur = t => t==="upgrade"?upgradeBadge:t==="knowledge"?knowledgeBadge:t==="achievements"?achieveBadge:t==="ranks"?ranksBadge:0;
        const hasNewBadge = t => tabBadgeCur(t) > (tabLastSeen[t] || 0);
        // File-tab button styles: active tab in row 1 visually connects to the panel below
        const ACTIVE_BG = "#0d1525"; // close match to panel bg top
        const btnStyle = (t, ri) => {
          const active = tab === t;
          if (active && ri === 1) return {
            flex:1, padding:"7px 4px 8px", cursor:"pointer", whiteSpace:"nowrap", position:"relative",
            border:"1px solid "+lt.border, borderBottom:"1px solid "+ACTIVE_BG,
            borderRadius:"6px 6px 0 0", background:ACTIVE_BG,
            color:"#a0c4ff", fontSize:10, fontWeight:700,
            marginBottom:"-1px", zIndex:3,
          };
          if (active && ri === 0) return {
            flex:1, padding:"5px 4px", cursor:"pointer", whiteSpace:"nowrap", position:"relative",
            border:"1px solid "+lt.border, borderRadius:"5px 5px 0 0",
            background:"#0a141e", color:"#7aaac8", fontSize:9, fontWeight:700, zIndex:2,
          };
          return {
            flex:1, padding:ri===0?"5px 4px":"7px 4px 8px", cursor:"pointer", whiteSpace:"nowrap", position:"relative",
            border:"1px solid #0d1c2c", borderRadius:"5px 5px 0 0",
            background:"#030810", color:ri===0?"#2a4a62":"#3a6078", fontSize:ri===0?9:10, fontWeight:400,
          };
        };
        return (
          <div style={{background:"#050c18",borderRadius:"10px 10px 0 0",border:"1px solid "+lt.border,borderBottom:"1px solid "+lt.border,padding:"6px 6px 0",position:"relative",zIndex:2}}>
            {/* Row 0 — secondary tabs */}
            <div style={{display:"flex",gap:3,marginBottom:4,paddingBottom:4,borderBottom:"1px solid #0d1c2c"}}>
              {TABS_ROW1.map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={btnStyle(t,0)}>
                  {tabLabel(t)}
                  {hasNewBadge(t)&&<span style={{position:"absolute",top:-4,right:-3,background:"#eb5757",color:"#fff",borderRadius:6,fontSize:8,padding:"0 3px",lineHeight:"13px",fontWeight:700}}>!</span>}
                </button>
              ))}
            </div>
            {/* Row 1 — primary tabs, connects to panel */}
            <div style={{display:"flex",gap:3,position:"relative",zIndex:3}}>
              {TABS_ROW2.map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={btnStyle(t,1)}>
                  {tabLabel(t)}
                  {hasNewBadge(t)&&<span style={{position:"absolute",top:-4,right:-3,background:"#eb5757",color:"#fff",borderRadius:6,fontSize:8,padding:"0 3px",lineHeight:"13px",fontWeight:700}}>!</span>}
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Panel */}
      <div style={{background:lt.bg,border:"1px solid "+lt.border,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 8px",minHeight:300,boxShadow:"inset 0 4px 16px #00000080"}}>

        {tab==="build"&&(
          <div>
            {/* Single-resource columns */}
            <div className={layer>=2?"res-grid-5":"res-grid-4"} style={{marginBottom:10}}>
              {resCols.map(rk=>{
                const ri=RES[rk];
                const blds=singleBlds.filter(b=>b.res===rk);
                if(blds.length===0) return null;
                return(
                  <div key={rk} style={{background:COL_BG[rk],border:"1px solid "+COL_BORDER[rk],borderRadius:8,padding:"6px 5px",display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:ri.color,paddingBottom:3,borderBottom:"1px solid "+COL_BORDER[rk]}}>{ri.icon+" "+ri.label}</div>
                    {blds.map(b=><BuildingCard key={b.id} b={b} {...bCardProps}/>)}
                  </div>
                );
              })}
            </div>
            {/* Combined resource buildings */}
            {multiBlds.length>0&&(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#a0c4ff",marginBottom:6,paddingBottom:4,borderBottom:"1px solid #1e3a5f",display:"flex",alignItems:"center",gap:6}}>
                  <span>⚙️</span> Combined Resource Buildings
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
                  {multiBlds.map(b=><BuildingCard key={b.id} b={b} {...bCardProps}/>)}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="upgrade"&&(()=>{
          const sorted = [...visUpgrades].sort((a,b)=>{
            const ao=upgrades.includes(a.id), bo=upgrades.includes(b.id);
            if (ao!==bo) return ao?1:-1;
            const ar=Object.entries(a.req).every(([k,v])=>(totalRes[k]||0)>=v);
            const br=Object.entries(b.req).every(([k,v])=>(totalRes[k]||0)>=v);
            if (ar!==br) return ar?-1:1;
            const aa=canAfford(a.cost), ba=canAfford(b.cost);
            if (aa!==ba) return aa?-1:1;
            return (a.layer||1)-(b.layer||1);
          });
          // Render branching pairs as a unified choice card; track rendered groups
          const renderedGroups = new Set();
          const renderUpgrade = u => {
            const owned=upgrades.includes(u.id),afford=canAfford(u.cost);
            const req=Object.entries(u.req).every(([k,v])=>(totalRes[k]||0)>=v);
            const blocked=u.exclusive&&u.exclusive.some(ex=>upgrades.includes(ex));
            const wait=(!owned&&!blocked&&req&&!afford)?timeToAfford(res,prod,u.cost):null;
            const primaryRes=Object.keys(u.cost)[0]||Object.keys(u.req)[0]||"energy";
            const accent=RES[primaryRes].color;
            const clickable=!owned&&!blocked&&req;
            return(
              <div key={u.id} onClick={()=>clickable&&buyUpgrade(u)} style={{background:owned?"#0a1a0a":blocked?"#0d0d0d":"#080d1a",border:"1px solid "+(owned?"#2a5a2a":blocked?"#1a1a1a":afford&&req?accent+"99":req?"#1e3a5f":"#0d1a2e"),borderRadius:6,padding:"7px 8px",opacity:owned?0.75:blocked?0.3:req?1:0.45,cursor:clickable?"pointer":"default",display:"flex",flexDirection:"column",gap:3,borderLeft:"3px solid "+(owned?"#2a5a2a":blocked?"#333":accent)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4}}>
                  <span style={{fontSize:11,fontWeight:700,color:owned?"#6fcf97":blocked?"#555":"#c8d8f0",flex:1,lineHeight:1.25}}>{u.knowReq==="tier3"?"👆 ":u.layer===3?"🌌 ":u.layer===2?"🛸 ":""}{u.name}</span>
                  {owned&&<span style={{color:"#6fcf97",fontSize:12,flexShrink:0}}>✓</span>}
                  {blocked&&<span style={{color:"#555",fontSize:12,flexShrink:0}}>✗</span>}
                </div>
                <div style={{fontSize:9,color:blocked?"#444":"#6a9abf",lineHeight:1.35,fontWeight:500}}>{u.effect}</div>
                {!req&&!owned&&!blocked&&<div style={{fontSize:9,color:"#3a5a7a"}}>{"Need: "+Object.entries(u.req).map(([k,v])=>FMT(v)+RES[k].icon).join(" + ")}</div>}
                {req&&!owned&&!blocked&&<div style={{display:"flex",flexWrap:"wrap",gap:2}}>{Object.entries(u.cost).map(([k,v])=><Chip key={k} ok={(res[k]||0)>=v} text={RES[k].icon+FMT(v)}/>)}</div>}
                {!owned&&!blocked&&req&&<div style={{fontSize:8,minHeight:11,lineHeight:"11px"}}>
                  {afford?<span style={{color:"#6fcf97"}}>✓ Available</span>:wait!==null&&isFinite(wait)?<span style={{color:"#8a6a2a"}}>{"~"+FMTT(wait)}</span>:null}
                </div>}
              </div>
            );
          };
          return(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {sorted.reduce((acc,u)=>{
                if(u.branchGroup){
                  if(renderedGroups.has(u.branchGroup)) return acc;
                  renderedGroups.add(u.branchGroup);
                  const pair=sorted.filter(x=>x.branchGroup===u.branchGroup);
                  const anyOwned=pair.some(x=>upgrades.includes(x.id));
                  acc.push(
                    <div key={"bg_"+u.branchGroup} style={{border:"1px solid #2a3a5a",borderRadius:8,padding:"6px 8px",background:"#060c18"}}>
                      {!anyOwned&&<div style={{fontSize:9,fontWeight:700,color:"#e6a817",marginBottom:5,letterSpacing:1}}>⚡ CHOOSE ONE</div>}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {pair.map(pu=>renderUpgrade(pu))}
                      </div>
                    </div>
                  );
                } else {
                  acc.push(<div key={u.id} style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:6}}>{renderUpgrade(u)}</div>);
                }
                return acc;
              },[])}
            </div>
          );
        })()}

        {tab==="knowledge"&&<KnowledgeTree knowledge={knowledge} res={res} prod={prod} buyKnowledge={buyKnowledge} layer={layer}/>}

        {tab==="achievements"&&(
          <div className="ach-grid">
            {ACHIEVEMENTS.map(a=>{
              const done=achievements.includes(a.id),isMilestone=!!MILESTONE_ACH[a.id];
              return(
                <div key={a.id} style={{background:"#0a1525",border:"1px solid "+(done?isMilestone?"#6a4a1a":"#2a4a1a":"#152030"),borderRadius:8,padding:"8px 10px",opacity:done?1:0.45}}>
                  <div style={{fontSize:15,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
                    <span>{done?"🏆":"🔒"}</span>
                    {isMilestone&&<span style={{fontSize:10,color:"#e6a817"}}>Milestone</span>}
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:done?isMilestone?"#f0c060":"#f2c94c":"#c8d8f0"}}>{a.name}</div>
                  <div style={{fontSize:9,color:"#5a7a9a"}}>{a.desc}</div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="ranks"&&(
          <div style={{maxWidth:540,margin:"0 auto",display:"flex",flexDirection:"column",height:"calc(100vh - 280px)",minHeight:300}}>
            <div style={{fontSize:14,fontWeight:700,color:"#a0c4ff",marginBottom:4}}>★ XP & Ranks</div>
            <RanksContent xpData={xpData} setXpData={setXpData} activeRank={activeRank} prestige={prestige}/>
          </div>
        )}

        {tab==="stats"&&(()=>{
          const totalBldgs = Object.values(buildings).reduce((a,v)=>a+v,0);
          const totalResProduced = Object.values(totalRes).reduce((a,v)=>a+v,0);
          const uniquePlanets = Object.keys(xpData.firstTime?.planets||{}).length;
          const StatRow = ({label,val,sub})=>(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid #0d1a2e"}}>
              <span style={{fontSize:11,color:"#7a9abf"}}>{label}</span>
              <span style={{fontSize:12,fontWeight:700,color:"#a0c4ff"}}>{val}{sub&&<span style={{fontSize:9,color:"#5a7a9a",marginLeft:4}}>{sub}</span>}</span>
            </div>
          );
          return (
            <div style={{maxWidth:540,margin:"0 auto"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a0c4ff",marginBottom:8,letterSpacing:1}}>📊 THIS RUN</div>
              <div style={{background:"#080d1a",border:"1px solid #1e3a5f",borderRadius:8,padding:"8px 12px",marginBottom:12}}>
                <StatRow label="Run Time" val={fmtTime(elapsed)}/>
                <StatRow label="Total Clicks" val={FMT(totalClicks)}/>
                <StatRow label="Buildings Owned" val={totalBldgs}/>
                <StatRow label="Upgrades Purchased" val={upgrades.length}/>
                <StatRow label="Knowledge Nodes" val={knowledge.length} sub={"/ "+KNOWLEDGE.length}/>
                <StatRow label="Resources Generated" val={FMT(Math.floor(totalResProduced))}/>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"#a0c4ff",marginBottom:8,letterSpacing:1}}>🌌 ALL TIME</div>
              <div style={{background:"#080d1a",border:"1px solid #1e3a5f",borderRadius:8,padding:"8px 12px",marginBottom:12}}>
                <StatRow label="Colony Ships Launched" val={xpData.totalLaunches||0}/>
                <StatRow label="Total XP Earned" val={FMT(xpData.totalEarned||0)}/>
                <StatRow label="Personal Best" val={xpData.bestRunSecs?fmtTime(xpData.bestRunSecs):"—"}/>
                <StatRow label="Unique Planets Visited" val={uniquePlanets} sub={"/ "+PLANETS.length}/>
                <StatRow label="Ranks Owned" val={(xpData.ownedRanks||[]).length} sub={"/ "+RANKS.length}/>
                <StatRow label="Daily Streak" val={(xpData.dailyStreak||0)+" day"+(xpData.dailyStreak===1?"":"s")}/>
              </div>
            </div>
          );
        })()}

        {tab==="codex"&&<CodexTab xpData={xpData} prestige={prestige}/>}

        {tab==="launch"&&(()=>{
          const phaseDefs = PHASE_IDS.map(id => BUILDINGS[id]);
          // Compute state of each phase — built / current (next available) / locked
          const phaseStates = phaseDefs.map(p => {
            const built = (buildings[p.id]||0) >= 1;
            const isNext = !built && reqsMet(p);
            return {p, built, isNext, locked: !built && !isNext};
          });
          // Phase 1 gate prereqs — surfaces what's needed to start construction
          const phase1 = BUILDINGS.cs_phase1;
          const buildOk1 = !phase1.requires || Object.entries(phase1.requires).every(([id,n])=>(buildings[id]||0)>=n);
          const knowOk1  = TIER3_KNOW.some(id=>knowledge.includes(id));
          const upgCount = L3_UPGRADES.filter(id=>upgrades.includes(id)).length;
          const upgOk1   = upgCount >= 2;
          const constructionStarted = phaseStates.some(s => s.built);
          const showGates = !constructionStarted; // hide once you start phase 1
          return (
            <div style={{maxWidth:540,margin:"0 auto",padding:"4px 0"}}>
              {/* Run summary */}
              <div style={{textAlign:"center",marginBottom:12}}>
                <div style={{fontSize:30,marginBottom:4}}>🚀</div>
                <div style={{fontSize:15,fontWeight:700,color:"#a0c4ff"}}>Colony Ship Program</div>
                <div style={{fontSize:11,color:"#5a7a9a",marginTop:4,lineHeight:1.5}}>{"Planet "+currentPlanet+" • Layer "+layer+"/3 • "+fmtTime(elapsed)+" • Bonus "+prestigeBonus.toFixed(1)+"× • LP "+legacyPoints}</div>
              </div>

              {/* Phase 1 entry gates (hide once any phase is built) */}
              {showGates && (
                <div style={{background:"#080d1a",border:"1px solid #1e3a5f",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#a0c4ff",marginBottom:6,letterSpacing:1}}>🛠 BEFORE CONSTRUCTION CAN BEGIN</div>
                  <div style={{fontSize:10,color:"#c8d8f0",lineHeight:1.6,display:"flex",flexDirection:"column",gap:3}}>
                    <div style={{color:knowOk1?"#6fcf97":"#8a6a2a"}}>{knowOk1?"✓":"○"} Any tier-3 knowledge node owned</div>
                    <div style={{color:upgOk1?"#6fcf97":"#8a6a2a"}}>{upgOk1?"✓":"○"} 2 of 3 Layer-3 upgrades (Warp Field, Autonomous Probes, Starcore Drive) — owned: {upgCount}/3</div>
                    <div style={{color:buildOk1?"#6fcf97":"#8a6a2a"}}>{buildOk1?"✓":"○"} Buildings: {Object.entries(phase1.requires).map(([id,n])=>{
                      const have=buildings[id]||0;
                      return (have>=n?"✓":"○")+" "+n+"× "+BUILDINGS[id].name+(have<n?" ("+have+"/"+n+")":"");
                    }).join(" · ")}</div>
                  </div>
                </div>
              )}

              {/* Phase cards */}
              <div style={{fontSize:11,fontWeight:700,color:"#a0c4ff",marginBottom:6,letterSpacing:1}}>🌌 CONSTRUCTION PHASES</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                {phaseStates.map(({p, built, isNext, locked}) => {
                  const cost = buildingCost(p);
                  const afford = canAfford(cost);
                  const wait = !built && isNext && !afford ? timeToAfford(res, prod, cost) : null;
                  return (
                    <div key={p.id} style={{background:built?"#0a1a0a":isNext?"#0d1a2e":"#080d1a",border:"1px solid "+(built?"#2a5a2a":isNext?"#4a9eff":"#1e3a5f"),borderRadius:8,padding:"8px 12px",opacity:locked?0.5:1,display:"flex",flexDirection:"column",gap:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:18,minWidth:32,textAlign:"center"}}>{built?"✅":locked?"🔒":"🔧"}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:700,color:built?"#6fcf97":isNext?"#a0c4ff":"#8a9aaa"}}>{"Phase "+p.phaseNum+" — "+p.name}</div>
                          <div style={{fontSize:10,color:"#5a7a9a",lineHeight:1.4}}>{p.desc}</div>
                        </div>
                      </div>
                      {!built && isNext && (
                        <>
                          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:2}}>
                            {Object.entries(cost).map(([k,v])=><Chip key={k} ok={(res[k]||0)>=v} text={RES[k].icon+FMT(v)}/>)}
                          </div>
                          <div style={{fontSize:9,minHeight:12,lineHeight:"12px"}}>
                            {afford?<span style={{color:"#6fcf97"}}>✓ Available</span>:wait!==null&&isFinite(wait)?<span style={{color:"#8a6a2a"}}>{"~"+FMTT(wait)}</span>:null}
                          </div>
                          <button onClick={()=>buyBuilding(p)} disabled={!afford} style={{padding:"6px 10px",borderRadius:5,border:"1px solid "+(afford?"#4a9eff":"#1e3a5f"),background:afford?"#0d2a4a":"#080d1a",color:afford?"#4a9eff":"#3a5a7a",fontSize:11,cursor:afford?"pointer":"not-allowed",fontWeight:700,marginTop:2}}>Build {p.name}</button>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Launch readiness */}
              {allPhasesDone && (
                <div style={{background:launchResReady?"#0d2a4a":"#080d1a",border:"1px solid "+(launchResReady?"#e6a817":"#1e3a5f"),borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#e6a817",marginBottom:6,letterSpacing:1}}>🌟 LAUNCH READINESS</div>
                  <div style={{fontSize:10,color:"#c8d8f0",marginBottom:6,lineHeight:1.5}}>The ship is built. Stockpile {FMT(LAUNCH_THRESHOLD)} of every resource for the journey.</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(110px, 1fr))",gap:4}}>
                    {["energy","minerals","research","fuel","population"].map(rk=>{
                      const have = res[rk]||0;
                      const ok = have >= LAUNCH_THRESHOLD;
                      const pct = Math.min(100, (have/LAUNCH_THRESHOLD)*100);
                      return (
                        <div key={rk} style={{background:"#080d1a",border:"1px solid "+(ok?"#2a5a2a":"#1e3a5f"),borderRadius:5,padding:"4px 6px"}}>
                          <div style={{fontSize:10,color:ok?"#6fcf97":RES[rk].color,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span>{RES[rk].icon+" "+RES[rk].label}</span>
                            <span style={{fontWeight:700}}>{ok?"✓":Math.floor(pct)+"%"}</span>
                          </div>
                          <div style={{fontSize:9,color:"#5a7a9a"}}>{FMT(Math.floor(have))+"/"+FMT(LAUNCH_THRESHOLD)}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Launch button */}
              <div style={{textAlign:"center",marginTop:10}}>
                <div style={{fontSize:11,color:"#5a7a9a",marginBottom:4}}>Next destination:</div>
                <div style={{fontSize:14,color:"#a0c4ff",fontWeight:700,marginBottom:10}}>{PLANETS[prestige%PLANETS.length]}</div>
                {canLaunch
                  ? <button onClick={()=>{setWon(true);AudioEngine.play("launch");setLaunchModal(true);}} style={{padding:"16px 40px",borderRadius:10,border:"2px solid #e6a817",background:"#5a2a00",color:"#ffe680",cursor:"pointer",fontSize:16,fontWeight:700,boxShadow:"0 0 20px #e6a81788"}}>🚀 LAUNCH COLONY SHIP</button>
                  : allPhasesDone
                    ? <div style={{fontSize:12,color:"#8a6a2a"}}>Stockpile resources to launch.</div>
                    : <div style={{fontSize:12,color:"#4a6a8a"}}>Complete all 5 construction phases to ready the ship.</div>
                }
              </div>
            </div>
          );
        })()}

      </div>

      {newAch&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#1a3a5a",border:"1px solid #4a9eff",color:"#a0c4ff",padding:"8px 18px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:999,pointerEvents:"none",boxShadow:"0 4px 20px #000"}}>
          {"Achievement: "+newAch}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
