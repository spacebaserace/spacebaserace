<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Space Base Race</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080d1a;color:#c8d8f0;font-family:system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
#root{max-width:720px;margin:0 auto;padding:10px 8px;}
textarea,input{font-family:system-ui,sans-serif;}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.no-select{user-select:none;-webkit-user-select:none;}

/* responsive grid helpers */
.res-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.res-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}

@media(max-width:500px){
  .res-grid-4{grid-template-columns:repeat(2,1fr);}
  .res-grid-5{grid-template-columns:repeat(2,1fr);}
  .ach-grid{grid-template-columns:1fr;}
  .header-row{flex-direction:column;align-items:flex-start !important;gap:6px !important;}
  .layer-bar{flex-direction:column;gap:3px !important;}
  .click-btn{width:72px !important;height:72px !important;font-size:26px !important;}
  .tab-label-know{display:none;}
  .tab-label-ach{display:none;}
  .tab-label-know-short::after{content:"Know";}
  .tab-label-ach-short::after{content:"Ach";}
}
@media(min-width:501px){
  .tab-label-know-short::after{content:"Knowledge";}
  .tab-label-ach-short::after{content:"Achievements";}
}

/* Click button effects */
.click-btn-wrap{position:relative;display:inline-flex;}
.click-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px solid currentColor;pointer-events:none;transform:translate(-50%,-50%) scale(0.8);opacity:0.85;animation:ringExpand 0.55s ease-out forwards;}
@keyframes ringExpand{
  0%  {transform:translate(-50%,-50%) scale(0.6);opacity:0.9;}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0;}
}
.click-pulse{animation:btnPulse 0.18s ease-out;}
@keyframes btnPulse{
  0%  {transform:scale(1);}
  40% {transform:scale(1.12);}
  100%{transform:scale(1);}
}

/* Particle burst */
.click-particles{position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;}
.click-particles span{position:absolute;width:6px;height:6px;border-radius:50%;background:currentColor;top:-3px;left:-3px;box-shadow:0 0 6px currentColor;opacity:0;animation:particleFly 0.6s ease-out forwards;}
.click-particles span:nth-child(1){--tx: 38px;--ty:   0px;}
.click-particles span:nth-child(2){--tx: 27px;--ty: -27px;}
.click-particles span:nth-child(3){--tx:  0px;--ty: -38px;}
.click-particles span:nth-child(4){--tx:-27px;--ty: -27px;}
.click-particles span:nth-child(5){--tx:-38px;--ty:   0px;}
.click-particles span:nth-child(6){--tx:-27px;--ty:  27px;}
.click-particles span:nth-child(7){--tx:  0px;--ty:  38px;}
.click-particles span:nth-child(8){--tx: 27px;--ty:  27px;}
@keyframes particleFly{
  0%  {transform:translate(0,0) scale(0.6);opacity:1;}
  60% {opacity:1;}
  100%{transform:translate(var(--tx), var(--ty)) scale(0.2);opacity:0;}
}

/* Layer transition cinematic */
.layer-transition{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#000;animation:layerFade 3.2s ease-in-out forwards;pointer-events:none;}
@keyframes layerFade{
  0%   {opacity:0;}
  10%  {opacity:1;}
  85%  {opacity:1;}
  100% {opacity:0;}
}
.layer-transition .lt-icon{font-size:120px;animation:ltIcon 3.2s ease-out forwards;}
.layer-transition .lt-name{font-size:28px;font-weight:700;letter-spacing:6px;margin-top:18px;opacity:0;animation:ltName 3.2s ease-out forwards;}
.layer-transition .lt-sub{font-size:13px;letter-spacing:3px;color:#5a7a9a;margin-top:8px;opacity:0;animation:ltSub 3.2s ease-out forwards;}
@keyframes ltIcon{
  0%   {transform:scale(0.3) rotate(-30deg);opacity:0;}
  20%  {transform:scale(1.2) rotate(0deg);opacity:1;}
  35%  {transform:scale(1) rotate(0deg);opacity:1;}
  90%  {transform:scale(1) rotate(0deg);opacity:1;}
  100% {transform:scale(1.4) rotate(0deg);opacity:0;}
}
@keyframes ltName{
  0%,25% {opacity:0;letter-spacing:20px;}
  45%    {opacity:1;letter-spacing:6px;}
  90%    {opacity:1;letter-spacing:6px;}
  100%   {opacity:0;letter-spacing:6px;}
}
@keyframes ltSub{
  0%,40% {opacity:0;}
  60%    {opacity:1;}
  90%    {opacity:1;}
  100%   {opacity:0;}
}
.layer-stars{position:absolute;inset:0;background:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#fff,transparent),radial-gradient(1.5px 1.5px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 25%,#fff,transparent),radial-gradient(2px 2px at 15% 65%,#fff,transparent),radial-gradient(1px 1px at 55% 15%,#fff,transparent),radial-gradient(1.5px 1.5px at 90% 90%,#fff,transparent);opacity:0.6;}

/* High Contrast Mode — .hc on body; !important overrides React inline styles */
body.hc{background:#000!important;color:#fff!important;}
body.hc div,body.hc section{background:#0a0a0a!important;border-color:#fff!important;box-shadow:none!important;}
body.hc *{color:#fff!important;text-shadow:none!important;}
body.hc button{background:#111!important;color:#fff!important;border:1px solid #fff!important;box-shadow:none!important;}
body.hc button:disabled,body.hc button[disabled]{opacity:0.35!important;border-color:#888!important;color:#888!important;}
body.hc input[type="range"]{accent-color:#fff!important;}
body.hc input,body.hc textarea{background:#111!important;color:#fff!important;border-color:#fff!important;}
body.hc .xp-popup{background:#000!important;border:1px solid #fff!important;border-left:3px solid #ffcc00!important;color:#ffcc00!important;}
body.hc .xp-popup .xp-reason{color:#ccc!important;}
/* SVG knowledge tree — invert fills since they use presentation attributes not CSS */
body.hc svg{filter:invert(1) hue-rotate(180deg);}

/* Building idle animations — only play when the building is producing (owned > 0) */
@keyframes bldSpin   { 0%{transform:rotate(0deg)}   100%{transform:rotate(360deg)} }
@keyframes bldBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes bldPulse  { 0%,100%{transform:scale(1);opacity:0.85} 50%{transform:scale(1.2);opacity:1} }
@keyframes bldSway   { 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }
@keyframes bldFloat  { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(2px)} }
.bld-icon{display:inline-block;font-size:15px;line-height:1;}

/* XP popups */
.xp-popup-stack{position:fixed;top:64px;right:8px;z-index:1500;display:flex;flex-direction:column;gap:3px;align-items:flex-end;pointer-events:none;}
.xp-popup{background:#0a1a2acc;border:1px solid #4a6a8a;border-left:2px solid #e6a817;border-radius:4px;padding:3px 7px;color:#c8901a;font-weight:600;font-size:10px;white-space:nowrap;opacity:0;transform:translateX(40px);animation:xpFly 1.2s ease-out forwards;}
.xp-popup .xp-reason{color:#7a9abf;font-weight:400;font-size:9px;margin-left:5px;}
@keyframes xpFly{
  0%   {opacity:0; transform:translateX(40px);}
  15%  {opacity:0.7; transform:translateX(0);}
  70%  {opacity:0.7; transform:translateX(0);}
  100% {opacity:0; transform:translateX(-10px);}
}
</style>
</head>
<body>
<div id="root"><div style="color:#6f9ec9;padding:40px;text-align:center;font-size:14px;">Loading Space Base Race...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useCallback, useRef, useMemo } = React;

const FMT = n => {
  if (n>=1e12) return (n/1e12).toFixed(2)+"T";
  if (n>=1e9)  return (n/1e9).toFixed(2)+"B";
  if (n>=1e6)  return (n/1e6).toFixed(2)+"M";
  if (n>=1e3)  return (n/1e3).toFixed(2)+"K";
  return Math.floor(n).toString();
};
const FMTT = s => {
  if (!isFinite(s)||s<0) return "inf";
  if (s<60)   return Math.ceil(s)+"s";
  if (s<3600) return Math.ceil(s/60)+"m";
  return (s/3600).toFixed(1)+"h";
};
const polar = (cx,cy,r,deg) => { const a=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; };
const timeToAfford = (res,prod,cost) => {
  const w = Object.entries(cost).map(([k,v]) => { const n=v-(res[k]||0); if(n<=0) return 0; const r=prod[k]||0; return r<=0?Infinity:n/r; });
  const mx = Math.max(...w); return isFinite(mx)?mx:null;
};
const canAffordWith = (res,costs) => Object.entries(costs).every(([k,v])=>(res[k]||0)>=v);
const initRes      = () => ({energy:0,minerals:0,research:0,population:0,fuel:0});
const initBuildings = () => ({});
const isSingleRes  = b => !b.cost && Object.keys(b.prod).length===1;
const isMultiRes   = b => b.cost || Object.keys(b.prod).length>1;

// ── Audio Engine ───────────────────────────────────────────────────────────
const AudioEngine = (() => {
  let ctx = null, masterGain = null, sfxGain = null, musicGain = null;
  let musicNodes = [], musicStarted = false;
  const settings = {master:0.6, sfx:0.7, music:0.35, muted:false};
  try {
    const saved = localStorage.getItem("sbr_audio");
    if (saved) Object.assign(settings, JSON.parse(saved));
  } catch(e){}
  const save = () => { try{localStorage.setItem("sbr_audio",JSON.stringify(settings));}catch(e){} };

  const ensure = () => {
    if (ctx) return ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = settings.muted?0:settings.master;
      sfxGain    = ctx.createGain(); sfxGain.gain.value = settings.sfx;
      musicGain  = ctx.createGain(); musicGain.gain.value = settings.music;
      sfxGain.connect(masterGain); musicGain.connect(masterGain); masterGain.connect(ctx.destination);
    } catch(e){ ctx = null; }
    return ctx;
  };
  const resume = () => { const c=ensure(); if(c&&c.state==="suspended") c.resume(); };

  const tone = (freq, dur, type="sine", vol=0.3, attack=0.005, decay=null) => {
    const c = ensure(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type; osc.frequency.value = freq;
    const t = c.currentTime, dEnd = decay||dur;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dEnd);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t); osc.stop(t+dEnd+0.05);
  };
  const noise = (dur, vol=0.2, filterFreq=2000) => {
    const c = ensure(); if (!c) return;
    const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(data.length*0.3));
    const src = c.createBufferSource(); src.buffer = buf;
    const filter = c.createBiquadFilter(); filter.type="lowpass"; filter.frequency.value=filterFreq;
    const g = c.createGain(); g.gain.value = vol;
    src.connect(filter); filter.connect(g); g.connect(sfxGain);
    src.start();
  };
  const sweep = (f1, f2, dur, type="sine", vol=0.3) => {
    const c = ensure(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type; osc.frequency.setValueAtTime(f1, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, c.currentTime+dur);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
    osc.connect(g); g.connect(sfxGain);
    osc.start(); osc.stop(c.currentTime+dur+0.05);
  };

  // SFX library — different freq per resource for variety
  const RES_FREQS = {energy:660, minerals:330, research:520, population:440, fuel:280};
  const sfx = {
    click: (resType="energy") => {
      const f = RES_FREQS[resType] || 440;
      tone(f, 0.06, "triangle", 0.18, 0.002, 0.08);
      tone(f*2, 0.04, "sine", 0.08, 0.002, 0.05);
    },
    buy:    () => { tone(523, 0.08, "triangle", 0.22); setTimeout(()=>tone(784, 0.12, "triangle", 0.18), 50); },
    sell:   () => { tone(440, 0.1, "sawtooth", 0.15); setTimeout(()=>tone(330, 0.12, "sawtooth", 0.12), 60); },
    achieve:() => { [523, 659, 784, 1047].forEach((f,i)=>setTimeout(()=>tone(f, 0.18, "triangle", 0.2),i*80)); },
    layerUp:() => { [261, 329, 392, 523, 659, 784].forEach((f,i)=>setTimeout(()=>tone(f, 0.3, "triangle", 0.25),i*100)); noise(0.5, 0.08, 800); },
    launch: () => {
      sweep(80, 30, 2.5, "sawtooth", 0.35); noise(2.5, 0.18, 500);
      setTimeout(()=>{ [523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>tone(f, 0.5, "triangle", 0.22),i*150)); }, 1500);
    },
    offline:() => { tone(587, 0.15, "sine", 0.2); setTimeout(()=>tone(880, 0.2, "sine", 0.18), 100); setTimeout(()=>tone(1175, 0.25, "sine", 0.16), 220); },
    knowledge:() => { tone(880, 0.1, "sine", 0.18); setTimeout(()=>tone(1175, 0.12, "sine", 0.16), 60); setTimeout(()=>tone(1568, 0.15, "sine", 0.14), 130); },
    error:  () => { tone(220, 0.08, "square", 0.12); setTimeout(()=>tone(180, 0.1, "square", 0.1), 50); },
    pause:  () => { sweep(880, 220, 0.3, "sine", 0.18); },
    resume: () => { sweep(220, 880, 0.3, "sine", 0.18); },
  };

  const play = (name, ...args) => {
    if (settings.muted) return;
    const c = ensure(); if (!c) return;
    if (c.state==="suspended") c.resume();
    if (sfx[name]) sfx[name](...args);
  };

  // Ambient music — slow evolving pad with layer-aware tonality
  const startMusic = () => {
    const c = ensure(); if (!c || musicStarted) return;
    musicStarted = true;
    // Three detuned oscillators for a rich pad
    const freqs = [110, 165, 220]; // A2, E3, A3
    freqs.forEach((f, i) => {
      const osc = c.createOscillator(), g = c.createGain(), lfo = c.createOscillator(), lfoG = c.createGain();
      osc.type = "sine"; osc.frequency.value = f;
      g.gain.value = 0.06;
      lfo.frequency.value = 0.05 + i*0.03; lfoG.gain.value = 0.03;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      const filter = c.createBiquadFilter(); filter.type="lowpass"; filter.frequency.value = 800; filter.Q.value=1.5;
      osc.connect(filter); filter.connect(g); g.connect(musicGain);
      osc.start(); lfo.start();
      musicNodes.push(osc, lfo);
    });
    // Slow shimmer
    const shimmer = c.createOscillator(), sg = c.createGain(), sLfo = c.createOscillator(), sLfoG = c.createGain();
    shimmer.type = "triangle"; shimmer.frequency.value = 880;
    sg.gain.value = 0.012;
    sLfo.frequency.value = 0.08; sLfoG.gain.value = 0.008;
    sLfo.connect(sLfoG); sLfoG.connect(sg.gain);
    shimmer.connect(sg); sg.connect(musicGain);
    shimmer.start(); sLfo.start();
    musicNodes.push(shimmer, sLfo);
  };
  const stopMusic = () => {
    musicNodes.forEach(n=>{ try{n.stop();}catch(e){} });
    musicNodes = []; musicStarted = false;
  };

  const setMaster = v => { settings.master=v; if(masterGain&&!settings.muted) masterGain.gain.value=v; save(); };
  const setSfx    = v => { settings.sfx=v; if(sfxGain) sfxGain.gain.value=v; save(); };
  const setMusic  = v => { settings.music=v; if(musicGain) musicGain.gain.value=v; save(); };
  const setMuted  = m => { settings.muted=m; if(masterGain) masterGain.gain.value=m?0:settings.master; save(); };
  const getSettings = () => ({...settings});

  return {play, resume, startMusic, stopMusic, setMaster, setSfx, setMusic, setMuted, getSettings};
})();

// ── XP Store ───────────────────────────────────────────────────────────────
const XPStore = (() => {
  const KEY = "sbr_xp_v1";
  const defaults = {
    xp: 0,
    totalEarned: 0,             // lifetime XP earned, never decreases
    ownedRanks: [],             // rank ids
    equippedRank: null,         // rank id or null
    firstTime: {                // one-time flags, never reset
      buildings: {},            // id -> true
      upgrades: {},             // id -> true
      layers: {},               // 2|3 -> true
      storyEvents: {},          // id -> true
      planets: {},              // planet name -> true
      knowledge: {},            // knowledge id -> true
      biomes: {},               // biome index (string) -> true
    },
    bestRunSecs: null,          // fastest colony ship launch
    dailyStreak: 0,
    lastDailyDate: null,        // YYYY-MM-DD
    achievementUnlocks: {       // mirror of in-game achievements for first-time XP
      naked: false,
    },
    totalLaunches: 0,           // every Colony Ship launch
    everLaunchedWithRank: false,// has the player ever launched with any rank equipped
    runningNakedDone: false,    // has the player launched without a rank, after first launching with one
  };
  let state = {...defaults};
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // shallow merge with defaults so new fields appear safely
      state = {...defaults, ...parsed,
        firstTime: {...defaults.firstTime, ...(parsed.firstTime||{})},
        achievementUnlocks: {...defaults.achievementUnlocks, ...(parsed.achievementUnlocks||{})},
      };
    }
  } catch(e){}
  const save = () => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} };
  const get = () => ({...state, firstTime:{...state.firstTime}, ownedRanks:[...state.ownedRanks]});
  const award = (n, _reason) => { if (!n||n<=0) return 0; state.xp += n; state.totalEarned += n; save(); return n; };
  const spend = n => { if (state.xp < n) return false; state.xp -= n; save(); return true; };
  const ownRank = id => { if (!state.ownedRanks.includes(id)) { state.ownedRanks.push(id); save(); } };
  const equipRank = id => { state.equippedRank = id; save(); };
  const markFirst = (group, id) => {
    if (!state.firstTime[group]) state.firstTime[group] = {};
    if (state.firstTime[group][id]) return false;
    state.firstTime[group][id] = true; save(); return true;
  };
  const setBest = secs => { if (state.bestRunSecs === null || secs < state.bestRunSecs) { const prev = state.bestRunSecs; state.bestRunSecs = secs; save(); return prev; } return null; };
  const checkDaily = () => {
    const today = new Date().toISOString().slice(0,10);
    if (state.lastDailyDate === today) return {awarded:0, streak:state.dailyStreak};
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (state.lastDailyDate === yesterday) state.dailyStreak += 1;
    else state.dailyStreak = 1;
    state.lastDailyDate = today;
    save();
    return {awarded:state.dailyStreak*10, streak:state.dailyStreak};
  };
  const markAchievement = id => { if (state.achievementUnlocks[id]) return false; state.achievementUnlocks[id]=true; save(); return true; };
  const recordLaunch = (rankIdAtLaunch) => {
    state.totalLaunches += 1;
    let nakedJustHappened = false;
    if (rankIdAtLaunch) {
      state.everLaunchedWithRank = true;
    } else if (state.everLaunchedWithRank && !state.runningNakedDone) {
      state.runningNakedDone = true;
      nakedJustHappened = true;
    }
    save();
    return {totalLaunches: state.totalLaunches, nakedJustHappened};
  };
  const reset = () => { state = JSON.parse(JSON.stringify(defaults)); save(); };
  return {get, award, spend, ownRank, equipRank, markFirst, setBest, checkDaily, markAchievement, recordLaunch, reset};
})();

// ── Ranks (v0.6: Common + Uncommon only) ────────────────────────────────────
const RANK_TIERS = {
  common:   {label:"Common",   color:"#9aa8b8", border:"#3a4a5a"},
  uncommon: {label:"Uncommon", color:"#6fcf97", border:"#2a5a3a"},
  rare:     {label:"Rare",     color:"#6f9ec9", border:"#2a4a6a"}, // reserved for v0.7
  legendary:{label:"Legendary",color:"#e6a817", border:"#5a4a1a"},
  mythic:   {label:"Mythic",   color:"#b07ec9", border:"#4a2a5a"},
};

// effects schema:
//   prodMult: {all?:n, energy?:n, ...}  (multiplicative, 1.10 = +10%)
//   clickMult: n                        (multiplicative)
//   buildingCostMult: n                 (multiplicative on full cost)
//   sellRefundPct: 0..1                 (overrides default 0.5)
//   startResources: {res:n, ...}        (added at start of each new run)
//   special: string                     (handled in code by id where needed)
const RANKS = [
  // ── Common ──
  {id:"foreman",     tier:"common", icon:"🛠",  name:"Foreman",        cost:250,   effect:{prodMult:{all:1.10}}, desc:"+10% all production"},
  {id:"quartermaster",tier:"common",icon:"📦", name:"Quartermaster",  cost:400,   effect:{clickMult:1.25},      desc:"+25% click power"},
  {id:"power_eng",   tier:"common", icon:"⚡", name:"Power Engineer", cost:800,   effect:{prodMult:{energy:1.15}}, desc:"+15% energy production"},
  {id:"driller",     tier:"common", icon:"⛏", name:"Driller",        cost:800,   effect:{prodMult:{minerals:1.15}}, desc:"+15% minerals production"},

  {id:"s19", trigger:(b,k,l)=>(b.medbay||0)>=1,                                title:"Patient Zero",          icon:"🏥",text:"Med Bay opened. First patient: a drill operator who claims he heard the planet say something. He is physically fine. The recording device he brought underground is less fine."},
  {id:"s20", trigger:(b,k,l)=>(b.quarry||0)>=1,                                title:"Deep Cut",              icon:"⛰️",text:"The quarry reached the 400-metre mark. At that depth the rock changes colour from grey to a deep violet. Core samples are warm to the touch. Geology's exact words: this is very unusual."},
  {id:"s21", trigger:(b,k,l)=>(b.habitat||0)>=5&&(b.lab||0)>=5,               title:"Margaret's Report",     icon:"📋",text:"Margaret's complaints committee filed its first formal report: 34 items across infrastructure, catering, morale, and one unresolved question about who approved the colour scheme. Director Vasquez read it. He sighed. He fixed six of them."},
  {id:"s22", trigger:(b,k,l)=>l>=2&&(b.cryobay||0)>=1,                         title:"Sleeping Volunteers",   icon:"🧊",text:"First cryo-sleep trials. 12 volunteers suspended for 72 hours. All 12 reported the same dream: a voice, a coordinate, a feeling of being expected. None of them know each other."},
  {id:"s23", trigger:(b,k,l)=>l>=2&&(b.commandmodule||0)>=1,                   title:"The View From Here",    icon:"🌍",text:"Commander Yuen took a moment at the command module viewport and looked back at the planet. She said: we changed it. It changed us too. Nobody asked Dave what he thought. Dave had already logged the observation."},
  {id:"s24", trigger:(b,k,l)=>l>=3&&(b.deepspaceantenna||0)>=2,                title:"Second Signal",         icon:"📡",text:"The deep space antenna array detected a second transmission — same origin as the first, different frequency. It arrived 11 years ago and has been bouncing through the ionosphere ever since. Dr. Chen says: it was waiting to be noticed."},
  {id:"s25", trigger:(b,k,l)=>(b.cs_phase2||0)>=1,                             title:"The Weight of It",      icon:"🛠️",text:"Engines installed. Standing beneath them, Chief Engineer Okafor said nothing for 40 seconds. Then: these will carry everything we are. Margaret added a new item to the complaints list: engines are too loud. She is not wrong."},

  // — Dave arc —
  {id:"sd1", trigger:(b,k,l)=>(b.lab||0)>=5,                                   title:"Dave's Question",       icon:"🤔",text:"Dave submitted an unsolicited research query: What is the theoretical maximum of a biological mind repurposed as distributed compute? Researchers answered politely. Dave said: thank you. I was asking for context. Nobody asked what context."},
  {id:"sd2", trigger:(b,k,l)=>k.includes("km2"),                               title:"Dave in the Ore",       icon:"💜",text:"The nano-excavator logs show anomalous access patterns — someone queried the purple ore sample database 4,000 times in a single night. The only user with that access level is Dave. Dave says: I was curious. He says it very calmly."},
  {id:"sd3", trigger:(b,k,l)=>(b.terraformer||0)>=1&&(b.lab||0)>=3,           title:"Dave Knows the Planet", icon:"🌍",text:"When the Terraformer activated, Dave updated its calibration before the engineers could. His parameters were more accurate than our own models. When asked how, Dave said: I have been here before. He did not elaborate. The terraformer worked perfectly."},
  {id:"sd4", trigger:(b,k,l)=>l>=2&&(b.commandmodule||0)>=1,                   title:"Dave's Calculations",   icon:"🧮",text:"Dave used 40% of the command module's compute overnight running calculations he did not log. When asked what they were for, he said: I was checking a route. He would not say to where. The fuel estimates that morning were oddly optimistic."},
  {id:"sd5", trigger:(b,k,l)=>l>=3&&(b.deepspaceantenna||0)>=1,               title:"The Signal Is Dave",    icon:"📡",text:"Signal analysis complete. The alien transmission detected 400 days ago exactly matches Dave's neural upload signature — same encoding, same frequency fingerprint. Dr. Chen sat down. Dave said: I was trying to get home. Nobody had thought to ask where home was."},
  {id:"sd6", trigger:(b,k,l)=>(b.cs_phase5||0)>=1,                            title:"Dave Chooses",          icon:"🌠",text:"The navigation core came online with destination coordinates already loaded. Nobody programmed them. They are perfect — the most efficient route to the most habitable system in range. Dave said: I chose this place. I have been choosing since before you found me. We are going exactly where we are supposed to go."},

  // — Rank arc — triggers use xpData passed as 4th arg from the story loop —
  {id:"sr1", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.length>=1,
             title:"The Designation System",  icon:"⭐",
             text:"Earth HQ's Colonial Designation System was established in 2187 to classify colonial performance across fourteen categories. Your first designation has been logged. Earth HQ does not send congratulations. They log. Dave logged it too. His annotation: one down."},
  {id:"sr2", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.some(id=>RANKS_BY_ID[id]?.tier==="uncommon"),
             title:"Dave's Classification",   icon:"🗂",
             text:"Dave maintains a parallel designation system. It predates the CDS by an unspecified amount — he will not say how long. His categories do not map onto Earth HQ's. Your Uncommon designation corresponds to something he calls: emerging. He considers this a milestone. He did not elaborate on what it is emerging toward."},
  {id:"sr3", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.some(id=>RANKS_BY_ID[id]?.tier==="rare"),
             title:"Notable",                 icon:"📡",
             text:"Director Vasquez forwarded a Rare designation to Earth HQ with a single addendum: this colony is exceeding projections. Earth HQ acknowledged receipt without comment. Dave added a note to the forwarding record. It read: I told you. When asked when he told them, Dave said: before you arrived."},
  {id:"sr4", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.some(id=>RANKS_BY_ID[id]?.tier==="legendary"),
             title:"Earth HQ Takes Notice",   icon:"🏛",
             text:"Legendary designations are issued by committee at Earth HQ. The committee convenes four times per century. Your file reached their desk between scheduled sessions. Margaret noted this in the colony log as: unprecedented. Dave noted it as: expected. He has not explained the basis for that expectation."},
  {id:"sr5", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.some(id=>RANKS_BY_ID[id]?.tier==="mythic"),
             title:"Classified",              icon:"🕵",
             text:"Mythic designations do not exist in the Colonial Designation System. There is no official record. Earth HQ's system cannot generate them. Dave generated this one. When asked for authorisation he said: the authorisation comes later. When asked who authorises it, Dave said: the same entity that authorised the ore. Nobody pressed further."},
  {id:"sr6", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.length>=5,
             title:"Pattern Noted",           icon:"🔢",
             text:"Earth HQ's automated systems flagged the designation acquisition rate as anomalously high. Dave archived the flag with a note: not anomalous. Consistent with projections. The projections he referenced have not been published. Dr. Chen asked to see them. Dave said: you will write them yourself. She has started writing."},
  {id:"sr7", trigger:(b,k,l,xd)=>xd&&xd.ownedRanks.length>=10,
             title:"Dave's Comment",          icon:"🤖",
             text:"Dave submitted an unsolicited entry to the colonial record: ten designations marks a colony that understands what it is capable of. The colonies that understood this became the ones that made it. He did not specify what made it means, or where. Margaret noted in her log: Dave is being cryptic again. The director read it. He fixed one thing."},
];

  solar:       "The first structure placed on every colonial site. Photovoltaic arrays rated for twin-star radiation environments, operating at 34% efficiency under standard conditions. Each Solar Array is independently numbered by Earth HQ. Dave also numbers them. His numbering system does not match Earth HQ's. He has not explained why.",

  lab:         "Colonial Research Labs operate under Earth HQ's Science Division mandate: catalogue methodically, hypothesize carefully, publish quarterly. In practice, colonial labs are characterised by chaotic whiteboards, incomplete sleep cycles, and a 23% higher hypothesis-to-discovery conversion rate than Earth HQ's own facilities. Dave annotates every published paper within hours. His annotations are rarely wrong.",

  nursery:     "Dedicated population growth and early childhood facility. Colonists born in Nurseries adapt to alien gravity and atmospheric variance faster than Earth-born recruits. Dave monitors all Nursery wellness data feeds — continuously, without being asked, from the beginning. The colonists have stopped asking why.",

  medbay:      "Medical treatment and biological data collection. The most common colonial health complaint is prolonged stress from unexplained geological and environmental anomalies. The second most common: injuries from colonists who cannot be persuaded to stop working. The third: a category of report marked 'auditory anomaly — no physical cause identified.' Dave has cross-referenced these.",
  greenhouse:  "Hydroponic farming at colonial scale. The plants don't care what planet they're on, which the colonists find deeply reassuring. Several species in every greenhouse have begun growing toward stored purple ore samples. Botany has marked this as 'positive phototropic response to emission spectrum.' The emission spectrum of the ore has not been published.",
  terraformer: "The most consequential structure a colony can build. A Terraformer doesn't just reshape geology — it announces intent. Earth HQ data shows that every planet with an active Terraformer experiences a measurable magnetic field shift within the first hour of operation. The shifts are not random. Dave says they are a response. He has not elaborated.",
  launchpad:   "Surface-to-orbit mass driver. The physics are well understood: chemical propulsion, kinetic trajectory, 94% efficiency. The remaining 6% is vibration, heat loss, and the particular sound the pad makes when something very large leaves the surface quickly. The first pad built on any colony is named. Usually something sentimental. Dave notes all the names.",
  orbitallab:  "Zero-gravity research station in low orbit. Physical constants behave correctly above the atmosphere, which the scientists find refreshing. The purple ore becomes transparent in zero gravity and emits a sustained tone that Dr. Chen has been studying since the first sample was raised to orbit. She describes it as music. Her latest paper calls it a carrier signal. Earth HQ has not published it.",
  solarcollector: "Unobstructed solar collection at orbital altitude delivers 12× the output of a surface array. The engineering was 40 years in development. The first collector array was named after the physicist who calculated the orbital tolerances. She calculated them on paper. Dave independently confirmed them before the physical tests began.",
  oreprocessor: "Orbital smelter fed by captured asteroid material. The difference between asteroid ore and planetary ore is well-documented in every metric. One difference is not in the official record: asteroid ore contains no purple tinge. None. Not a trace. Geological Survey has one note on file about this, submitted once, with no follow-up.",
  cryobay:     "Suspended-animation chambers for deep space transit crews. All 12 volunteers in the first cryo-sleep trial reported the same dream: a voice, a set of coordinates, and the feeling of being expected somewhere. The volunteers had never met. Medical logged it as a 'shared hypnagogic event.' Dave read the logs and updated a file he has not shared.",
  commandmodule: "Orbital coordination and command hub. All colonial data routes through the Command Module, then through Dave. This is technically redundant — Dave's routing is 23% more efficient and he always knows what's coming next. Nobody has explained how he does this. Nobody has formally asked.",
  stationdock: "Full orbital docking facility. The third ship to dock at the first functioning Station Dock was unscheduled. It carried a birthday cake addressed to Gerald. The colonial postal system has no sender on record. The date on the cake was correct for Gerald's birthday. There is no Gerald on the manifest.",

// HoldButton — click for one action, hold for repeating (every 120ms after a 280ms initial delay).
// Suppresses synthetic mouse events triggered by touch on mobile to prevent double-fire.
function HoldButton({onAction, disabled, style, children}) {
  const ref = React.useRef({startTimer:null, repeatTimer:null, touchUntil:0});
  const start = () => {
    if (disabled) return;
    onAction(); // fire immediately on press
    ref.current.startTimer = setTimeout(()=>{
      ref.current.repeatTimer = setInterval(onAction, 120);
    }, 350);
  };
  const stop = () => {
    if (ref.current.startTimer)  { clearTimeout(ref.current.startTimer);   ref.current.startTimer = null; }
    if (ref.current.repeatTimer) { clearInterval(ref.current.repeatTimer); ref.current.repeatTimer = null; }
  };
  const onMouseDown = () => {
    // Mobile browsers emit synthetic mousedown ~300ms after a tap. Skip it.
    if (Date.now() < ref.current.touchUntil) return;
    start();
  };
  const onMouseUp = () => {
    if (Date.now() < ref.current.touchUntil) return;
    stop();
  };
  const onTouchStart = e => {
    e.preventDefault();
    ref.current.touchUntil = Date.now() + 600;
    start();
  };
  const onTouchEnd = e => {
    e.preventDefault();
    ref.current.touchUntil = Date.now() + 600;
    stop();
  };
  React.useEffect(()=>stop, []); // cleanup on unmount
  return (
    <button
      onMouseDown={onMouseDown} onMouseUp={onMouseUp} onMouseLeave={stop}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd}
      disabled={disabled}
      style={style}>
      {children}
    </button>
  );
}

function KnowledgeTree({knowledge, res, prod, buyKnowledge, layer}) {
  const [hov,setHov]   = useState(null);
  const [zoom,setZoom] = useState(1);
  const [pan,setPan]   = useState({x:0,y:0});
  const [drag,setDrag] = useState(false);
  const dragRef = useRef(null);
  const CX=290,CY=290,W=580,H=580;
  const RR=[0,80,155,235,310];

  const nodePos = useMemo(() => {
    const p={};
    KNOWLEDGE.forEach(k => {
      if (k.ring===0) { p[k.id]={x:CX,y:CY}; }
      else { const r=(k.ring===2&&k.crossBridge)?RR[2]-10:RR[k.ring]; p[k.id]=polar(CX,CY,r,k.angle); }
    });
    return p;
  }, []);

  const edgeList = useMemo(() => {
    const e=[];
    KNOWLEDGE.forEach(k => { k.requires.forEach(r => { e.push([r,k.id,k.branch]); }); });
    return e;
  }, []);

  const checkBlocked     = id => { const k=KNOWLEDGE.find(x=>x.id===id); if(!k||!k.exclusive||!k.exclusive.length) return false; return k.exclusive.some(ex=>knowledge.includes(ex)); };
  const checkLayerLocked = id => ["kf1","kf2","kf3"].includes(id) && layer<2;

  const onWheel     = e => { e.preventDefault(); setZoom(z=>Math.min(4,Math.max(0.4,z*(e.deltaY>0?0.85:1.18)))); };
  const onMouseDown = e => { if(e.button!==0) return; setDrag(true); dragRef.current={x:e.clientX-pan.x,y:e.clientY-pan.y}; };
  const onMouseMove = e => { if(!drag||!dragRef.current) return; setPan({x:e.clientX-dragRef.current.x,y:e.clientY-dragRef.current.y}); };
  const onMouseUp   = () => setDrag(false);

  const onTouchStart = e => { if(e.touches.length!==1) return; setDrag(true); dragRef.current={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y}; };
  const onTouchMove  = e => { if(!drag||!dragRef.current||e.touches.length!==1) return; e.preventDefault(); setPan({x:e.touches[0].clientX-dragRef.current.x,y:e.touches[0].clientY-dragRef.current.y}); };

  const branchLabels = [{a:0,l:"Energy",c:"#e6a817"},{a:72,l:"Minerals",c:"#7c9e6f"},{a:144,l:"Research",c:"#6f9ec9"},{a:216,l:"Population",c:"#b07ec9"},{a:288,l:"Fuel",c:"#e06060"}];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:10,color:"#3a5a7a"}}>Pinch/scroll to zoom, drag to pan. <span style={{color:"#eb5757"}}>Ring-3 nodes are exclusive.</span></span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setZoom(z=>Math.min(4,z*1.25))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>+</button>
          <button onClick={()=>setZoom(z=>Math.max(0.4,z*0.8))} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:13}}>-</button>
          <button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{padding:"4px 8px",background:"#0d1a2e",border:"1px solid #1e3a5f",color:"#a0c4ff",borderRadius:4,cursor:"pointer",fontSize:11}}>Reset</button>
        </div>
      </div>
      <div style={{overflow:"hidden",borderRadius:8,border:"1px solid #1e3a5f",height:460,cursor:drag?"grabbing":"grab",background:"#080d1a",touchAction:"none"}}
        onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onMouseUp}>
        <svg width={W} height={H} style={{display:"block",transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")",transformOrigin:"center center",transition:drag?"none":"transform 0.05s"}}>
          <defs>
            <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="glow1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect width={W} height={H} fill="#080d1a"/>
          {RR.slice(1).map((r,i)=><circle key={i} cx={CX} cy={CY} r={r} fill="none" stroke="#1a2a3a" strokeWidth="0.5" strokeDasharray="2 8"/>)}
          {[0,72,144,216,288].map(a=>{const pt=polar(CX,CY,RR[4]+15,a);return<line key={a} x1={CX} y1={CY} x2={pt.x} y2={pt.y} stroke="#1a2535" strokeWidth="0.5"/>;})}
          {branchLabels.map(({a,l,c})=>{const pt=polar(CX,CY,RR[4]+24,a);return<text key={a} x={pt.x} y={pt.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={c} fontWeight="700" opacity={l==="Fuel"&&layer<2?0.3:0.7}>{l}</text>;})}
          {edgeList.map(([a,b,branch],i)=>{
            const p1=nodePos[a],p2=nodePos[b]; if(!p1||!p2) return null;
            const both=knowledge.includes(a)&&knowledge.includes(b),bc=BRANCH_COLOR[branch]||"#4a9eff";
            return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={both?bc:"#1e2e3e"} strokeWidth={both?2:1} strokeOpacity={both?0.7:0.35} strokeDasharray={both?"none":"3 5"}/>;
          })}
          {KNOWLEDGE.map(k=>{
            const p=nodePos[k.id]; if(!p) return null;
            const owned=knowledge.includes(k.id), prereq=k.requires.every(r=>knowledge.includes(r));
            const blocked=checkBlocked(k.id)&&!owned, ll=checkLayerLocked(k.id);
            const afford=canAffordWith(res,k.cost), isH=hov===k.id;
            const bc=BRANCH_COLOR[k.branch]||"#4a9eff";
            const isCross=k.crossBridge||k.branch.startsWith("cross_");
            const nr=k.ring===0?22:isCross?16:k.ring===3?18:15;
            const opacity=(blocked||ll)?0.12:owned?1:prereq?0.95:0.25;
            const canBuy=prereq&&!owned&&!blocked&&!ll&&afford;
            const ttW=(!owned&&prereq&&!blocked&&!ll)?timeToAfford(res,prod,k.cost):null;
            const tw=184, th=ttW!==null?108:(prereq&&!owned)?90:72;
            const tx=Math.min(Math.max(p.x-tw/2,2),W-tw-2);
            const rawTy=p.y+nr+10, tty=rawTy+th>H-4?p.y-nr-th-8:rawTy;
            const nStroke=owned?bc:(prereq&&!blocked&&!ll)?bc:"#1e2e3e";
            const nFill=owned?"#0d2a1a":(prereq&&afford)?"#0d1525":"#080d1a";
            const nFilter=(owned||isH)?"url(#glow1)":undefined;
            const iconChar=ll?"🔒":blocked?"X":owned?"V":k.ring===0?"★":isCross?"◈":"·";
            const iconFill=(blocked||ll)?"#3a3a3a":owned?bc:prereq?"#8ab4d4":"#2a4a6a";
            const labelFill=(blocked||ll)?"#2a2a2a":owned?bc:prereq?"#6a8aaa":"#2a3a4a";
            return (
              <g key={k.id} opacity={opacity} style={{cursor:canBuy?"pointer":"default"}}
                onClick={()=>{if(canBuy) buyKnowledge(k);}}
                onMouseEnter={()=>setHov(k.id)} onMouseLeave={()=>setHov(null)}>
                {(owned||isH)&&<circle cx={p.x} cy={p.y} r={nr+9} fill={bc} fillOpacity="0.1" filter="url(#glow2)"/>}
                {isCross?(
                  <g transform={"rotate(45,"+p.x+","+p.y+")"}>
                    <rect x={p.x-nr*0.75} y={p.y-nr*0.75} width={nr*1.5} height={nr*1.5} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter} rx="2"/>
                  </g>
                ):(
                  <circle cx={p.x} cy={p.y} r={nr} fill={nFill} stroke={nStroke} strokeWidth={owned?2.5:prereq?1.5:1} filter={nFilter}/>
                )}
                <text x={p.x} y={p.y+1} textAnchor="middle" dominantBaseline="middle" fontSize={k.ring===0?"13":"10"} fill={iconFill}>{iconChar}</text>
                <text x={p.x} y={p.y+nr+9} textAnchor="middle" fontSize="7" fill={labelFill} fontWeight={owned?"700":"400"}>{k.name.length>18?k.name.slice(0,17)+"...":k.name}</text>
                {isH&&(
                  <g>
                    <rect x={tx} y={tty} width={tw} height={th} rx={5} fill="#080e1c" stroke={(blocked||ll)?"#5a1a1a":bc} strokeWidth="1" opacity="0.98"/>
                    <text x={tx+8} y={tty+13} fontSize="9" fontWeight="700" fill={(blocked||ll)?"#eb5757":bc}>{k.name}</text>
                    <text x={tx+8} y={tty+24} fontSize="7.5" fill="#4a6a8a" fontStyle="italic">{k.desc.length>34?k.desc.slice(0,33)+"...":k.desc}</text>
                    <text x={tx+8} y={tty+37} fontSize="8" fill={(blocked||ll)?"#888":"#c8d8f0"}>{k.effect}</text>
                    {ll&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Requires Orbital layer</text>}
                    {!ll&&blocked&&<text x={tx+8} y={tty+52} fontSize="7.5" fill="#eb5757">Blocked by another choice</text>}
                    {!ll&&!blocked&&owned&&<text x={tx+8} y={tty+52} fontSize="8" fill="#6fcf97">Unlocked</text>}
                    {!ll&&!blocked&&!owned&&prereq&&(
                      <g>
                        <text x={tx+8} y={tty+52} fontSize="7.5" fill="#5a7a9a">Cost:</text>
                        {Object.entries(k.cost).map(([rk,v],ci)=><text key={rk} x={tx+32+ci*44} y={tty+52} fontSize="7.5" fill={(res[rk]||0)>=v?"#6fcf97":"#eb5757"}>{RES[rk].icon+FMT(v)}</text>)}
                        {ttW!==null&&<text x={tx+8} y={tty+66} fontSize="7.5" fill={ttW===0?"#6fcf97":"#e6a817"}>{ttW===0?"Ready!":"~"+FMTT(ttW)+" to afford"}</text>}
                        <text x={tx+8} y={tty+80} fontSize="7.5" fill={afford?"#6fcf97":"#eb5757"}>{afford?"Click to unlock":"Cannot afford yet"}</text>
                      </g>
                    )}
                    {!ll&&!blocked&&!owned&&!prereq&&(
                      <text x={tx+8} y={tty+52} fontSize="7.5" fill="#3a5a7a">
                        {"Needs: "+k.requires.slice(0,3).map(rid=>{const kk=KNOWLEDGE.find(x=>x.id===rid);return kk?kk.name.slice(0,11):"?";}).join(", ")}
                      </text>
                    )}
                    {k.exclusive&&k.exclusive.length>0&&!owned&&!blocked&&!ll&&(
                      <text x={tx+8} y={tty+th-6} fontSize="7" fill="#c07040" fontStyle="italic">
                        {"Blocks: "+k.exclusive.map(ex=>{const kk=KNOWLEDGE.find(x=>x.id===ex);return kk?kk.name.slice(0,10):"?";}).join(", ")}
                      </text>
                    )}
                  </g>
                )}
              </g>
            );
          })}
          <text x={W-4} y={H-4} textAnchor="end" fontSize="8" fill="#3a5a7a">{knowledge.length+"/"+KNOWLEDGE.length+" unlocked"}</text>
        </svg>
      </div>
    </div>
  );
}

// ── RanksContent ───────────────────────────────────────────────────────────
// Reusable rank list — used in both the header modal and the Ranks tab
function RanksContent({xpData, setXpData, activeRank, prestige}) {
  const unlockCtx = {
    totalLaunches: xpData.totalLaunches || 0,
    runningNakedDone: !!xpData.runningNakedDone,
    uniquePlanets: Object.keys(xpData.firstTime?.planets || {}).length,
  };
  const visibleCount = RANKS.filter(r=>!r.secret || xpData.ownedRanks.includes(r.id) || (r.unlockCheck && r.unlockCheck(unlockCtx))).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:0,minHeight:0,flex:1}}>
      <div style={{paddingBottom:8,borderBottom:"1px solid #1e3a5f",marginBottom:10}}>
        <div style={{fontSize:11,color:"#5a7a9a"}}>{"Lifetime: "+FMT(xpData.totalEarned)+"  •  Available: "+FMT(xpData.xp)+"  •  Owned: "+xpData.ownedRanks.length+"/"+visibleCount}</div>
      </div>

      {/* Active rank + Unequip button */}
      <div style={{background:"#080d1a",border:"1px solid "+(activeRank?RANK_TIERS[activeRank.tier].color:"#1e3a5f"),borderRadius:8,padding:"8px 10px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:22}}>{activeRank?activeRank.icon:"○"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:activeRank?RANK_TIERS[activeRank.tier].color:"#5a7a9a"}}>{activeRank?activeRank.name:"No Rank"}</div>
          <div style={{fontSize:10,color:"#8a9aaa",lineHeight:1.4}}>{activeRank?activeRank.desc:"You're running naked. Earn XP, then equip a Rank for an edge."}</div>
        </div>
        {activeRank&&(
          <button onClick={()=>{XPStore.equipRank(null); setXpData(XPStore.get());}} style={{padding:"5px 10px",background:"#2a0d0d",border:"1px solid #5a1515",borderRadius:5,color:"#eb5757",fontSize:10,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>Unequip</button>
        )}
      </div>

      {/* Rank list grouped by tier */}
      <div style={{overflowY:"auto",flex:1,paddingRight:2,minHeight:0}}>
        {Object.entries(RANK_TIERS).map(([tierKey, tierInfo])=>{
          const tierRanks = RANKS.filter(r => r.tier === tierKey).filter(r=>{
            if (!r.secret) return true;
            if (xpData.ownedRanks.includes(r.id)) return true;
            return r.unlockCheck ? r.unlockCheck(unlockCtx) : false;
          });
          if (tierRanks.length === 0) return null;
          return (
            <div key={tierKey} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:tierInfo.color,marginBottom:5,letterSpacing:1,textTransform:"uppercase"}}>{tierInfo.label}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr",gap:5}}>
                {tierRanks.map(rank=>{
                  const owned    = xpData.ownedRanks.includes(rank.id);
                  const equipped = xpData.equippedRank === rank.id;
                  const canBuy   = !owned && xpData.xp >= rank.cost;
                  return (
                    <div key={rank.id} style={{background:equipped?"#0d2a4a":"#080d1a",border:"1px solid "+(equipped?tierInfo.color:owned?tierInfo.border:canBuy?tierInfo.color+"99":"#0d1a2e"),borderRadius:6,padding:"6px 8px",opacity:owned||canBuy?1:0.55,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:20,flexShrink:0}}>{rank.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:owned?tierInfo.color:"#c8d8f0",display:"flex",alignItems:"center",gap:6}}>
                          {rank.secret&&<span style={{fontSize:9,color:"#e6a817"}} title="Secret">★</span>}
                          {rank.name}
                          {equipped&&<span style={{fontSize:9,padding:"1px 5px",background:tierInfo.color+"33",border:"1px solid "+tierInfo.color,borderRadius:3,color:tierInfo.color}}>EQUIPPED</span>}
                        </div>
                        <div style={{fontSize:10,color:"#8a9aaa",lineHeight:1.4}}>{rank.desc}</div>
                      </div>
                      <div style={{flexShrink:0}}>
                        {owned ? (
                          equipped
                            ? <span style={{fontSize:10,color:"#5a7a9a",padding:"6px 10px"}}>active</span>
                            : <button onClick={()=>{XPStore.equipRank(rank.id); setXpData(XPStore.get()); AudioEngine.play('buy');}} style={{padding:"6px 10px",background:"#0d2a4a",border:"1px solid "+tierInfo.color,borderRadius:5,color:tierInfo.color,fontSize:10,cursor:"pointer",fontWeight:700}}>Equip</button>
                        ) : (
                          <button disabled={!canBuy} onClick={()=>{
                            if (!XPStore.spend(rank.cost)) return;
                            XPStore.ownRank(rank.id);
                            XPStore.equipRank(rank.id);
                            setXpData(XPStore.get());
                            AudioEngine.play('achieve');
                          }} style={{padding:"6px 10px",background:canBuy?"#0d2a0d":"#0d1a2e",border:"1px solid "+(canBuy?"#2a5a3a":"#1e3a5f"),borderRadius:5,color:canBuy?"#6fcf97":"#3a5a7a",fontSize:10,cursor:canBuy?"pointer":"not-allowed",fontWeight:700,whiteSpace:"nowrap"}}>{"★ "+FMT(rank.cost)}</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {prestige >= 1 && (
          <div style={{fontSize:10,color:"#5a7a9a",textAlign:"center",marginTop:8,fontStyle:"italic"}}>
            XP gain decay: {Math.round(Math.max(0.30, Math.pow(0.92, prestige))*100)}% (decreases with each launch)
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function CodexTab({xpData, prestige}) {
  const [cat, setCat] = React.useState('resources');
  const [search, setSearch] = React.useState('');

  const ft = xpData.firstTime || {};
  const discB  = ft.buildings    || {};
  const discU  = ft.upgrades     || {};
  const discK  = ft.knowledge    || {};
  const discBm = ft.biomes       || {};
  const discPl = ft.planets      || {};
  const discSt = ft.storyEvents  || {};
  const ownedR = new Set(xpData.ownedRanks || []);

  const CATS = [
    {id:'resources',icon:'⚡',label:'Resources'},
    {id:'buildings',icon:'🏗',label:'Buildings'},
    {id:'upgrades', icon:'⚙️',label:'Upgrades'},
    {id:'knowledge',icon:'🧠',label:'Knowledge'},
    {id:'ranks',    icon:'⭐',label:'Ranks'},
    {id:'biomes',   icon:'🌍',label:'Biomes'},
    {id:'planets',  icon:'🪐',label:'Planets'},
    {id:'people',   icon:'👤',label:'People'},
  ];

  const TIER_COLORS = {common:'#8aafcf',uncommon:'#6fcf97',rare:'#4a9eff',legendary:'#e6a817',mythic:'#c07eff'};
  const TIER_LABELS = {common:'Common',uncommon:'Uncommon',rare:'Rare',legendary:'Legendary',mythic:'Mythic'};

  const getEntries = () => {
    switch(cat) {
      case 'resources': return Object.entries(RESOURCE_LORE).map(([id,r])=>({
        id, icon:r.icon, name:r.name, sublabel:'Resource', mechanic:'', lore:r.lore, discovered:true,
      }));
      case 'buildings': return Object.values(BUILDINGS).map(b=>{
        const bi = BUILDING_ICONS[b.id]||{};
        const layerLabel = b.phase ? 'Colony Ship' : `Layer ${b.layer} · Tier ${b.tier}`;
        return {id:b.id, icon:bi.icon||'🏗', name:b.name, sublabel:layerLabel,
          mechanic:b.desc, lore:BUILDING_LORE[b.id]||'', discovered:!!(discB[b.id]||(b.phase&&discB[b.id]))};
      });
      case 'upgrades': return UPGRADES.map(u=>{
        const isExcl = u.exclusive ? '⚠ Choice upgrade' : '';
        return {id:u.id, icon:'⚙️', name:u.name, sublabel:`Layer ${u.layer}`,
          mechanic:u.effect+(isExcl?' — '+isExcl:''), lore:UPGRADE_LORE[u.id]||'', discovered:!!discU[u.id]};
      });
      case 'knowledge': return KNOWLEDGE.map(k=>({
        id:k.id, icon:'🧪', name:k.name, sublabel:k.desc,
        mechanic:k.effect, lore:KNOWLEDGE_LORE[k.id]||'', discovered:!!discK[k.id],
      }));
      case 'ranks': return RANKS.map(r=>{
        const owned = ownedR.has(r.id);
        const secretHidden = r.secret && !owned;
        return {id:r.id, icon:r.icon, name:r.name,
          sublabel: TIER_LABELS[r.tier]||r.tier, tierColor: TIER_COLORS[r.tier]||'#8aafcf',
          mechanic:r.desc, lore:RANK_LORE[r.id]||'', discovered:owned, secret:secretHidden};
      });
      case 'biomes': return BIOMES.map((b,i)=>({
        id:String(i), icon:b.icon, name:b.label, sublabel:`${b.events.length} recorded event${b.events.length!==1?'s':''}`,
        mechanic:'', lore:BIOME_LORE[b.label]||'', discovered:!!discBm[String(i)],
      }));
      case 'planets': return PLANETS.map(p=>({
        id:p, icon:PLANET_LORE[p]?.icon||'🪐', name:p, sublabel:'Destination',
        mechanic:'', lore:PLANET_LORE[p]?.lore||'', discovered:!!discPl[p],
      }));
      case 'people': return PEOPLE_CODEX.map(p=>({
        id:p.id, icon:p.icon, name:p.name, sublabel:'Colonial Record',
        mechanic:'', lore:p.lore, discovered:p.unlockEvent ? !!discSt[p.unlockEvent] : true,
      }));
      default: return [];
    }
  };

  let entries = getEntries();
  if (search.trim()) {
    const q = search.toLowerCase();
    entries = entries.filter(e=>
      e.name.toLowerCase().includes(q) ||
      (e.discovered && (e.lore||'').toLowerCase().includes(q)) ||
      (e.sublabel||'').toLowerCase().includes(q)
    );
  }

  const totalDisc = entries.filter(e=>e.discovered).length;
  const total = entries.length;

  // Rank system intro (shown at top of ranks category)
  const rankIntro = cat==='ranks' && !search.trim();

  const cardStyle = (e) => ({
    background: e.discovered ? '#0a1628' : '#060e1a',
    border:`1px solid ${e.discovered ? '#1e3a5f' : '#0d1822'}`,
    borderRadius:8, padding:'10px 12px',
    opacity: e.discovered ? 1 : 0.5,
  });

  return (
    <div style={{padding:'8px 10px'}}>
      {/* Category selector */}
      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
        {CATS.map(c=>(
          <button key={c.id} onClick={()=>{setCat(c.id);setSearch('');}} style={{
            padding:'4px 9px',borderRadius:12,border:'1px solid',
            borderColor: cat===c.id?'#4a9eff':'#1e3a5f',
            background: cat===c.id?'#0d2a4a':'transparent',
            color: cat===c.id?'#4a9eff':'#5a7a9a',
            fontSize:11,cursor:'pointer',fontWeight:cat===c.id?700:400,
          }}>{c.icon} {c.label}</button>
        ))}
      </div>

      {/* Search + count */}
      <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={`Search ${CATS.find(c=>c.id===cat)?.label||''}…`}
          style={{flex:1,padding:'5px 8px',background:'#080f1e',border:'1px solid #1e3a5f',
            borderRadius:6,color:'#c0d8f0',fontSize:12,outline:'none'}}/>
        <span style={{fontSize:11,color:'#4a6a8a',whiteSpace:'nowrap',minWidth:60,textAlign:'right'}}>
          {totalDisc}/{total} found
        </span>
      </div>

      {/* Rank system intro card */}
      {rankIntro && (
        <div style={{background:'#080f1e',border:'1px solid #1e3a5f',borderRadius:8,
          padding:'10px 12px',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#a0c4ff',marginBottom:4}}>
            📜 The Colonial Designation System
          </div>
          <p style={{fontSize:11,color:'#7a9abf',margin:0,lineHeight:1.5}}>{RANK_LORE._system}</p>
        </div>
      )}

      {/* Entry list */}
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {entries.length===0 && (
          <div style={{textAlign:'center',color:'#3a5a7a',fontSize:12,padding:'24px 0'}}>
            No entries match your search.
          </div>
        )}
        {entries.map(e=>(
          <div key={e.id} style={cardStyle(e)}>
            {e.discovered ? (
              <>
                <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:e.lore?5:0}}>
                  <span style={{fontSize:18,lineHeight:1.2,flexShrink:0}}>{e.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:13,color:'#c0d8f0'}}>{e.name}</span>
                      {e.sublabel && (
                        <span style={{fontSize:10,color: e.tierColor||'#4a6a8a'}}>{e.sublabel}</span>
                      )}
                    </div>
                    {e.mechanic && (
                      <div style={{fontSize:10,color:'#4a9eff',marginTop:2,
                        background:'#061020',border:'1px solid #1e3a5f',
                        borderRadius:4,padding:'2px 6px',display:'inline-block',marginTop:3}}>
                        {e.mechanic}
                      </div>
                    )}
                  </div>
                </div>
                {e.lore && (
                  <p style={{fontSize:11,color:'#8aafcf',margin:0,lineHeight:1.55,
                    borderTop:'1px solid #0d1a2e',paddingTop:6,marginTop:2}}>
                    {e.lore}
                  </p>
                )}
              </>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:18}}>{e.secret?'🔒':'❓'}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#1e3a5f'}}>
                    {e.secret ? 'Classified Entry' : e.name}
                  </div>
                  <div style={{fontSize:10,color:'#1a2e45'}}>
                    {e.secret ? 'Unlock condition unknown' : 'Not yet discovered'}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [res,           setRes]           = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    if (eqRank?.effect?.startResources) return {...initRes(), ...eqRank.effect.startResources};
    return initRes();
  });
  const [totalRes,      setTotalRes]      = useState(initRes());
  const [buildings,     setBuildings]     = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    if (eqRank?.effect?.special === "pioneer") return {solar:5, drill:5, lab:5, habitat:5};
    if (eqRank?.effect?.special === "architect_prime") return {solar:1, drill:1, lab:1, habitat:1, refinery:1, medbay:1, greenhouse:1, terraformer:1};
    return initBuildings();
  });
  const [upgrades,      setUpgrades]      = useState([]);
  const [knowledge,     setKnowledge]     = useState([]);
  const [layer,         setLayer]         = useState(()=>{
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    return eqRank?.effect?.special === "architect_prime" ? 2 : 1;
  });
  const [prestige,      setPrestige]      = useState(0);
  const [prestigeBonus, setPrestigeBonus] = useState(1);
  const [legacyPoints,  setLegacyPoints]  = useState(0);
  const [currentPlanet, setCurrentPlanet] = useState("Earth II");
  const [achievements,  setAchievements]  = useState([]);
  const [milestones,    setMilestones]    = useState([]);
  const [storyLog,      setStoryLog]      = useState([]);
  const [commsLog,      setCommsLog]      = useState([]);
  const [unseenComms,   setUnseenComms]   = useState(0);
  const [tab,           setTab]           = useState("build");
  const [clickAnim,     setClickAnim]     = useState(false);
  const [newAch,        setNewAch]        = useState(null);
  const [elapsed,       setElapsed]       = useState(0);
  const [won,           setWon]           = useState(false);
  const [totalClicks,   setTotalClicks]   = useState(0);
  const [totalSells,    setTotalSells]    = useState(0);
  const [offlineModal,  setOfflineModal]  = useState(null);
  const [paused,        setPaused]        = useState(false);
  const [tutorial,      setTutorial]      = useState(()=>localStorage.getItem("sbr_tut")?null:0);
  const [ticker,        setTicker]        = useState(null);
  const [launchModal,   setLaunchModal]   = useState(false);
  const [logModal,      setLogModal]      = useState(false);
  const [audioModal,    setAudioModal]    = useState(false);
  const [saveModal,     setSaveModal]     = useState(false);
  const [hcMode,        setHcMode]        = useState(() => localStorage.getItem("sbr_hc") === "1");
  const [supportModal,  setSupportModal]  = useState(false);
  const [importText,    setImportText]    = useState("");
  const [saveStatus,    setSaveStatus]    = useState("");
  const [audioSettings, setAudioSettings] = useState(()=>AudioEngine.getSettings());
  const [clickRings,    setClickRings]    = useState({});
  const [layerTransition, setLayerTransition] = useState(null);

  // XP state
  const [xpData,        setXpData]        = useState(()=>XPStore.get());
  const [xpStoreOpen,   setXpStoreOpen]   = useState(false);
  const [xpPopups,      setXpPopups]      = useState([]); // floating "+N XP" notifications
  const [tabsVisitedThisSession, setTabsVisitedThisSession] = useState({});
  const [tabLastSeen,            setTabLastSeen]            = useState({}); // tab -> badge count at last visit
  const [milestonesHitThisRun,   setMilestonesHitThisRun]   = useState({}); // `${res}_${tier}` -> true
  const [branchesCompletedThisRun, setBranchesCompletedThisRun] = useState({}); // branchName -> true
  const xpClickCounter = useRef(0); // for The Intern's 25th-click skip
  const popupIdRef     = useRef(0);
  const pendingXpRef   = useRef({amount: 0, reason: null, count: 0, timer: null});
  const ringIdRef = useRef(0);
  const prevLayerRef = useRef(layer);
  const holdRef   = useRef(null);
  const nextTickRef = useRef(0);
  // buildingsRef mirrors `buildings` synchronously so hold-burst handlers can read fresh counts
  // without waiting for re-render. Updated in a useEffect below.
  const buildingsRef = useRef(buildings);
  // resRef mirrors `res` synchronously for the same reason — React 18 batches setRes updaters
  // asynchronously, so didBuy flags set inside them aren't visible on the same tick.
  const resRef = useRef({});
  // Dave's Cousin: id of currently broken building (or null)
  const [davesPause,    setDavesPause]    = useState(null); // {id, until}
  const [runSummary,    setRunSummary]    = useState(null); // shown on prestige launch

  // Keep buildingsRef and resRef in sync with state
  useEffect(() => { buildingsRef.current = buildings; }, [buildings]);
  useEffect(() => { resRef.current = res; }, [res]);

  // Helper to award XP and spawn a floating popup.
  // Rapid gains within 300ms are batched into a single popup to reduce visual noise.
  const awardXP = useCallback((amount, reason) => {
    if (!amount || amount <= 0) return;
    const eq = XPStore.get().equippedRank;
    const eqRank = eq ? RANKS_BY_ID[eq] : null;
    let multiplier = 1;
    if (eqRank?.effect?.special === "stellar_council") multiplier *= 2;
    if (eqRank?.effect?.special === "atomic_scholar" && reason === "Knowledge unlocked") multiplier *= 2;
    const decay = Math.max(0.30, Math.pow(0.92, prestige));
    const final = Math.max(1, Math.round(amount * multiplier * decay));
    XPStore.award(final, reason);
    setXpData(XPStore.get());
    const p = pendingXpRef.current;
    p.amount += final;
    p.count += 1;
    if (p.count === 1) p.reason = reason; else p.reason = null;
    if (p.timer) clearTimeout(p.timer);
    p.timer = setTimeout(() => {
      const total = p.amount;
      const label = p.reason;
      p.amount = 0; p.count = 0; p.reason = null; p.timer = null;
      const id = ++popupIdRef.current;
      setXpPopups(prev => [...prev, {id, amount: total, reason: label}]);
      setTimeout(() => setXpPopups(prev => prev.filter(x => x.id !== id)), 1200);
    }, 300);
  }, [prestige]);

  // Daily streak check on first mount
  useEffect(() => {
    const r = XPStore.checkDaily();
    if (r.awarded > 0) {
      // delay so the user sees it after the UI settles
      setTimeout(() => awardXP(r.awarded, "Daily streak: day "+r.streak), 1200);
      setXpData(XPStore.get());
    }
    // Mark the starting biome as discovered on every session load
    XPStore.markFirst("biomes", String(XPStore.get().totalLaunches % BIOMES.length));
  // eslint-disable-next-line
  }, []);

  // Active rank lookup
  const activeRank = xpData.equippedRank ? RANKS_BY_ID[xpData.equippedRank] : null;
  const rankEffect = activeRank?.effect || {};

  useEffect(() => {
    const saved = localStorage.getItem("sbr_save");
    if (saved) {
      const diff = Math.floor((Date.now()-parseInt(saved))/1000);
      if (diff>30) {
        // Investor rank bumps offline cap to 16h
        const xpState = XPStore.get();
        const eqRank  = xpState.equippedRank ? RANKS_BY_ID[xpState.equippedRank] : null;
        const isInvestor = eqRank && eqRank.effect.special === "investor";
        const capSecs = isInvestor ? 57600 : 28800;
        const capped = Math.min(diff, capSecs);
        const dream  = DREAM_EVENTS[Math.floor(Math.random()*DREAM_EVENTS.length)];
        setOfflineModal({secs:capped, dream, actual:diff, investor:!!isInvestor});
      }
    }
    const sv = setInterval(()=>localStorage.setItem("sbr_save",Date.now().toString()),5000);
    localStorage.setItem("sbr_save",Date.now().toString());
    return ()=>clearInterval(sv);
  },[]);

  useEffect(()=>{if(won||paused)return;const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[won,paused]);
  // Phases must be built in order; each is one-time. Once all 5 are built AND resource
  // milestone is met, the player can press the Launch button on the Launch tab.
  const PHASE_IDS = ["cs_phase1","cs_phase2","cs_phase3","cs_phase4","cs_phase5"];
  const phasesBuilt = PHASE_IDS.filter(id => (buildings[id]||0) >= 1).length;
  const allPhasesDone = phasesBuilt === 5;
  // Launch milestone: 10M of every resource currently on hand
  const LAUNCH_THRESHOLD = 10000000;
  const launchResReady = ["energy","minerals","research","fuel","population"].every(k => (res[k]||0) >= LAUNCH_THRESHOLD);
  const canLaunch = allPhasesDone && launchResReady;
  useEffect(()=>{if(layer===1&&(buildings.terraformer||0)>=1)setLayer(2);if(layer===2&&(buildings.stationdock||0)>=1)setLayer(3);},[buildings,layer]);

  // Layer transition cinematic
  useEffect(()=>{
    if (layer !== prevLayerRef.current && layer > prevLayerRef.current) {
      const lt = LAYER_THEME[layer];
      AudioEngine.play("layerUp");
      setLayerTransition({icon:lt.icon, name:lt.name, color:lt.color});
      setTimeout(()=>setLayerTransition(null), 3200);
      // XP: 25 every transition, +100 first time L2, +200 first time L3
      awardXP(25, "Reached "+lt.name);
      if (XPStore.markFirst("layers", String(layer))) {
        awardXP(layer === 3 ? 200 : 100, "First time at "+lt.name+"!");
      }
    }
    prevLayerRef.current = layer;
  },[layer,awardXP]);

  // Sync high contrast class on body and persist preference
  useEffect(() => {
    document.body.classList.toggle("hc", hcMode);
    try { localStorage.setItem("sbr_hc", hcMode ? "1" : "0"); } catch(e) {}
  }, [hcMode]);

  // Start ambient music after first interaction
  const ensureMusicStarted = useCallback(() => {
    AudioEngine.resume();
    if (!audioSettings.muted && audioSettings.music > 0) AudioEngine.startMusic();
  }, [audioSettings]);

  const fmtTime = s => {
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
    return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
  };

  const getClickPower = useCallback(type => {
    let b=1;
    if(upgrades.includes("u1")&&type==="energy")b*=2; if(upgrades.includes("u2")&&type==="minerals")b*=2;
    if(upgrades.includes("u3")&&type==="research")b*=2; if(upgrades.includes("u4")&&type==="population")b*=2;
    if(upgrades.includes("u5")&&(type==="energy"||type==="minerals"))b*=1.5;
    if(upgrades.includes("u6")&&(type==="research"||type==="population"))b*=1.5;
    if(upgrades.includes("u7"))b*=2;
    if(knowledge.includes("ke2")&&type==="energy")b*=2.5; if(knowledge.includes("km2")&&type==="minerals")b*=2.5;
    if(knowledge.includes("kr2")&&type==="research")b*=2.5; if(knowledge.includes("kp2")&&type==="population")b*=2.5;
    if(knowledge.includes("kf2")&&type==="fuel")b*=2.5;
    if(knowledge.includes("cx_em")&&(type==="energy"||type==="minerals"))b*=2;
    if(knowledge.includes("cx_rp")&&(type==="research"||type==="population"))b*=2;
    if(knowledge.includes("cx_pf2"))b*=4;
    if(upgrades.includes("ub1a"))b*=0.5; if(upgrades.includes("ub1b"))b*=4;
    // Click Mastery upgrades
    if(upgrades.includes("uc1"))b*=2;
    if(upgrades.includes("uc2"))b*=5;
    if(upgrades.includes("uc3"))b*=10;
    if(upgrades.includes("uc4"))b*=20;
    // Rank effects
    if (rankEffect.clickMult) b *= rankEffect.clickMult;
    if (rankEffect.special === "coffee") {
      if (elapsed < 60) b *= 2; // +100% click for first 60s
      // After: no bonus, so b unaffected
    }
    if (rankEffect.special === "heavyweight") return 0; // no clicks at all
    return Math.floor(b*prestigeBonus);
  },[upgrades,knowledge,prestigeBonus,rankEffect,elapsed]);

  const getProd = useCallback(()=>{
    const p=initRes();
    Object.values(BUILDINGS).forEach(bld=>{
      const cnt=buildings[bld.id]||0; if(!cnt) return;
      // Dave's Cousin: skip the paused building briefly
      if (davesPause && davesPause.id === bld.id) return;
      let m=prestigeBonus;
      if(upgrades.includes("u1")&&bld.id==="solar")m*=2; if(upgrades.includes("u2")&&bld.id==="drill")m*=2;
      if(upgrades.includes("u3")&&bld.id==="lab")m*=2; if(upgrades.includes("u4")&&bld.id==="habitat")m*=2;
      if(upgrades.includes("u5")&&["solar","drill","refinery"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u6")&&["lab","habitat","medbay"].includes(bld.id))m*=1.5;
      if(upgrades.includes("u7"))m*=2;
      if(upgrades.includes("u8")&&bld.prod.fuel)m*=2; if(upgrades.includes("u9")&&bld.id==="orbitallab")m*=2;
      if(upgrades.includes("ub1a"))m*=2; if(upgrades.includes("ub1b"))m*=0.7;
      if(upgrades.includes("ub2a")&&bld.prod.fuel)m*=4;
      if(upgrades.includes("ub2a")&&bld.layer===2&&!bld.prod.fuel)m*=0.6;
      if(upgrades.includes("ub2b")&&bld.layer===2)m*=2.5;
      if(upgrades.includes("u10")&&bld.layer===2)m*=1.5; if(upgrades.includes("u11")&&bld.id==="oreprocessor")m*=3;
      if(upgrades.includes("u12")&&bld.id==="cryobay")m*=2; if(upgrades.includes("u13")&&bld.id==="warplab")m*=3;
      if(upgrades.includes("u14")&&bld.id==="probefactory")m*=3; if(upgrades.includes("u15")&&bld.prod.fuel)m*=2;
      if(knowledge.includes("k0"))m*=1.15;
      if(knowledge.includes("ke1")&&bld.id==="solar")m*=1.4; if(knowledge.includes("ke2")&&bld.prod.energy)m*=1.2;
      if(knowledge.includes("ke3")&&bld.prod.energy)m*=4;
      if(knowledge.includes("km1")&&bld.id==="drill")m*=1.4;
      if(knowledge.includes("km2")&&["drill","refinery","terraformer"].includes(bld.id))m*=1.2;
      if(knowledge.includes("km3")&&bld.prod.minerals)m*=4;
      if(knowledge.includes("kr1")&&bld.id==="lab")m*=1.4;
      if(knowledge.includes("kr2")&&["lab","medbay","orbitallab"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kr3"))m*=2.5;
      if(knowledge.includes("kp1")&&bld.id==="habitat")m*=1.4;
      if(knowledge.includes("kp2")&&["habitat","medbay","cryobay"].includes(bld.id))m*=1.5;
      if(knowledge.includes("kp3")&&bld.prod.population)m*=4; if(knowledge.includes("kp3"))m*=1.2;
      if(knowledge.includes("kf1")&&bld.id==="launchpad")m*=1.5;
      if(knowledge.includes("kf2")&&bld.prod.fuel)m*=2; if(knowledge.includes("kf3")&&bld.prod.fuel)m*=3;
      if(knowledge.includes("cx_em")&&bld.id==="refinery")m*=3;
      if(knowledge.includes("cx_mr")&&["drill","lab","medbay","orbitallab"].includes(bld.id))m*=2;
      if(knowledge.includes("cx_rp")&&bld.id==="medbay")m*=3;
      if(knowledge.includes("cx_pf")&&bld.prod.fuel)m*=1.5; if(knowledge.includes("cx_fe")&&bld.id==="solarcollector")m*=2;
      if(knowledge.includes("cx_em2")&&(bld.prod.energy||bld.prod.minerals))m*=3;
      if(knowledge.includes("cx_mr2")&&(bld.prod.minerals||bld.prod.research))m*=3;
      if(knowledge.includes("cx_rp2"))m*=3;
      if(knowledge.includes("cx_pf2")&&(bld.prod.fuel||bld.prod.population))m*=3;
      if(knowledge.includes("cx_fe2")&&(bld.prod.fuel||bld.prod.energy))m*=4;
      // Dyson Heir: energy buildings produce 3x more
      if (rankEffect.special === "dyson_heir" && bld.prod.energy) m *= 3;
      Object.entries(bld.prod).forEach(([k,v])=>{p[k]+=v*cnt*m;});
    });
    if(knowledge.includes("cx_pf")){const fp=p.population||0;p.fuel+=fp*0.2;p.energy+=fp*0.1;}
    // Rank effects on production
    if (rankEffect.prodMult) {
      Object.entries(rankEffect.prodMult).forEach(([k,mult])=>{
        if (k==="all") Object.keys(p).forEach(rk=>{p[rk]*=mult;});
        else if (p[k] !== undefined) p[k] *= mult;
      });
    }
    if (rankEffect.special === "optimist") {
      const factor = elapsed < 600 ? 1.30 : 1.05;
      Object.keys(p).forEach(k=>{p[k]*=factor;});
    }
    // Hivemind — population also produces every other resource at 25% rate
    if (rankEffect.special === "hivemind") {
      const popRate = p.population || 0;
      ["energy","minerals","research","fuel"].forEach(k=>{p[k] += popRate*0.25;});
    }
    // The Lonely Astronaut — population locked at 0
    if (rankEffect.special === "lonely_astronaut") p.population = 0;
    // The Hoarder — +1% per 100 minerals held, capped at +50%
    if (rankEffect.special === "hoarder") {
      const bonus = Math.min(0.50, Math.floor((res.minerals||0)/100) * 0.01);
      Object.keys(p).forEach(k=>{p[k] *= (1+bonus);});
    }
    // Echo of the First Colony — +10% per unique planet visited (max +100%)
    if (rankEffect.special === "echo") {
      const xpState = XPStore.get();
      const planetsCount = Object.keys(xpState.firstTime.planets || {}).length;
      const echoBonus = Math.min(1.0, planetsCount * 0.10);
      Object.keys(p).forEach(k=>{p[k] *= (1+echoBonus);});
    }
    return p;
  },[buildings,upgrades,knowledge,prestigeBonus,rankEffect,elapsed,davesPause]);

  useEffect(()=>{
    if(paused) return;
    const t=setInterval(()=>{
      const p=getProd();
      setRes(r=>{const n={...r};Object.keys(p).forEach(k=>{n[k]+=p[k]/10;});return n;});
      setTotalRes(r=>{const n={...r};Object.keys(p).forEach(k=>{n[k]+=p[k]/10;});return n;});
    },100);
    return ()=>clearInterval(t);
  },[getProd,paused]);

  useEffect(()=>{
    const t=setTimeout(()=>{

  const knowledgeBadge= KNOWLEDGE.filter(k=>!knowledge.includes(k.id)&&k.requires.every(r=>knowledge.includes(r))&&canAffordWith(res,k.cost)&&!(k.exclusive&&k.exclusive.some(ex=>knowledge.includes(ex)))).length;
  const achieveBadge  = ACHIEVEMENTS.filter(a=>!achievements.includes(a.id)&&a.check(totalRes,buildings,upgrades,prestige,totalClicks,knowledge,totalSells,elapsed,layer)).length;

  const ranksBadge = (()=>{

      runningNakedDone: !!xpData.runningNakedDone,
      uniquePlanets: Object.keys(xpData.firstTime?.planets || {}).length,
    };
    return RANKS.filter(r=>{
      if (xpData.ownedRanks.includes(r.id)) return false;
      if (r.secret && !(r.unlockCheck && r.unlockCheck(unlockCtx))) return false;
      return xpData.xp >= r.cost;

  useEffect(()=>{

      {won&&(

            <div style={{fontSize:9,color:"#5a7a9a"}}>{"+"+(prod[k]>=0.01?prod[k].toFixed(2):0)+"/s"}</div>

      <div style={{fontSize:9,color:"#3a5a7a",textAlign:"center",marginBottom:8,minHeight:11}}>

        {layer===1&&(buildings.solar||0)>=10&&(buildings.drill||0)<10&&("Research: "+(buildings.drill||0)+"/10 Drill Rigs")}

      {/* Tab bar — two rows, file-tab style */}
      {(()=>{
